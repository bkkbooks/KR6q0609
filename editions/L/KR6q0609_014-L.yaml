body:
  text: 嗣法門人戒受編問答機緣上問如何是佛法大意師云自世尊覩明星悟道說法四十九載末後拈花示眾唯有迦葉微笑世尊云吾有正法眼藏教外別傳囑付與汝汝當流布勿令斷絕展轉相傳西天二十八祖至達磨大師到東土流傳六祖祖所付二人一名南嶽讓和尚一名青原思和尚讓下流傳枝派四宗一名臨濟宗一名溈仰宗一名雲門宗一名法眼宗思下流傳一宗名為曹洞宗自宋後三宗無傳惟臨濟曹洞二宗並行於世至今燈燈相續祖祖聯芳勿得學者混亂法門是名來源佛法大意上問梁武帝問達磨大師如何是聖諦第一義磨云廓然無聖意旨如何師云玅性圓明體自空寂不假名相真空無形上問南泉斬猫意旨如何師云大用現前不存軌則上云既為知識皆以慈心為甚斬却猫師云南泉行正令勘驗衲僧使他薦取己躬下事故知識臨機作用為人抽釘拔楔也上問趙州頭戴草鞋意作麼生師云好手手中呈好手入水便見是長人貍奴頭角依然在迥出天然意氣誇上問如何是悟道師云明心見性上云如何是明心見性師云單提一個話頭塞斷情識異路內心不奔外塵不染看一念未生已前直下坐斷透脫玄關便與佛祖無別是為明心見性見性成佛上問如何是叅禪話頭師云或有叅即心即佛或有叅心不是佛智不是道或有叅如何是佛麻三觔者是從上祖師公案名為關棙子也上問有不叅話頭悟道者麼師云不叅話頭悟道者頗多皆因宿植般若靈根或觸著一機一境發明此事原是大根器者一聞便悟若是鈍根之人未免叅究上問朕要學佛法從甚麼處學起師云從陛下問處學起上云如何是問處學起師云但看開口動念處發起信心即是成佛之本源世出世間之玅道也上問自古治天下皆以祖祖相傳日對萬機不得閒暇如今好要佛法從誰而傳師云陛下乃是金輪王轉世天性根敏不化而自善不學而自明所以天下至尊也上問世間修行從何而修即得道果師云修行無二路方便有多門欲修人天快樂三壇等施六度齊修此屬人天小果若修出世間道建大法幢請轉法輪務要叅禪見性即成道果上問朕治天下事畢或有閒時叅禪還悟道否師云但辦肯心必不相賺上等利根一聞千悟上問叅禪做工夫叅甚麼話頭好師云叅個萬法歸一一歸何處上問日對萬機還叅得禪麼師云若會得日對萬機底人落處即是禪即是道所謂道在目前不須別處尋討上問如何是萬法歸一一歸何處師云龍歸大海波濤靜鳳到蒼梧氣象新上問萬法歸一一歸萬法可是道否師云山河無礙融三際剎海收歸一指端上問萬法歸於一心時時持守不應世事可以謂了道否師云道廣無涯逢人不盡上問叅禪工夫何處入門師云即向開口動舌處會穿衣喫飯處會一念未起時會猛力提撕直下坐斷一了百當胷懷無礙所以靈光獨耀迥脫根塵事理無二即如如佛上問悟道之人隨所去來不被物轉是否師云百花林裏過一葉不沾衣上問悟後之人還復迷否師云譬喻木燒成灰灰能成木耶上命師問翰林曹本榮一𤱔之地三蛇九鼠意旨如何曹云象王行處絕狐踪師云祇道得一半曹佇思師云祇如絕狐踪處還有向上事也無曹云龍袖拂開全體現師云正好通身受用曹云謝師指示師云也是杓卜聽虛聲師又問日裏僧駝像夜裏像駝僧意旨如何曹云有智主人二俱不受師頷之上命王熙曹本榮二翰林到萬善殿問師王云有一問特請和尚指示師云山僧今日不答話王佇思曹云雖然不答話其語如雷師云莫錯聽好山僧亦有一問夫子之道忠恕而已矣請問二公如何是忠恕之道試道看二公無對王翰林問悟道之人還落輪廻也無師云我者裏佛尚不可得喚甚麼作輪廻王云叅禪一切人可以叅得麼師云若論個事在聖不增在凡不減王云者個事畢竟如何師云如鐵橛子相似上命畫工傳師真懸殿上駕到顧云者個若是老和尚一棒打殺師云未審陛下向甚麼處下手上便轉身出方丈少頃差近侍李公云適纔聖上道者個若是老和尚一棒打殺師云山僧慚愧一日奏辭上歸海會寺上差李公到殿上云和尚有什麼物件留一兩樣在宮裏供養以見和尚如故師云貧道固窮並無一物惟有一條拄杖是貧道親受用底進陛下大振佛祖家風也上一見大悅上問觀音菩薩從聞思修入三摩地且道與禪宗是同是別師云兩𫨻不同收歸上科上問臨濟在黃檗喫三頓棒意旨如何師云陛下磨礱三尺劍太平寰宇斬癡頑上云既在黃檗喫棒因甚麼大愚處悟道師云若無大愚誰識黃檗上問如何是超佛越祖底道理師云王登寶位野老謳歌上云者就是超佛越祖底道理師云王法與佛法無二易齋馮侍郎問自古聖賢還達真正理也無師云朝笏不因遮臉笑袞袍豈是野人穿馮云門裏出身易身裏出門難是如何師云今日大出小遇師問胎仙馮翰林孔子云不在其位不謀其政且道不在甚麼位馮無語師云公既道不得何不問山僧馮云請和尚道師云本來無𦊱礙隨處自稱尊馮信服之馮翰林問師如何是宗旨師指香爐云一片栴檀爐內燒林云者個就是宗旨師云認著依然猶不是僧叅問如何是主中賓師云有人問我住山意一把钁頭是生涯僧云如何是賓中主師云白雲飛出岫青嶂倚空高僧云如何是主中主師云橫按鏌鎁全正令太平寰宇斬癡頑僧云如何是賓中賓師云情知汝是行脚漢僧云除此主賓之外還有向上事也無師便打僧一喝師云汝祇得恁麼有一僧到海會舉耕月首座住銀山有垂語問學者既是銀山諸人到者裏因甚麼用他不著無人答得此話師代云聞時富貴見後貧窮羅秀才叅師問秀才通那一經才云易經師云易經有八卦是否才云是師拈拄杖地上一劃一卓云者是那一卦試道看才罔措師云雷火豐卦也不識才禮拜僧問臨濟三玄即不問汾陽五句請師分師云破句問將來進云如何是入門句師云放下腰包高掛鉢囊進云如何是門裏句師云獨坐萬年床悠然忘歲月進云如何是當門句師云師子當軒踞誰敢正眼看進云如何是出門句師云舉頭紅日近回首白雲低進云如何是門外句師云極目寥寥山海外不知何處是家鄉僧便喝師云任汝喝得老僧猶是門外漢羅漢琛禪師因二僧作禮琛云俱錯僧無對師舉問雲响侍者那裏是二僧錯處試道看响下數語師不肯云恁麼見解叅禪不了雲躊度師云汝要承當佛法切須仔細雲出方丈到僧堂前忽然疑團頓釋居士問如何是燈王佛師云了角女子頭白如𮈔因雪師問耕月盡大地是雪因甚麼孤峯不白月云玉出崑崗師肯之師問化南十方無壁落四面亦無門有人問汝作麼生答化云無毛鷂子潑天飛師云前途三軍圍繞如何敵對化云金鼓先鳴單刀直入師云祇如萬里無寸草處又作麼生化云我為法王於法自在師云也好與三十棒師一日與竹庵西堂過長橋問古人問趙州如何是趙州橋州云度驢度馬意作麼生竹云某甲不恁麼道師云汝試道看竹云度佛度祖師云與麼道大有人笑汝在竹云和尚作麼生師云要行便行要住便住竹云和尚即得師云汝分上又如何竹云不妨隨和尚脚跟轉師云因甚不打自招竹云師資道中不為分外師便行云隨我來師住錦山歲畢設齋供金粟百和尚因未傳得真師乃打圓相云有人下得一轉語恰當許汝親見本師面目竹西堂云南山起雲北山下雨維那云春色滿園關不住一枝紅杏出墻來侍者云薰風自南來殿閣生微涼師云此處無銀三十兩一僧將高峯示眾偈著語呈上方丈師不肯云汝逐句問來我為答僧云如何是海底泥牛啣月走師云鬼持千里鈔林下道人悲僧云如何是巖前石虎抱兒眠師云猿猴探水月𦺫𦿆拾花鍼僧云如何是鐵蛇鑽入金剛眼師云紙褁大蟲眼著楔僧云如何是崑崙騎象鷺鶿牽師云家無小使不成君子且住者話是古人分中事如何是你分上事僧擬對師便掌師問竹庵德山末後句汝作麼生會竹云平生肝膽向人傾相見猶如不相識師頷之師問雲响臨濟正法眼滅却瞎驢邊你作麼生會响云動容揚古路不墯悄然機師云三聖便喝又如何响云大用現前師云三聖便禮拜臨濟還是肯他不肯他响拂袖便行師云饒汝恁麼去早喫山僧三十棒了也僧問罪從心起將心懺因甚麼又向佛前求解釋師云要他作證明僧問如何是祖師西來意師云三腳蝦蟇上露柱僧叅師問三人同行必有我師那個為得我師者試道看僧罔措師云同坑無異土化南問師藏身處沒踪跡沒踪跡處莫藏身意作麼生師云人面不知何處去桃花依舊笑春風師徵云汝作麼生會化云只在此山中雲深不知處翰林孺子俞居士問求和尚開示叅禪師云旱地好種麥士云不會師云北地少雨多風僧問如何是法身師云一朵梨花帶雪開僧繇好手難描畫僧云如何是透法身句師云毛擊碎虛空骨師住庵時有二僧駝一尊佛至庵作禮云日勢稍晚某甲借一宿得麼師云我有一問汝道得與你宿若道不得便去古人道釋迦彌勒猶是他奴汝是丈夫駝他作麼其僧罔措僧問如何是日面佛月面佛師云左手翻雲右手雨師問化南無手臂漢把住天下人假使沒影子的人來作麼生把捉化云澤廣藏山理能伏豹僧問臨危不變在什麼處安身師云在汝脚跟底僧問如何是奇特事師云碓嘴生花師同耕月首座路行因過溪喚俗人撑竹筏度之師云為知識者要度俗人因甚麼喚俗人度座云家無小使不成君子師云汝喫了飯只是與人爭閒氣座云和尚作麼生師云好事讓他人師問僧那裏來僧云五臺師云還見文殊麼僧云見師云且道他鼻孔是橫是直僧無語師云者妄語漢何曾從五臺來司禮監太監曹居士問南泉斬猫意旨如何師云城中失火殃及池魚翰林方月江叅師問孔子云君子思不出其位未審思不出甚麼位士以手拍香几師云佛法不是者個道理士便喝師云念居士初叅且放過一著士云和尚莫向人道弟子來求佛法師云情知居士不是者心事僧問如何是向上一路師云盲子夜半上樓梯僧云學人不會師云有時踏得著有時踏不著僧問如何是佛師云一口鍼三尺線侍者捧一鍾水度與師師云作甚麼者云與和尚潄口師云山僧不曾念佛潄口作麼者無對方翰林早晨入臥室見師纔起方云五更清早起更有夜行人師云山寺日高僧未起算來名利不如閑方鼓掌笑云點著弟子痛處師問鄒貢士爾去做官將何治民士云寬師云恁麼做官兆民無主也士罔措方翰林云鄒居士答不得者話乞師代一語師云片言可以折獄也一日方翰林辭師云弟子今日回家師云居士回家切莫謗山僧士云不敢師云汝作麼生士云逢人但恁麼舉師云却被汝謗了也士無語僧問世尊有密語迦葉不覆藏意旨如何師云其父攘羊而子證之師問眾僧魚從鷺鶿脚下過為甚麼却不知眾下語不契自代云暫時不在如同死人師問吼侍者如何是斬釘截鐵句吼云一刀兩斷師云如何是你棒下轉身句吼云脚下無𮈔任往還師云早被葛藤纏住了吼云且莫塗污學人師休去曹翰林問和尚還愛財色否師云覔之不可得士云既為善知識因甚麼愛財色師云夜夜抱渠眠朝朝共他起方翰林問如何是諸佛機師云一馬生三寅方云如何是目前機師云橫三豎四師問大眾有一人劒刃上走馬鉢盂裏安身諸人作麼生會弘讚侍者云放去則彌六合收來潛藏密機師云如何是收放底意弘云大用現前師云汝試大用現前看弘擬對師連棒趂退居士問心本無心捉心不定未審過在甚麼處師以偈答之甕裏捉泥鰍執心返成病去來莫管他只要斷他命師入堂問大眾如何是咬猪狗底手叚試出來看眾停思師云既無且看山僧咬幾隻去也以拄杖一齊趂散歸方丈師問印心如來堅密身一切塵中現如何是堅密身印云風吹不動水洒不濕師肯之鑾儀衛顧居士問昔有僧問古德如何是衲僧活計古云耳裏種田弟子看者一句話疑來久矣請師直指師云全體是用全用是體士云不會師云掘地覔天士信服禮拜方翰林寄來三問心經云無眼耳鼻舌身意既是無眼人將甚麼讀書答云空谷傳聲虛堂習聽又云一毫端上辯龍蛇僧問既無舌人將甚麼喫飯師云但取鈎頭意莫認定盤星又云他家自有通人愛僧問四大本空五蘊非有某甲現在身病眼花敢問和尚病從何來花是甚麼師云事從叮囑起展轉見誵訛又云皆從妄想生高侍郎問青州布衫重七觔意旨如何師云提起通身毛骨寒僧問如何是大用現前師云火車頭上舞麒麟僧問承和尚有言輪椎一聲震佛祖盡來叅既是佛祖更叅個甚麼師云三更猶自可午後始愁人師一日上堂二僧齊出問訊師云一對無孔鐵錘那個輕那個重二僧齊喝師云一人能奪不能縱一人能縱不能奪高侍郎問南泉斬猫是斬耶不斬耶師云若作佛法會即斬却若作世法會即不斬耕首座問萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟人了個甚麼師云到江吳地盡隔岸越山多居士問經云父少而子老舉世所不信此理如何師云山僧威音王已前行道了也師問罡風侍者懸羊頭賣狗肉汝作麼生會者云明修棧道暗度陳倉師云恁麼道猶較些子師問易齋馮侍郎經中云父少而子老舉世所不信此意如何士云子歸就父師云祇道得一半僧問如何是露地白牛師云大地莫能載師問紫萊侍者如何是正法眼者云破燈籠師云南泉斬猫意旨如何者云王令已行誰人敢逭師云趙州頭戴草鞋意作麼生者云子紹父業師問僧如何是諸佛出身處僧云井底蝦蟇天上飛師云世尊拈花意旨如何僧云人人有分師云既是人人有分為甚麼八萬人天罔措僧云九重深密處灼然人不知師打云前言不顧後語師問罡風靈雲見桃花是如何罡云打失鼻孔師云玄沙道諦當甚諦當敢保老兄未徹在意作麼生罡云滴淚斬丁公僧問空王脊骨為甚麼咬不斷師云不是猛烈漢師問自如維那世尊陞座文殊白椎世尊便下座意作麼生那云坐斷十方不通凡聖師便喝那禮拜僧問如何是諸佛出身處師云胡地抽冬笋僧云某甲不會師云北地鮮有南方頗多師問雪紅侍者婆子燒庵意旨如何者云可憐不遇攀花手狼籍枝頭多少香師云庵主過在甚麼處被婆子燒却庵者云鈍鳥迷舊巢耕首座進方丈師云作甚麼座云禮拜和尚師云山僧今日不在方丈裏應檀那供去了座云為甚麼當面諱却師云山僧今日失利座云和尚慣得其便師休去師問僧日裏僧駝像夜裏像駝僧意旨如何僧云觀音頭上頂彌陀逓相恭敬師肯之僧問如何是一塵入正受師云如駭鷄犀枕僧云如何是一塵三昧起師云松子綻開摩醯眼梨花心露佛全身一日班首進方丈師問如何是空刦已前事諸子下語看首座云炎炎六月一片雪西堂云無毛鷂子潑空飛後堂云烏向火碓嘴生花堂主云沒底鐵船水上浮師下兩語無影草裏飛蜻蜓又云千年雪裏埋死屍僧叅師拈拄杖一劃云向者裏道一句看僧云忽然迷霧散露出本來人師云如何是本來人僧云百鳥枝頭鳴嚦嚦師云日裏浩浩汝作麼生會僧云運水搬柴師打云賞汝一棒師問湛雲如何是金剛王寶劍湛云遍界血淋淋師云如何是踞地獅子湛云百獸盡潛踪師云如何是探竿影草湛云一點瞞他不得師云如何是向上事湛云須彌頂上日輪紅師打云也不可放過僧問世尊夜覩明星悟道未審和尚見個甚麼悟道師云山僧惱恨行脚二十年未曾叅見知識師問都察院容庵馮居士人人脚跟下有條通天大路因甚麼行不出戶坐不當堂士云別無回互師云者話是尋常事如何是格外句士云橫吞萬象氣絕諸塵師云恁麼道又爭得士云和尚意作麼生師云任從滄海變終不與君通馮察院問師有一則陳爛葛藤請師直答師云有甚麼疑處問將來士問有句無句如藤倚樹意旨如何師云刀斧劈不開士云如何是樹倒藤枯句歸何處師云目前無一法士云溈山呵呵大笑意作麼生師云識破賊贓師問妙運侍者興化擯維那你作麼生會者云咬牙封雍齒滴泪斬丁公師云大顛擯首座又作麼生者云韓公平地遭活埋師云祇如國師打侍者還是賞他罰他者云將頭不猛帶累三軍師云汝分上事又作麼生者云且禮拜和尚師打云不得放過師問雪紅動容揚古路不墮悄然機如何是悄然機雪云徧界不曾藏師云徧界不曾藏即且止汝即今在甚麼處安身雪一喝師便棒師問福緣汝福有多少福云一秤提不起尖斗量不盡師云汝有許多癡福僧問止止不須說我法玅難思如何是玅法師云十年談不盡更有好商量僧云某甲不恁麼道師云汝又作麼生僧作吹笛勢師云如蟲禦木僧云舉頭天外看誰是我般人師便打師問吼林心不是佛智不是道畢竟是個甚麼林云多年陳菜根師云本來無一物喚甚麼作菜根林云鬼神覷不破師云汝作麼生會林云覿面相承師云覷著即瞎林便喝師便棒師卓拄杖問初聞汝還聞麼僧云親親切切師云如何是汝親切處僧云無枝無葉師云還我主人公來僧云貼體金剛師打云百雜碎了也僧問三世諸佛因甚麼不知有師云家貧無活計僧云黧奴白牯為甚麼却知有師云富貴有良謀師問雪紅西堂丹霞燒木佛因甚麼院主眉鬚墮落堂云桑樹上著箭穀樹上出汁迦毘盧國僧到海會叅師問幾時到東土僧云不知師拈起扇子云者個喚作甚麼僧以手搖云就是者個物師云喚作物則觸不喚作物則背畢竟喚作甚麼僧罔措又問高隱那裏僧以手指胸云在者裏師云祇如死了燒了向甚麼處安身僧云隨路去師喝云無主孤魂僧問牛頭未見四祖是如何師云氣宇如王僧云見後是如何師云盡法無民僧云見與未見是如何師云本來無向背師問僧南贍部洲人打皷北欝單越人上堂汝作麼生會僧云高麗人打鐵迸破脚指頭師云阿誰証盟僧云木上座師云他還具眼也無僧云相見猶如不相識師云大似瞎滿州榜眼折中直問世人死後本性還滅耶不滅耶師云世人本性猶如太虛不遷不變當體全真士云為甚麼又有生死師云人雖有生死其性不殞亘古靈明毫無虧欠士乃信服師問僧空刦田地阿誰耕種僧云赤脚波斯師肯之吼林侍者棒下有省呈偈云幾番坐得冷湫湫水盡山窮不肯休今日愍忠棒下轉頂門迸出大鼻頭師看偈畢問如何是轉身句林便拂袖轉身師云者是學來底親切道句看林云撒手懸崖下飜身宇宙中師云如何是大鼻頭林云圓陀陀光灼灼師云如何是汝放身命處林云全身獨露師云法身無相獨露個甚麼林云視之不見聽之不聞師云莫向無事甲裏躲跟林便出方丈師垂語問大眾人人脚跟下有條通天大路為甚麼行不出戶坐不當堂過在甚麼處有人下語恰好者山僧賞銀一錠眾下語不契自如維那下語云雖飽無力師晚上堂云維那下一語頗恰山僧意賞銀一錠那出眾禮拜師拋出一隻履那云美食不中飽人飡師云今日賣寶遇著瞎波斯便歸方丈子濂杜兵憲問大顛擯首座意作麼生師云脚踏鴻門兩扇開士當下領旨師問杜兵憲靈雲見桃花悟道玄沙聞云諦當甚諦當敢保老兄未徹在意旨如何杜云滿面依舊是塵埃師云趙州道我在青州做領布衫重七觔意旨如何杜云壓殺擔板漢師肯之師問天皷侍者高揖釋迦不拜彌勒是如何天數日無語一日云天無二日國無二主師頷之師問寶印侍者不露鋒鋩道一句看者云透脫長安師云那邊事作麼生者云腳底不沾泥師云如何是向上一路者一喝師便打迦毘盧國僧到羅山法海寺叅師問那裏發足僧云西天師云西天是極樂世界因甚麼到東土堪苦之地僧云特來見和尚師云佛前見佛後見僧云佛即是和尚和尚即是佛師云汝作者個見解非是西天僧其僧無對僧問如何是大悟無道師云聞時富貴見後貧窮僧云如何是大海無魚師云水清難藏影處不留踪僧云如何是大地無草師云本來無一物不受半點塵僧云如何是大富無糧師云從門入者不是家珍僧禮拜云謝師答話師云知音者少黃秀才問婆子燒庵是如何師云賊是小人智過君子才云祇如燒却庵還是好心是不好心師云車不橫推理無曲斷才云婆子道三十年只供養一個俗漢意作麼生師云拏賊要贓師澡浴時常遇一僧擦背師云吾常受汝恭敬無可酬答待山僧向後去作頭驢被汝騎僧云大師是修行人作者個說話師云者瞎漢話頭也不識僧問盞子撲落地碟子成七片意旨如何師云北斗不藏身騎牛出佛殿僧問如何是明眼人師云沙裏無油不點燈僧云某甲眼與和尚眼是同是別師云橫抱嬰兒擬彰皇簡僧云獅子窟中無異獸象王行處絕狐踪師云鷄棲鳳巢非同其類僧喝師云草裏呌作麼師一日到馬太監家使者通報海會和尚來馬云請和尚進來拜佛師云山僧從來不拜佛馬云和尚為甚麼不拜佛師云佛與我是生冤家吳秀才叅問弟子特來求和尚開示師豎起拂子向空一點云會麼士云不會師云孔門弟子無人識碧眼胡僧笑點頭師問雪紅西堂如何是日面佛月面佛堂云一點水墨兩處成龍師問僧如何是狗子有佛性僧云青天白日起愁雲師云如何是狗子無佛性僧云東海波濤徹底清師云祗如狗子有佛性無佛性是同是別僧云白鷺下田千點雪黃鸝上樹一枝花師云者話明那一邊事僧無語師便打晚叅以拄杖地上打個圓相裏許寫個佛字師云諸人不得向裏許踏著若踏著入地獄如箭射大眾相視佇思師云諸人大似癩馬繫枯樁在者裏覔什麼草料以拄杖一齊打散
