body:
  text: 嗣法居士海眼編文祭始祖父母文澄虛渺渺區宇茫茫一真既顯萬物齊彰四序判而理陰陽五行定以培紀綱處世之術惟修德以彌長立身之䇿獨積善而最祥道超古往德邁今將皆從克念之致尤自表履之莊所以子孫昌𦙌譜族聯芳翰墨縱橫而露彩才華脫以騰光八埏拱顧而層翠四水朝宗以汪洋茲某九代遠孫幼離椿萱而脫俗披緇學道以參方紹臨濟之正傳悟菩提之真常聲加海內德動聖王詔至上苑談玄而賜紫引入禁林説法以開堂號封明覺敕賜金章每抱愧劬勞罔極屢疏請祭掃還鄉今惟簠簋而哀獻伏願宗祖以咸嘗於戲先哲久逝兮風化不移桑梓流芳兮德譽布彌蘭桂連蔭兮品格幽奇辭闕歸來兮御香滿衣素心一片兮稽顙陳詞白雪半甌兮聊申奠儀惟靈降納兮祖父同垂倐雲四合某不勝悲禮佛發願文稽首迦文佛金容耀十方我今得瞻禮福德妙難量某等生逢濁世幸值上乘瞻禮相好金容五體投地運想難遭妙德一心鞠恭合掌讚歎洗心懺悔禮佛若無觀想額門磕破徒勞禮佛不願度生自證聲聞小果禮佛不露懺悔何以得脫業因禮佛不願明心當來焉能證果雖知自心是佛見像發心然必懇佛通陳頓破愚惑改革過咎滌除冤𠍴能禮所禮俱空真諦俗諦融會般若靈苗不昧修證了義真宗伏願仗承三寶皈向一乘生生獲遇慈尊世世常聞正法性天廓朗道眼圓明福慧齊彰六根具足三藏玄文朗徹萬法皆空四弘誓願完成先覺後覺同登寶所利己利他共證菩提佛眼昭彰人天景仰禮佛不依吾此文猶如盲亂點頭諷華嚴經發願回向文稽首毗盧華藏主演揚妙法菩提場我今發願禮慈尊惟冀當來證佛果某等神包天地性賦威音假託父母之遺形仗承師友之教誨靈苗曩劫以栽培中國茲生而遭逢幼入空門得投佛地時聞祕密章句常瞻華藏慈尊句句直捷性門字字揭開心印慧溢覺天玉露妙湛性海金波智徹三明心通五眼真照十方剎土普利百億人天敷設法筵宣揚八十一卷玉偈歌演梵唄唱酬四十二字陀羅當知宿有因緣是以獲聞妙典伏願夢寐之際禮誦之時常入菩提道場親承龍華記莂然後不離華藏法界早證普賢行門福慧莊嚴圓通奧典願此殊勝功德回向護法龍天法雨均沾先覺後覺而共證慈光普被若存若亡以同登平等冤親齊成佛道念庵傅居士請祭晏公文生能中正死必光明立身克務本源處世溫良敦朴觀生若寄視死如歸臨末撒手便行擺脫隨緣自在終身受用之句子解道從今不弄兩片皮南北東西總莫依提起金剛王寶劍佛魔斬盡絶狐疑蓋謂生平諦信宗乘始終正眼不昧拈出靈鋒雪刃截斷聖解凡情弗被生死之羅籠靡受名利之纏縛諸上善上其可鑒之然晏公與諸公所交者義也所行者仁也所學者無上之道也所修者出世之法也以致錦繡叢中望風而吹額庶令𮈔綸隊裏毛骨以森然蹈其芳轍莫能後奠乎請文於豫前其德其風公之猶在至推至辭豫之莫免嗚呼驚風颯颯兮銀露滴衣草木蕭蕭兮山猿痛悲孤雁影吊兮𭠌翩獨飛幼子哀戚兮血淚傾垂道德綿世兮遐邇惜思心香一炷以通冥慧燭兩炬而致祭盧陵米飯飽不飢趙州杯茶點素幃仰垂鑒格伏惟尚饗歌行腳托鉢歌道人家常淡薄不種田園事托鉢每晨出谷向前村無慮無憂真快樂穿雲林渡煙水拄杖單瓢為伴侶世間無事挂心懷灑落隨緣步寰宇到城郭肅恭法袈裟整理橫肩搭踽步鴈序不傖囊隨機化導破慳縛沿門化平等行詎比阿難與空生不分貴賤俱須到一體同觀是善人佩慧刀破魔賊真實丈夫曾行得等間弗是應緣來吾佛當時有軌則夜參禪早晨去隨方應供亦無慮飯床踢倒飯堆山衲僧何曾不富貴正命食不失期日用恆規但二時除却二時茶粥飯眼前無事可思惟巖松下石為枕日上三竿睡懶起松風蘿月伴我眠細草為氊紙作被拜封侯佐扶主漢晉齊梁空思委拔山煮海握乾坤夢寐黃粱瞬息矣霸七雄殲一旦孰信修真者皮袋惟有輪王夜踰城曾作長行乞士漢濁世間人剛惡三界區區如旅泊窮煎餓炒總無知勞碌身心苦為樂金烏落玉兔起浪死虛生無定止鳥飛毛落道誰修開眼瞪瞪失却底心境空超物外風情花月了無礙歌臺酒肆菩提場閙市翠樓觀自在破院歌佛祖門將委地絶唱宗乘第一義天魔外道聞生歡恨不頓除令瓦碎古祗圜成桑地畫棟傾斜飛頺勢佛殿階前狗尿天大覺場中放牛戲選佛場久淪替敗腐榱桁難活計流離寂寞院僧殘晨昏鐘鼓無人擊燈也無香亦息一堂金像塵埋髻栴檀殿上布苔錢二時課誦絶音器法臺前生萻𧀬凄凄帶雨含煙碧金鋤剗動露羣蛇撞著歸宗難躲避弊𢖍廬雨淋濕椽柱參差倚蘿薜風吹雪霰鋪滿床半藏明月借雲宿金線瓦柳葉壁翛然安道審容膝日月為燈照我眠雨打茅窗庭院寂祖庭晚思斷臂正脈懸𮈔嗟少室無孔鐵笛逆風吹寥寥天地幾人識漏笊籬破木杓無蓋砂鍋烹日月頭頭運用莫能全隨緣免去告檀越贈速朽隱士一宿居書院歌十笏團瓢名宿居禪餘與子講詩書智府洞開人慧目胸茅提钁勵揮鋤𢖍門低雖小窄大開獎飭延賓客馬融絳帳善高談叨倍禮樂論孔德布衲衣桑緯帶身居塵裏心超外清軒不用繪雕飛守道安間誰比賽為釋子蹈儒家喚作毗耶又僧伽登佛階梯秉律戒藍衫脫去著袈裟小祗園容膝安粗茶淡飯意常歡竹榻幽窗翛然坐豎起脊梁透死關氣宇洪大丈夫騰踏當前捋虎鬚赤手掀翻佛祖臼管教頓悟繼馬駒深晦迹淡功名為僧正好撑祖庭等間拔置千峯上莫受聲籠被陸沉破衫歌真道人不圖樂穿個布衫破落索不生蚤虱不沾塵無冬無夏隨身著亦無減亦無添寒巖凍裂體安然縱使炎蒸終不換祗將者件度殘年懶漿洗懶修補不用火浣燎垢土自從者領出青州豎著橫披傲佛祖裁不長促不短原非造作與針指人人向外飾籹嚴誰信珍珠破衣裏成得難毀不易破了囫圇真活計有人問我解何宗拈起布毛直指示破衣衫褁身體出入隨緣周遮裏曠劫已曾穿將來破了如今補不止新不喜舊不棄日當袈裟夜當被世人莫笑我貧寒佛祖家風亦如是日時穿睡時著晝夜惺惺不放脫誰人愛惜破衣衫堪笑紫袍多失却窮釋子甘淡薄通身粉碎已零落有人識我破衫風大家同體一般著和寶志公十二時歌平旦寅夢眼揭開觸處真玄妙目前隨展手一番提起一番新覷不見堅密身堂堂獨露本來人廓達古今無住相蕩然無物可相親日出卯碌碌異端生計巧孰肯安道守清貧藜羹藿食隨緣飽須彌山直靠倒佛祖當頭竹篦掃石女腰邊佩靈符奪却驪龍頷下寶食時辰穿衣喫飯是阿誰動靜面門常出入從來不悟亦無迷赤裸體絶離披清淨法身不染伊聲色若離求正道避巖投井實堪悲禺中巳日到簷前將正午衲僧活計钁頭邊切莫抱株待守兔擬即差墮鬼窟學道先須求自悟了知罪相本來空凡聖同源無二路日南午日到中天無回互北斗藏身沒影蹤坐破無篐黑漆桶越三祗超佛祖不被凡情聖解使靈鋒寶劍𦦨光寒妙用縱橫常在手日昳未妙性圓明絶了義現成公案不須參達磨面壁小兒戲頭頂天腳履地世出世間無倫比漚滅漚生全體真歷劫無明彰古鏡晡時申二六時中雜用心一旦忙忙空過了百年瞬息老光陰急轉念驀追尋癡人喚醒莫酣沉通達一言了義意聞聲見色即圓音日入酉弗覺剎那減一壽巡官掌上密推尋出入行藏無位次也無頭亦無足萬里雲天翔俊鶻晝夜舒光騰古今即是如來大圓覺黃昏戌窮途旅泊遠投室枕子落地驚醒人拈得口來失却鼻昔時人今不異歷劫同居無諱忌照鏡尋頭棄本真癡人向外徒勞覔人定亥夢寐鬼拖臭皮袋覺後空空無大千一念起邪遭魔怪無位人超三界常在途中不離舍舉足動步運騰騰賣花聲裏觀自在半夜子無夢想時空佛祖死生靈覺沒相干萬象之中全體露祖師禪不須悟擬議搜尋即迷路絶學無為間道人胸中不著個元字雞鳴丑未了之人莫放手醒來豎起鐵脊梁牙關咬斷金鎖鈕無價珠人人有火燒刀割豈能朽圓光寂照體如如頓覺無生親自受和中峯樂隱詞逈絶羅籠頓悟真宗臨濟喝眼聵耳聾頓開千眼脫三空却善應機善大用善藏鋒問道高峯撥草瞻風超方眼辨主賓中乾坤坐斷佛祖無蹤唯經入藏禪歸海潭潛龍心了無羈鄽市可棲隨放蕩不落時機圓木為枕破甕壘扉也不求榮不求樂不求施雲洞石樓竹簾樹鈎金風扇松月清幽荷衣棕履砂銚瓦甌但度殘年度寒暑度春秋心空便休生死都勾谷藏拙樂道無求松竹為榻野猿伍儔尋常吟風常嘯月常歌遊茅屋荊笆山巖桂花馨滿室風弄影斜好居崖谷弗求榮華却烹石泉烹月餅烹雨茶歸宗斬蛇體用相加斷情識不喜奢華心超物外身處林崖樂有松花有蕨粉有芋茄甘泉苦虀住山相宜心慕道康樂自娛眠雲嘯月蹭蹬巖嬉但看落花看流水看鳥飛妙理難量離相名忘絶對待趺坐繩床廓開鼻孔滌濾心腸也懶看經懶拜佛懶燒香性絶驕奢意囂繁華度寒暑百衲袈裟入鄽垂手坐白牛車但不喜嗔不喜怒不喜誇龍象交加英俊爪牙機撥轉頓悟心花西訪甘舍東謁龐家請保福瓜仰山飯趙州茶野菜時餐荒草枯刪一念斷萬事靡千韜光林下笑傲人間已眼空佛耳空祖心空間住山多艱處世更難絶攀緣無事心間選勝金谷巖壑禪關有一株梅一溪月一畝山佛法平常心歇顛狂是與非不較短長翻經石案補衲山房有虬柏蒼蘿月照松風涼璇兆無窮時候非同好景况山裏家風門前水緑屋後花紅有春穆蘭夏金蓮秋玉蓉鶴髮仙翁騎犢村童禮貌踈見人性慵弗言世諦但談厥中不好栽花好種竹好植松送知見上座歸雲集庵知見立知靈露角尾拖泥知見無知鐵牛不産石麒麟伶俐衲僧知不知為汝道破莫狐疑春光將暮溪柳垂𮈔煙花繡谷杜鵑啼集雲迤邐觀山水大塊勞生志弗遲草庵切莫偷間坐推倒銀山黑漆屏超方須用驅龍手捏碎虛空大地平示端典座漏笊籬破木杓尋常動用莫忘却生味調和變熟香一莖虀菜大家酌後生鋭志休辭勞佛法堅心用苦學直須徹見本來人莫把光陰容易錯他日淨瓶躍倒時超方拔萃為高躅送僧之大明府訪玄祖塔秋水澄清兮秋葉黃白雲輕薄兮氣漸涼杖頭卓破溪中月鞋額衝開嶺上霜古渡金風掀篛笠疏林玉露滴衣裳野水連天兮霄漢淨草店雞鳴兮客夜長若到滹沱須卜築艱辛創力開荒鍬鋤縱橫兮覔靈骨浮圖湮沒兮久滄桑一喝重扶玄要旨四賓主句善敷揚濟祖真風今古震垂蔭兒孫遍界香送惺如禪人之錦城銀露涼桂魄皎白雲黃葉戰空飄寒色侵人枯木草眼含紫光兮照破蘊空掌握玄機兮青天電掃孤逈逈兮絶依倚寥落落兮自襁褓窄時寬兮不須量舒時卷兮靡用討舉目抬頭便磕著不是佛手非驢腳努目擬時鱉鼻咬大蟲汝若會時牙齒原是骨惺禪惺禪若到錦城莫錯舉扶桑人種陝西田明覺聰禪師塔銘并序通議大夫吏部左侍郎前經筵講官內翰林祕書院侍讀學士馮溥撰粵自聖王御籙苞符啓著遂有靈傑挺生為龍為光蔚為景從嗣後西方聖人崛起厥與儒道並隆良有以也欽惟世祖皇帝天縱英姿神功武略萬幾之暇雅志禪宗總持三教之全化育斯民之要幸我憨翁和尚賦性異慈惠廣被篤生應運適逢其會一時問答機緣不減都俞盛際夫一代巨典史氏載之若茲帝僧良遘可無筆述以記其顛末哉按師諱性聰字憨璞閩人也俗連姓母章氏庭前夜坐見星入懷感孕後紅光蓋室師生焉年十有五歲出家天王寺越三歲乃祝髮至年二十有五恥州縣庸碌僧不足尚慨然動參學之念由是出遊詣支提山本輝法主習教數年乃知經論之學非究竟法也辭去主曰汝要成龍須歸大海始往南海普陀巖大雲和尚處圓具足戒入武林過夏遇默淵師開示宗旨自是頓發疑情鋭志參禪矣見永覺大師教從萬法歸一做工夫迄一年如蚊子咬鐵牛直無下嘴處參紹興東山爾密和尚驀然有省晚詣方丈白其所得密頷之時天童密老人宏濟宗緇素雲臻師臥病延壽堂幾瀕於死書偈有八苦煎逼靈符護肘之句是秋抵溫州參魚潭語次潭密加印可為法通古淵和尚首座古問興化打克賓意旨如何師云嚴父出孝子古云且道他還草去也無師云知恩者少負恩者多古便打師一喝解制擬往金粟至杭州聞百癡和尚住黃岡太平寺道邁諸方特往見問罽賓國王斬師子尊者因甚手臂自墮尚云自作自受師云還有過也無尚云南泉斬貓歸宗斬蛇喚作有過得麼師云今日親見古人作用也便禮拜遂命掌書記一日呈十牛頌會百和尚意退隱天台參林野和尚問答頗確命職維那因飯中咬著砂大徹洞山雪峰淘米公案其膺頓釋作偈有無端彈破牙猢猻沒尾巴之句呈方丈林深肯之後百和尚住瓶窑長慶復往瞻依百贈師偈云劍戟鳴秋世欲康買舟先我渡錢塘應知此去雲山杳豈料今來草樹蒼倦策喜同撑破戶輪槌煩任震虛堂他時熱面輕翻轉勿作克賓孝順郎丁亥冬百和尚受金粟請留師住長慶戊子夏付師拂子是歲辭歸徑山住靜己丑春臨安邑侯劉公請住錦山觀音禪寺庚寅夏入金粟祝百和尚再為首座百題自像讚有一肩重擔足千鈞分付錦山聰長老之句極付法衣源流蓋自是師嗣百和尚出世振臨濟宗矣辛卯餘杭都諫嚴公及諸紳縉請主法喜寺壬辰杭城禮部陳公請主廣福院未幾仍辭歸山二六時中豐儉隨緣越三歲以門人化被四方闡揚道法故憨翁和尚名重金門都人紳士削牘禮請丙申渡江住都城南海會禪寺蓋而師之道法傳聞帝庭矣先是丁酉秋師感異夢遲明世祖皇帝駕幸南海子道出寺前止輦命近侍延師出師云山僧踈野愚昧曷以仰瞻天表近侍云皇上為國為民深重佛法向和尚久矣師即便衲出山門傍立上出輦顧視久之頗有怡色命歸方丈暨回輿即命近侍問師俗家址藉幾嵗出家年若干歲何緣挂錫海會師具書委悉回旨連遣官致問者三次日駕幸海會寺方丈師立門左上喜逾時而去十月初四日僧録司傳旨延師入萬善殿命內院大人看方丈安單別山禪師偕僧官陪候次晨駕至安慰至再至三夜漏五下近侍傳云駕到不用和尚接送不行拜禮上至方丈賜坐問佛法公案師應機酬對上喜賜紫衣問答經旬文長載語録中師知上意欲留久住禁庭奏云臣僧愧領衆匡徒海會衲子望臣久矣上鑒師願力真切遂送回寺戊戌春結制期畢金佟固山等請主延壽禪寺師即奏聞前事戊戌春結制期畢金佟固山等請主延壽禪寺秋九月上幸海會問及監院洞玄跪奏其故上回遣大人近侍之延壽問慰十八日上親幸延壽方丈甚喜承靣召請師入內萬善殿結制開堂上乘馬屢顧師謝恩二十九日回海會十月初一日僧録司延入賜紫宣海會禪客百人俱入結制旨問道法凡上堂小參不輟既而風扇大都王公大人三院內外向師之切矣上又問南方尊宿師單名奏起復有大覺弘覺之封己亥春賜銀印敕書封明覺師號敕有戒律精嚴規模淳朴迹超俗外恆持不染之心理寄忘言了悟無生之旨引入禁林召開覺路邁次第之禪者等語謂師始創宗綱於禁林獨為三覺之首也師素機用殺活縱奪始終一如復奚愧哉住內萬善殿八越月四月十五日辭出六月上幸海會問慰九月詔入敕愍忠寺結制庚子春回海會屢疏南旋未允秋七月又疏請八月奉俞旨準行辛丑入閩祭掃畢邵武邑侯胡公紳襟等請住安國禪寺制解如省成掃費和尚塔過建寧府適地方官奉行查皇戒牒以師敕印疏聞今上敕地方官還之回住安國六載修葺頺廢一新丙午年十二月初八日戒期圓滿知世緣有盡集大衆付遺囑散衣鉢十三日午時索筆書偈云今年五十七捏碎娘生鼻一生受用中無得亦無失昨夜兩個泥牛閗入海直至如今無消息咦真消息今朝西廊打倒東廊壁收拾傀儡歸去來莫教特地成狼藉放筆右脅而逝蓋自是來去分明始末聲光蓋天蓋地誠哉如來復世矣師世壽五十有七僧臘三十有九嗣百癡和尚癡嗣費隱和尚隱嗣天童密老人師天童之滴派也迹其生平參大善知識十餘人住大剎十數處語録十六卷付法弟子寂空海鯨等二十餘人舍利塔瘞于樵川台山安國寺右豫惟憨翁和尚道眼精明鉗錘老辣且誠朴純謹大類儒者成己成物行履確實不屑屑取辨口頭機鋒落世套活計俾天童一燈孤孤逈逈下之化導羣迷同臻彼岸上之感通聖君大轉法輪不墮人天小果聖諦不為冤親平等以彼寵遇恩隆誠堪耀古騰今增輝佛日豈偶然哉豫前珥筆禁苑侍從世祖章皇帝所以悉禪師梗概又采嗣法門人吼林鯨公編輯事實總其行住大略如此是為銘銘曰聖王御世鳳瑞麟祥道洽德僃虎驟龍驤者老古錐巍巍堂堂閩寰降迹蓋室紅光秉金剛劍佩扣諸方志要成龍讖曰東洋梅子既熟桂樹彌昌金粟擔子一肩承當大江南北十坐道場正令全提如師子王高豎赤幟萬指翊從宏祖道太白家風漫天網布打鳳羅龍法燈遍照名為世重禪學如雲巨卿王公鉗錘海甸導利帝鄉天子勸善寶敕金章召開覺路大啓津梁賜紫談禪三覺始彰奏準南旋錫據樵陽為霖為雨乃梯乃航風回帆轉界莫囊藏泥牛海閗木馬火翔去留不吝得失無妨天華散彩佛日輝煌奠安台山入靣玲瓏行果圓成出世功終破砂盆碎正法眼空一念萬年奕葉永弘嗣熖聯輝光燭無窮時康熙六年歲次丁未五月朔日明覺聰禪師語録跋蓋聞有王者興後然有名世者應有名世者應則非常之政出焉世祖章皇帝起自北徼提一旅而正天統是非興王者歟明覺聰禪師一布衲耳褒封號而贊助無為是非名世之應者歟故易曰雲從龍風從虎聖人作而萬物覩是皆關盛衰之嘉運協天人之化導蓋千百載而僅一遇之耳世廟仁慈天縱睿智生知識空宗大有益於政治故於萬機之暇丁酉歲首召見禪師於萬善殿奏對佛法大稱宸衷賜紫伽𥠖回寺未幾駕臨海會戊戌歲駕又親幸延壽慰問迎住萬善殿其冬請示禪規於內庭公升獅子寶座弘轉最上法輪而諸徒衆亦機鋒電捲棒喝交加上親幸座隅諦聆法味見龍驤虎驟不勝鼓掌稱善己亥春制解公即推薦諸方先達蒙賜明覺師號敕印仍歸海會駕又臨顧如前是歲以太皇太后參究有省上敕中使傳問實際理地公具答之回奏喜甚太后遣供四方新貢奇果其秋山翁老人召至京上復宣入內敕愍忠結冬駕又臨顧而中使馳問絡繹逮無虛日庚子春以修笑祖塔事訖歸山之疏凡三上不允至秋始準安間林下賜贐千金遣大人護送公力辭不受然蒙皇情惓惓猶不忍離命繪公像請留木楖栗以供宮中為去後之思遂啓途嶺表嗟乎人臣積勳勞數十載而至宰相或蒙聖主遣使顧問遂榮奕纍代名標青史照映今昔而公屢蒙朝廷不次之恩四移聖駕於泉石慰問彌至一播祖意於宸廷喜溢天顏手疏報恩見僧中之藏古佛轂推天童驚緇流之有鳳麟未盥潄而履滿戶外一啓吻而澤被萬方然終抱朴素曾不改山林之風度其言訥其行真其出之也謙而不暴其持之也靜而不矜是以一時侯王宰輔見之莫不加額而心折良有以也然豫嘗考歷代之賜號闡法者公之去住蕭然小心敬畏大約與宋之大覺懷璉同而以文華表見當世似或遜之如以道眼機緣洞當人之性源實不相上下仁宗宣懷璉而得明心佛旁探釋典以俾補萬機四十餘年號為至治然承平之際易以為力獨吾世祖當龍騰虎變定鼎之初人事傍午而能研玄世外振耀禪宗以明心之學陰翼皇綱自非悟獨出於尋常萬萬者烏能為哉宸衷每憂滇黔之皇澤久阻庚子明年亦蹶首歸仁又明年海氛消遁慶雲瑞星屢見重譯輻至中外大穰文武恪忠四方砥平自非非常政之劫驗者歟公歸安國七年而終庚戌春其嗣吼林鯨公持禪師語要一十六卷扺三山豫得而讀之言言截鐵向上全提流露胸襟足以愧當世之濫觴筆墨者靖藩包佐領熊公今之龐老也又有護國朗公向輔車以為善持稿引見熊遂急鳩資以繡梓欲嘉惠後學可謂具眼矣禪師諱性聰字憨璞賜號明覺閩之延順人也嗣法金粟元元嗣法徑山容容嗣法天童悟悟機用巖峭號臨濟中興容法眼離明推宗門帝匠元咄嗟璠璵祖苑白眉三代同時唱導諸方咸推尊之今吾憨公又能大其家聲遭遇世祖霈甘澤於巖廊扇宗風於宇內益見其鉗鎚有自也夫益見其源流有自也夫康熙九年夾鍾月之吉雪峰愚叔行俊謹跋音釋懇口狠切音墾至誠所求也踽顆羽切音齲疏行也籙盧谷切音祿籍也帝王興膺籙受圖順天行誅盥古玩切音貫以盤水沃洗曰盥
