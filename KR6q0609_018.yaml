body:
  text: 嗣法居士明哲編書問與息齋金太師昨承台輿幸山叨沾晤敘如獲猛風乾蘇之談以得驟雨濕薪之喻頓令延想䇿勤俯詢始知深養道德福祉綏安加以智鑑洞明神機密運頓證不二之門深入五宗之海蓋不忘疇昔靈峰之記莂也茲海會者遡本袈裟之院幾為縱馬之場自山野卓錫以來修葺少成藂席皆十方信施脂膏四海衲子血汗今寺舊僧井檀護合意願作宗門祖庭改為接衆叢林故山野不請玉帶鎮山門但丐琳篇護精舍伏祈光放筆端永垂真珉不朽耳候天陳禮部時惟歲暮梅玉流香每逢朔風吹面明月穿窗恍乎台斾之臨辱也山野自請旨南旋旅寄秦郵計在閩回故不能親慰起居特遣侍僧馳候少舒積悃之懷臨楮莫禁神預弗備答汾陽朱太史素聞朗識際天弘襟蓋世瞻注神搖於霞洞企慕色映於風橋而以忠孝至仁克己去私惟明德之本者也客秋蒙台教下頒招山野協修祖塔幾欲䇿杖造汾時應制禁林未遂此行耳苐昭祖窣堵乃前朝敕建當時必有慧眼針石其地以為闔郡福址邇聞孟浪之談有障貴府風水矧斯塔至今已歷六朝觀夫汾陽邦居稠簇麟鳳蔚生道無損乎地脈遡不礙於古詎礙於今耶諒居士為國鴻儒璇機洞鑒必不以荒唐之言而毀千古之聖迹惟冀俯垂獎飾鳩首建若能一土簣成則天下知識合掌遙讚矣山僧即當奏假掃塔至謁崇潭諸餘面罄以復與慧庵佟部院社稷元臣朝綱偉器善調玉燭之樞機援救涸魚之厄海岱奇而育秀冰霜歷以神完復功猷輿情實洽能逃潛於密機甘退食於抱甕懶揖賦歸三徑問道精修一乘輔翼金湯深信禪教性根宿敏頓情覺俗為真忠簡帝心自愧青錢益念所謂選官為貴名望斗山選佛至尊道超河海遡來官長治政修心遍參知識見道明宗須經敏手然處塵寰不與諸塵作對所以隨流認得性無喜亦無憂即世出世間之妙道也屢承枉顧愧領厚惠敬通素緘不及面致伏惟電悉曷任光榮答汾陽衆紳襟鴻都俊逸文星輝映於丹衢麟閣英才奎璧光通於碧漢抑能傾信禪教撥開塵網悟心宗弘讚法門建樹風幡光祖道因秉夙願佐弼金湯為憐正法之頽零誠念宗風之寥落蓋不忘靈山之囑者也茲澄徹法孫緣在貴郡修理昭祖窣堵全憑摩詰維持聚沙以成寶塔插草而建瓊樓始終不異萬德功全山野雖未覩光華肝膈久注聲名正在懸思之間忽得台箋之召即當趨命從公時以皇期未解尚俟因緣䇿杖當前謹勒寸書統祈丙鑒以復答𨍏轢嚴居士仲名在北河舟中得捧翰教深知門下風規傑立佐翊法門玄機疾利振宗綱頓令魔壘冰消庶使祖風不墜矣又承頒賜語録并魔吞普持諸書焚香啓讀肺腑洞然言言剖露私弊句句剷絶邪蹤而垂手提處令人湊泊不得所謂格外之人方用格外之機誠為法門之標幟也前侍僧回稱頌門下一露三吐哺一沐三握髮然於十笏室中嘗容八萬獅座誨人無倦接物有方遂令福嚴正脈流通踵接芳塵而慧葉遠蔭矣不勝欽羡謹謝又久聆道範未覯尊顏雖云別峰相見鄙膺歉抱又何息哉客冬汶兄至樵咨詢四大調和興居安樂道行挺特法眼精明固作人天之筏喻以為燭世之慧炬所以法門全仗大力量人破邪救弊振頽宗綱庶俾祖道亘千古而不磨矣茲命小徒往燕道經秀水恭肅荒函少申瞻候惟冀照亮弗備答易齋馮吏部每憶高儀神馳注念忽接手書少慰渴懷苐居士當朝冢宰區宇上客能以學道為重不被名利所汩常推出世之因頓破塵羈之網雖在治世之中恆為受用加以俯循時宜不徇利弊可效原憲素風而垂範後世者也適來著語頗恰山僧意然雖如是更要進步上頭關從上鴻儒宗匠舌頭不爾欺也與秋潭李孝廉昔到海會相見時便能言句相投道義契合往來親扣將有年矣山野嘗與提持個事激發宗乘即會世尊拈花教外別傳之旨可謂如龍得水似虎靠山然剖竹垂仁維持綱紀道風遠播顯煥宗猷方可為人天眼目作四生梯航故從上鴻儒多為宗門柱礎所以佛道儒道共為一家禪門教門統為一理如斯智眼圓明普應無差信手棒將來掃斷凡情聖解隨口喝將去不落見聞覺知可謂作家宗郢矣更有一偈囑之以表後人敬信自當保任答子濂杜兵憲前接來書見其言句頗有進益之功但學道貴乎正信所謂人能弘道非道弘人必須根器敏利方能洞契玄旨廓開向上機截斷知見網念念無染法法解脫不被佛祖言句換却眼睛自己腳跟始穩當矣據居士省發偈末句云睡眠坐臥在長安雖會根境一如寂然不動感而遂通神機冥合三際體空猶未是放身命處切莫坐守幽間更須深入閫奧透過末後牢關方到不疑之地然後任從咳唾掉臂總是西來祖意惟冀留神保任以復復汾陽祖塔院主澄徹法孫去夏專使馳書至海會得知吾孫創業艱辛凡為一切勝事多有魔障所撓必須堅持固守方可簣土成山客歲老僧曾有書與朱太史使其保障法門必不以為却今春寧公蒞任漢中路順山右省城老僧面託令其轉致撫臺白公竭力佐翊克成勝因第塔宜為低小弗可拘舊址高廣度其時世所行功幹亦易就矣值鴻羽便特咨爾知之答月江方翰林適來問頭但未知居士是何心術故意難問耶探問耶或相信得及來問耶若論佛法吾與盤桓許久稍有相為處何待今日置個問端答得的當開汝迷雲願為終身弟子者哉已前相見機緣彼此相投豈不具眼耶伏惟珍裁弗悉侯武夷壽宗禪師暌違道範渴慕芳規每瞻風采於詞垣素慚萍梗於參濶有稽候悃未遂鄙私得便鴻翔聊將問慰足下獨宿孤峰惟抱擎天之志身遊大野實起濟道之風掃却三玄縱橫機超物外空諸萬有坐斷報化佛頭名占夷嶺之尊道震崇潭之重春雲翠潑山川瑞草香浮巖壑雪烹龍團浪翻蟹眼吾兄卓錫於此日用樂道無窮行躋南陽之儔坐置高庵之理素有鄙志欲躐高蹤未知六六峰頭三三水畔尚容豫杖笠之寄乎弗罄遐思謹此以慰疏重修觀音寺疏條令初行法堂前草深一丈象龍乍至佛殿角風折半邊八面玲瓏十方通暢安衛簡靜必須帳合繩床打坐參禪尤恐霰翻滿屋苟遇作手折壁補籬不用神通插草成剎長連牀上任憑噇飽橫眠不下單前以接善根大器經行磕碎露柱問訊撞倒陳如若有一人發真歸元管取檀那悉皆獲福重修極樂寺大殿疏瓊宮梵宇將為荊棘銅駝寶相金容幾受風吹日炙門窗七零八落薜蘿緣柱色蒼蒼羅漢東倒西歪明月穿簾影寂寂雖憑僧行修猶仗檀那協助換舊添新移花兼蝶至拋磚弄瓦買石得雲饒佇看殿閣聳丹霄况有雲霞護碧徑香煙裊白繼佛祖以千秋燭影搖紅祝皇王而萬歲早脫娑婆同登極樂募造靜室疏既離塵世竟無地可棲身卜得山林擬卓錫以養道爭奈空拳赤手全無片瓦根椽障兩蔽風猶賴鋪金插草開山掘土宜尋鐵額銅頭將揮郢匠之斤預選鄧林之木搆成蘭若石頭亂磊折腳鐺鋤盡荊蓁墻腳自種無根菜不用三條束腰每餐一鉢爛浮漚衲僧如斯住山佛祖欺汝不得化米疏闤闠門頭雲水接踵無定數通津要路象龍踢踏竟成羣推倒飯牀粒粒仰山血汗打開倉庫顆顆廬陵脂膏須從筆下施來現成盤中受用凡聖飽參檀那獲益募知浴疏清淨法身膿滴滴地蘊藏妙性發湛湛光古靈擦背好個殿堂德韶澡身摸著鼻孔庶使通身白汗流出實際紅塵不染直饒證離垢時還歸檀信福力化茶疏龍圖異品還他春谷衆芳尊雀舌味佳戰退炎天三伏暑玉碗緑浮蟹眼銅瓶白泛雪花入門不問主賔請坐和盤托出莫論新舊到來禮度如常欵待院主不須擬議檀那直下承當特報知音毋吝出手重修海會寺疏海會者象龍交參聖凡共集之選佛場也坐燕都之城南踞海子之門北創自神廟頽於熹代蓋而歲積年深諸楹浸漬紺殿風吹零落寶垣雨打傾潰朝宿野雲夜藏村月薜蘿繞柱雲封法鼓暮沉沉蛛網牽窗煙單經鐘曉寂寂雕梁畫棟翻為燕壘雀巢寶樹瓊臺竟作棘林蔓地剎竿毀久已無衲子辨風幡法座猶存况有作家施棒喝今則重興梵剎全憑插草賢于復祇園猶賴布金長者宗風永播佛日恆明人人福慧圓成個個菩提果茂重修石門寺疏錦邑山川始從天目發脈金溪淵水猶接石門溯流峰巒峻峭龍象棲遲宋代開基殿閣直干霄漢清朝頽朽聖賢潦倒塵堆法堂草莾落殘星門壁疏斜邀冷月晨昏禮誦雨雪飄濕禪衣坐臥經行松風每侵殿角某僅發誠心願充修葺既要功成香剎必須仰叩毗耶移柱換梁要擇良工好手修墻補壁還他巧妙機關猶恐獨力難成敬請大家出手重興彌陀庵疏高沙城境地接維揚隘口關津舟通帝闕乃江淮之要路水陸之通衢故創祇園於甓社闢荒地於文臺雪浪珠光媚川照於泳府神山爽氣春色繡於芳丘既遇希奇勝地當營廣大道場雖有卓錐之地慚無片瓦以蓋應倣楊岐之縮頸誠為衲子之安居欲思叢席頓成招賢納衆然必功歸檀信福報無涯重修上方山大悲庵疏古燕名山上方聖迹為首菩薩度世大悲顯化最尊今夏忽遇洶濤衝頽紺宇墻壁傾崩金像風敲雨打禪房破落衲衣露冷雲侵欲思祇舍復新須憑檀信領略普願傑力匡扶大家必定成佛化油疏內放光明所以輝天鑑地外憑好手固能打鳳羅龍投子覔知音拶著通身汗流出錦山化善士福從減口種將來明月松軒清虛四壁玉浮砌琉璃寶殿燦爛一堂金妙容果能放大光明定是燃燈古佛化鹽疏營饈美味不如馬祖家風赤梢錦鱗淹殺夾山甕裏調羹雖然好手生熟未免鹽梅五祖二碩休糧錦山一碗淡菜惟冀檀那匪吝自然衲子飽參任從千般不離此味募遷楊岐庵疏錦封麟閣鐘鳴鼎食豪家佛舍祇園晨昏祝讚檀信林泉簡靜龍象晏安欲將寶殿更移拋磚弄瓦卜得山川秀麗鳳舞龍翻求珠不離波須仗作家好手試玉雖經火全憑巨匠輪椎蓋篛笠於佛頭位登九王插莖草於梵剎福等三千打開解脫門頓證菩提果募造天水禪師塔疏牛眠壙穸銀盤盛雪影遮藏馬鬣封埏玉兔籠雲身正露開山鑿石須請公輸徒子入海採珠必叩給孤長者疏山造塔帶纍匠人脫落眉院主成工引得羅山笑破口煙霞生背面石樓人玩杏花天星月繞簷楹山舍鳥啼松影動者裏藏身處沒蹤迹沒蹤迹處莫藏身折合終歸玉井欄廓達虛明碧眼鑑募氈帽疏蜀地生錦牛女對月織機虛魯邑産裘良匠趕絨成玉頂若思古儀章甫須乞今時毗耶凜冽嚴寒小子𣯧縮項短髮堆雪老僧整式加冠謾道禮樂有殊從來儒釋無別雲氊和暖好過殘冬開義井疏武林江渚麟閣蘭臺幾萬家玉池石邊紺宇風幡數十寺廣福內填舊井山門旁開新泉掘泥擡石須憑鐵鑄金剛布帛揮珍全賴豪門善士揭開萬斛泉源普潤十方枯稿如斯善利豈小補云乎哉重修銀山法華寺疏神京之北區有銀山鐵壁乃名迹也其山峻秀頓落羣峰雲擎怪石飛勢爭奇尚有佳景碣石存焉瓊山嶂麗儼然水墨屏風古佛崖幽宛若神仙洞府松蟠龍狀半遮風雨半遮庵説法臺懸鳥語泉聲皆般若白銀峰光射斗牛佛頂峰青連霄漢乃鄧隱峰之開創蓋感屢朝之敕建迄今年代既久盡遭風雨凋殘殿宇傾斜廊廡圮毀山僧到此目覩心傷鳩集本山老幼僧行欲其共勷復奈何工費浩繁未免仰祈大檀打開寶藏伏願傾出驪珠祇園整麗宗風再扇功德無量開元寺募齋僧疏夫龍蟠勝地鳳舞名川漳水繞一剎之鍾靈瓊基奪羣峰之秀氣苐開元寺者漳郡首剎閩海名藍唐盛世之敕賜羅漢琛之開創寶殿嵬峩曉鐘開萬戶法堂磊落雷音醒羣迷稽古聯燈續熖邇來異俗移風將佛殿作公堂改僧房為俗舍佛地凌圮僧行希鮮良可嘆也豫昔因事寓此有年曾請升堂而説法傳戒以利生今得六牙禪師弘濟道振佛紀綱普集十方賢聖廣延四海英靈只因煢力難伸仰憑檀那出手打開解脫門傾出廬陵米滿堂龍象飽安然無漏福田靡可比募麵做齋化盞飯疏萬頃隴垂雲黃金秀浪一旋磨灑雪白兜羅綿若要飛麵施來須從檀度傾出輒募豪門盞飯例分信施饅頭滿盤托出珠璣積福深如滄海恩歸有地果報無涯引錦山齋單引龍驤虎驟滿堂意氣崢嶸鐵額銅頭赤手掀翻巴鼻心空及第何妨日享千金鉢盂雖餐未嘗咬著粒米鐵餕餡百味具足木查羹一頓搬來所謂瞎驢噇飽橫眠知恩有地金牛作舞慶讚以報檀那若會斯意不虛應供法喜齋單引香積國裏維摩本有家風南泉山中甘贄親曾設饡菩薩子洗光嘴唇鐵饅頭木䭔子韗得肚皮飽獅子兒捋下臉皮心空佛眼空祖安居破席睡間間果能如是萬兩黃金也合消設或未然一滴清泉却難飲海會齋單引五臺山上雲蒸飯四海傾翻水煮羹試請檀那齊出手掇來海會供禪僧廣福齋單引名山浙水船來陸來廣福門開人到馬到若要草料喂足必須摩耶揭藏開庫欲諳廬陵米價全憑甘贄倒廩傾倉俊俏僧噇飽從他倒睡英靈子肩包任爾橫行豎拂敲牀直使偷心歇去揚眉瞬目總教撒手知歸豁達及第心空展轉報君多福施茶引千佛出世説法輒多八福良田施茶第一金甌關要人馬頡頏不停白鹿通津舟車往來無息時當初夏炯炯赤帝狩天序維九旬蕩蕩薰風匝地全憑有力檀那止渴望梅必仗真心道人入鄽垂手大開趙州鋪一滴戰退睡魔軍非比盧同茶七碗能醒昏沉夢玉甌沉蟹眼勿疑弓影盞中蛇鐵鐺煮瀑泉可信浪花鍋底雪舌端了味明祖意唇皮打濕會禪機贊栴檀瑞像在燕京鷲峰寺佛升天宮為母説法優闐思慕請刻三匝四八妙像繡端嚴惟有梵音雕不得佛下忉天鷲嶺來見像摩頂授記哉待吾滅度千年後爾往震旦化金臺自唐顯化到雲間又住金陵航海去大元時自住皇宮頃出九重愍忠寓後選名藍住鷲峰如今腳跟方穩據聞名便發菩提心見者皈依超苦類隨所住處度羣迷自去自來無伴侶我因受請住海會雷轟瑞像鷲峰寺懷香誠意以翹勤合掌皈依讚不已瞿曇出山相夜踰雪山兮漆桶自墮面貌如柴兮兩眼鈴大裸飾餓飽兮脫空成道連忙走入閙藍莫怪雲門一棒何謂如斯不合教壞人家男女多寶佛塔過去劫中多寶佛全身塔裏湧祇林親分半座如來坐聽法三周讚世尊風振幡鈴雲閣響珠懸龕室雨花紛入鄽垂手原無二誘出窮兒火宅門彌勒佛天上無彌勒地下無彌勒桃花渡口趂風流剛被時人喚作賊雙眼湛湛秋水波張口呵呵乾坤窄烏藤布袋一肩挑臨濟白拈偷不得攤向街頭與人看裏許屎橛臭蘿蔔身居兜率示現明州入鄽垂手逐類隨流放下破布袋心空恆自在不自在當來下生度人債澡身忽喚蔣摩訶擦出眼睛驚恐多若是作家知捏怪一拳打倒也懡㦬觀音秋月禪人請妙性空圓身現塵剎四不思議無畏説法雲冉冉風戞戞紫竹林中獨坐時一輪秋月照禪榻聲不離色色不離聲鳥啼花落大士圓音見聞苦妙相難覩求男得男求女得女四不思議或慈或怒如月在天無處不普示作莊王女大地衆生母送子五濁世中現女身呆郎被賺念蓮經黃金鎖骨無人識只見沙灘夜月新馬郎婦三十二應隨類現大悲誓願度迷津噉開螃蛤露慈體示化人王顯聖真螃蛤相竹林獨坐不起於身現剎塵相運慈悲心馬郎被賺念蓮經二十五聖伊首名頓證圓通從耳聞十方擊鼓一齊聽李如滿居士請身現娑婆三界教主慈悲甚深權顯為母若遇巖頭一拶時管教者個拋落水達元禪人請送子或女或男應現身拖泥帶水太婆心籃提錦鯉街頭賣不遇知音爭得金魚籃道岸禪人請閉目澄心孤巖獨坐從聞思修入三摩地剎塵説法十四無畏攝化羣機證圓通娑婆教主不退位慈濟圓通門顯示真實相從聞入思修普度人無量孤岩獨坐竹林中救苦尋聲應供養淡夫禪人請接引佛五濁衆生難調制剛強纍造業心病捨已從人太婆心接上慈航猶不信古宗禪人請達磨西域貴買東震賤賣初對梁皇已自納敗反纍兒孫都欠禪債思量徹骨恨難忘拋向嵩山風月曬窮相活計坐九年想是夜來無被蓋月庵禪人請開國展旗至魏邦一言不契自慚惶折蘆渡水腳跟濕面壁少林露賊贓悟本西堂請的旨單傳拗直作曲面對梁皇還云不識因茲渡江嵩山面壁鈍置神光斷臂立雪咄咄分皮分髓大無端幸自剜瘡無傷肉直指單傳七錯八錯令人見性掘地覔天西乾來東土南朝隱北邊賺殺古今英靈子草鞋踏破腳皮穿洞玄知藏請慣做脫空白拈賊賺人掘地覔青天打頭幸遇梁宗匠識破老胡直指傳自不會愧無言獨隱巖隈坐九年咄鈍置人不鮮印心禪人請遁迹嵩山頂寥寥天地寬神光參斷臂更要乞心安咦殃及許多英靈子千里參方賣布單傍有神光來傳東土心印打頭便遇作家蕭衍問爾不識折蘆渡魏羞嗟逸雲禪人請獨坐峰頭月九年自活埋事從叮囑起展轉見誵訛三教圖者三個沒量漢聚頭把臂六耳同謀且道説個甚麼一個云吾道一貫忠恕而已一個云止止不須説我法妙難量一個云動若行雲止猶谷神雖然各説異端據山僧正眼觀來總在黑漆桶捉倒未出尋常好與三十棒何謂機不離位墮在毒海韋馱佛記樓至屢現童真功勛浩蕩正眼分明兜鍪鎧甲寶杵隨身三洲應化護法護人有道者為翰為屏破法者碎腦碎心永佐三尊侍座側叢林鞏固遠維新維摩喚作金粟如來又是維摩居士鼻孔通同面貌各樣憂苦羣生詐病牀上却被文殊勘破機關從斯放下鬼窟伎倆寒山拾得驀路二人作大蟲溈山唬得避無從提筇伸問靡言對謂別靈山昧主公面孔凸凹瘦如柴𧟋縷蹺蹊穿木鞋太守到山輕漏泄便呵鼓掌隱寒巖羅漢圖十八瞎驢鼻遼天從來不受人拘牽登山度水隨流性業識茫茫不會禪文殊普賢文殊乃是七佛之師權作世尊長子擇揀二十五圓通擊時俱聽十方鼓普賢乃為衆聖之首喚作瞿曇次男萬行功勳超聖位誘引善財遍處參羅漢渡海者夥自了禿鼠伎神通東觸西觸玩水遊山龍降虎伏應供人間他方此國勦盡六魔三界出沒心意泰然渾無拘束浮杯渡海振錫騰空腳跟牢穩不懼黑風潑天白浪屩踏鰲龍蓮邦海域示化金容加額覩相瞻禮圓通修證道果妙運無窮若遇黃檗老漢打斷腳筋絶蹤咄凖提心印圓通或隱或顯普現色身三昧神變放出千手眼睛總是神頭鬼臉關聖帝德深滄海義重須彌英風遠播忠信不移丹心輔炎漢兮不顧危亡白眼賤吳魏兮視死如歸擎天好手越世奇機夫是謂誰伏魔大帝六祖賣柴出市聞客誦經打失鼻孔拾得眼睛便投祖室負舂墜石説偈倩人書禍事臨難避受衣半夜出黃梅法性風幡露消息馬祖坐禪成佛掘地覔天磨磚作鏡錯用心田牛忘車破風流處馬駒踏殺人萬千蜆子朝向溪邊撈蝦蜆夜投古廟宿錢灰華嚴勘問西來意便道神臺供酒杯黃檗巍巍堂堂虎驟龍驤神珠在頂其舌如鎗臨濟問佛法大意烏藤打斷脊梁古今話播諸方臨濟眼蓋乾坤胸藏日月生鐵心肝棒打不徹負屈銜冤大愚饒舌翻轉千年沒底靴奮喝虛空腦後裂欲建黃檗宗旨又道正法眼向瞎驢滅瞥不瞥行人路上眼流血趙州胸中有毛庭柏無骨神珠光射斗牛寒勘破臺山婆眼目不下禪牀接趙王侍者通知便萬福或問親見南泉來向道鎮州出蘿蔔楊岐拋出金剛圈揚下栗𣗥蓬塞却虛空口掃蕩滹沱宗八臂哪吒擂鐵鼓報道楊岐正脈通音釋覯居候切音姤遇見也躐力涉切廉入聲踐也踰跨也穸祥亦切音席墓冗幽堂也𩮻力涉切音獵馬領毛也圮普弭切音痞覆也又毀也凸凹上徒結切音迭高也下於交切音㕭窊也屩訖約切音腳草履也
