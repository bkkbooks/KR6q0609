body:
  text: 嗣法門人寂空編敕書皇帝敕諭朕惟迦文啓教妙覺之理獨隆法相歸空菩提之心最上慧舟匪隔澤雨無偏顯究竟以開氓參真常而濟俗漸積勝業咸由淺以及深澡練精明要藉微而為著制行務期於證道先除五欲之萌皈誠必本於明心用釋六情之網脫遺塵境瞻企法門克衍宗傳斯稱開士咨爾禪僧性聰戒律清嚴規模淳朴迹超俗外恆持不染之心理寄忘言了悟無生之旨遊方無住演法有年朕萬機之餘間觀釋典念含生昧覺多因自失其本明果定慧齊修亦可各還其固有然必求諸漏俱盡始堪進悟夫宗乘抑能知五蘊皆空方可皈依於法寶聞爾久參覺性堪表梵羣於是引至禁林召開覺路爾則欽承朕命克廣善因不兢不浮無榮無慮直宣正義允弗滯於迷途弘闡清規信無慚於福地全護珠之念惟在精勤探捨筏之微漸空執著法性昭其本具妙心示以歸源實冀空凡惟希登岸誠可以悟真如之諦而邁次第之禪者也是用封爾為明覺禪師錫之敕印於戲務期解脫永乘不退之輪益懋修行不關有緣之果荷茲新諭勉爾後圖欽哉敕命順治拾陸年月日之寶表謝恩表奏為恭謝天恩事竊臣自幼參方雲水隨分松檟自甘原無過分之想尤幸天朝之擢屢蒙皇睿惠庇迎住萬善殿提唱宗猷每愧行疏識淺拙朴慵材有負聖明之至意振頽綱銘骨頂踵難報仁慈之萬一不意澤雨無涯直擢僧倫表帥褒封明覺禪師錫之敕印感荷恩洪古佛來世紹隆法化除其望闕謝恩之外惟以朝夕頂焚祝延聖躬萬壽永繼義農日月恆扇湯禹仁風則天下朝宗樂業焉不勝惶悚待命之至進五燈表奏為請欽定正宗釋典俞旨入藏頒行以彰禪德以揚法化事臣竊以朝廷之治必用禮樂正教為經而佛祖之道亦藉語言文字以顯故政者致治之本而文者載道之器人臻於道國臻於治相須而成相助為理自古及今未之或廢者也臣草野微賤遭逢聖明仁慈廣博三寶聿隆德化蕩平四隅歸嚮真所稱佛心天子有道聖人臣某何幸荷承隆遇萬善殿得覲龍光延壽寺瀳蒙鴻澤敕印賜號有加無已説法開戒至再至三聖德如天念涓涘之莫報皇恩若鑑敬芻蕘以前陳臣某竊有進焉臣師祖現住浙江嘉興府石門縣福嚴禪寺臣僧通容者達磨四十一世之嫡裔臨濟三十一代之正傳也生長八閩受臘六十有七歷居十剎闡法二十餘年德業過人道風秀世所慮法門凋敝釋典混淆於辛卯年編輯五燈嚴統一書類遵宋普濟禪師五燈會元舊本列宋元明大清近代禪宗其中一二傳疑悉依大藏佛祖通載兼傳世諸書旁搜確證言言根據訂定無誤凡二十五卷蓋此書之名嚴統者緣佛祖傳流既遠時代浸遙五代緒分千燈續熖未免宗支混濫法譜誵訛立説唱教者乃似是而或非後學參求者遂傳虛而失實臣師祖所以痛心扼腕不憚艱劬勒成此書詳核考正字字無謬十年心血兩眼冰霜天地鬼神實式臨之釋典之有嚴統亦猶儒教之有正史關繫世道人心者匪淺以鮮正宜為世模範典型百代會事機不偶湮沒名山原本已恭呈睿覽外仍將前集二十五卷并解惑篇一册敬進御前伏祈呈上欽定部集敕諭入藏頒行庶俾正宗藉以久傳道統因而廣播法門幸甚世道幸甚臣某無任戰栗待命之至為此具本謹奏以聞辭表奏為請旨回閩祀親以掃師塔事竊臣某自雲遊學道負笈參方焚膏繼晝演教纍年雖屬法門而宗旨淵源尚未入室有負於師授者良多幸皇上豐隆古佛濟世慈航提佛法之頽綱救宗門之衰弊誠於佛祖增光緇流有賴焉臣某屢受浩蕩之洪恩叨賜過譽之禪號優沐過深感愧靡極茲所請者臣某第離鄉以來親墓久曠不理師塔荒蕪未掃親師之恩昊天罔極時切憂心寸念未報况今年已半百衰老殘軀時嘗抱恙倘一時永決終天之恨何日得已也仰懇皇仁垂允準錫南歸理親墓掃師塔潛山養拙俾得以朝夕焚香祝萬壽於無疆祈太后慈體而康泰則國祚綿綿於不替矣臣曷勝悚息待命之至序蓋聞槃水方圓原無定象景標直枉確有因緣審夫針芥相投非關卿法我法筌蹄頓釋寧辨前言後言隨物而施移時即逝如夢中之朋儔畛域同榻異徵似行邊之寒暑晦明殊情類感聚聾而鼓誰證聲聞叩瘖所嘗自喻甘苦若謂頑銅質限曷貴爐錘或當粳粃眼迷攸資披洗竊怪爭鳴喙喙朝四暮三小知間間甲可乙否恃弄猢猻伎倆異別搆獅經虎律選場賴具龍象神通直掀翻狐涎犴嘯妖窟惟明覺和尚掉普濟航伸兜羅手覺弘五衍識洞三玄名宿遍參處處根尋著已疑團旦豁逌逌不傍他人悟樹藤之隨來斬除枝蔓味砂米之盡去嘯破虛空因而長慶傳宗龍拂與寶幢並豎錦山演教蒲團將猊座增輝我闥八荒以南錫而北卓神栖三昧於東度示西來笑口頭禪紛紜棒喝應人間世捷答鼓桴喚醒羣蒙半字皆含滿義結成心印大音自是希聲闡大藏之遺籍小子之述萬川月映撥者一輪百里雷驚振焉億彚試問望洋海若疇能截斷衆流請看聞樨堂中至此猛尋各鼻賜進士出身光祿大夫太子太保禮部尚書前通議大夫禮部左侍郎兼內翰林國史院大學士胡世安沐手拜撰序憨璞禪師來京奉召入內苑萬善殿時蒙清問諸禪衆亦咸得與之參證久之侍者録問答之語成帙簡獲讀之悚然作而歎曰盛哉禪宗之道適符我皇上化導天下之至意也我皇上學貫天人道合精一禮樂政刑燦然備舉復於萬幾之暇旁究宗教時示一語圓明普現無非欲覺悟羣倫偕登善道乃禪宗之要倡明佛教於一念不生一法不立萬象昭融即證菩提其接引衆生出離苦海憫人拯世亦復如是則禪師之語録不信乎為化導之資乎而世之論者恆以迦文之法幻化為宗天地萬物且不有何有於語言文字之繁雖然夫人之性無物不有無物不空誠不可岐而為二苟如所云性外果有餘物耶矧性之在人無論知愚原不盡昧非賴開引之神機欲其豁然自悟是猶索過風於前林覔往夢於既寤不可得也故致魚者必資之筌求兔者必資之蹄執筌以為魚據蹄以為兔固為不可欲離筌而取魚舍蹄而搏兔亦烏能哉然而演西來大意使人因言證悟悟因言入言入悟空蓋亦難矣若夫不能於殺活之機縱橫自如則拘滯一隅動輒有礙矣不能圓滿充足覃及諸方則氣索神沮無以及來學之鋒矣即騁詞樹義拈綴有痕求其混融無迹雲流天空究亦不能也有若師者博綜妙諦不即語言不離語言所謂真正語不著有無語雷轟電拂語如大醫王制藥隨證而愈疾俾讀斯録者從所證入小而遷善遠罪大而明心見性誠可謂靈承我皇上化導天下之至意弘昭普覺立教度人之盛者矣猗歟休哉若簡略無知識妄繪虛空尚望師之有以破除瘴礙也順治十六年季春資政大夫禮部尚書宛平王崇簡薰撰序楞嚴經云但有言説都無實義然則一千七百則公案皆歷代祖師言説也皆無實義也古來心心相印者又何以有語也金剛經云是真語者實語者如語者不誑語者不異語者然則三藏十二部皆諸佛菩薩之真語實語也如語不誑語不異語也今日振揚宗風者又何必無語也若作無語會曹溪一滴不聞聲若作有語會少室堂前偏饒舌嗚呼語而無語無語而語如是理會得來可以讀憨璞禪師語録矣師紹濟宗之嫡傳為天童密老人之法裔雷音久震於南土獅吼忽移於鳳城良以憨師自恆沙億劫中夙植德本今親遇轉輪聖王如來召至上林萬善殿集衆唱酬因緣水乳恭承天語宣問抉盡佛病祖病魔病憨師一味承當全具佛藥祖藥魔藥於是機境相酬天子嘉焉賜號明覺禪師茲當結制期滿拈提盈帙橫著竪著拂子遍地風光直提倒提拄杖普天震動謂之語而無語可也謂之無語而語可也有一門外老者窺而歎歎而為之作頌曰百癡血嗣濟宗赤幟平平實實洞達明悉灑灑落落末後一著感通帝座究未説破春到花開事理兼該乾坤燦爛吾道一貫鶯鳴燕語祖風揚舉剗盡誵訛海不揚波噫門外老者為誰雲棲弟子大周也順治十六年嵗次己亥暮春太傅兼太子太師吏部尚書加一級內翰林祕書院中極殿大學士古吳金之俊薰沐謹序序夫俗超劫達士乃能鏡其原味道闡宗至人方克窮其旨破六塵而無漏窺一乘而無上妙智常圓名言斯絶所謂順鼓天倪動合冥悟者矣若乃非聞非説光映壁而無光即物即心月因指而豈月實己靈之莫負寧他聖之可求雪山老子別示家風廣額屠兒頓超本分貧人得寶笑富室之皆空遠客歸家何程途之有在是豈區區凡劣汲汲聲聞所能窺其門興造其玄同也哉恭荷皇上以堯舜而普古佛之心即禹湯而示菩薩之行徵師萬善殿召對稱旨敕印賜號明覺誠國朝之盛典聖世之洪恩也而明覺禪師者天童嫡脈臨濟英枝直指人心獨步了然之岸深明宗旨嘗疏無礙之源示法流則嚴以紅爐不容片羽引白衣則示以方便獨露真常提掇真空鋪揚等覺加以戒行精虔慈悲廣普茲將説法語録慨付流傳誠五門六度之航真十地八禪之炬開華嚴之祕同時大衆如盲如聾雪滹水之冤伎死禪和如麻似粟豈非嵩山之隻履未西而曹溪之滴水常存者歟漺素無才識兼乏證入曩蒙棒喝無異南車承委序文實深汗悚惟願為天為人為地合元化以無垠無佛無法無僧識寶輪之常轉聊將辭綆貫彼意珠故贊歎作禮而為是言賜進士出身分守江寧鎮江道布政使司布政司左參政法弟子杜漺沐手謹序序人生而靜天之性也如大月輪光輝普照非空非有無聖無凡教中目之為如來藏相宗目之為大圓鏡宗門目之為正法眼自情生智隔想變體殊而危微之界形焉聖凡之念別焉善惡之機動焉非有大聖者起而覺之從冥入冥日用不知亦安所底止乎然而覺之非有他也揚聲止響不知聲是響根厭動求靜誰識靜為動本有聖人者出作之君師或示現於儒則先覺覺後或示現於佛則自覺覺他或示現於道則致虛守靜而要以明善復初發歸未發不失其真醇而葆全其美種而已但人根有利鈍緣有生熟不得已而導之以參究教之以操履如是有工夫有作用有證悟有授受究之經世不捨一法實際不受一塵豈真有如是事哉是故論設施而方便多門論理性而歸源無二在孔子則目擊道存指掌意喻在釋迦則拈花示衆教外別傳在老子則無名天地始有名萬物母斯三教同也在臨濟為三玄三要在曹洞為五位君臣在雲門為一字關在溈仰為圓相暗機在法眼為華嚴六相斯五宗同也豈非千百聖賢各出機用其以發明性善之理肇開心學之祕若有合乎我皇上道通天地學貫古今固已繼危微精一之傳矣萬幾之暇博綜宗教每拈一語輒洞極根源有非唐宗問答宋世玉音之所能及而憨璞禪師得賜紫談玄焉蓋禪師滹水之正傳天童之法裔道眼圓明梵行修潔其説法於萬善殿也金毛據地不落廉纖掣電之機不容擬議有古廣慧璉東林總之風間持其語録以示榮字字透關言言破的有如年來又得真消息報道楊岐正脈通者故為論其旨趣與吾儒合者如此善平唐人之碑大鑒也日始以性善終以性善不假耘鋤本其靜矣嗚呼其有旨也夫其有旨也夫順治十六年季春朔日中憲大夫內翰林國史院侍講學士楚黃曹本榮薰沐拜序目録卷第一敕書表三序五卷第二北京皇城內萬善殿語録燕京順天府愍忠禪寺語録卷第三燕京順大府愍忠禪寺語録卷第四燕京順天府愍忠禪寺語録浙江杭州府臨安縣觀音禪寺語録卷第五再住觀音禪寺語録杭州府餘杭縣法喜禪寺語録卷第六杭州府錢塘縣廣福禪院語録燕京順天府海會禪寺語録卷第七燕京順天府海會禪寺語録卷第八燕京順天府延壽禪寺語録福建邵武府安國禪寺語録卷第九福建邵武府安國禪寺語録示衆卷第十示衆小參卷第十一小參拈古卷第十二拈古卷第十三頌古卷第十四問答機緣卷第十五法語偈卷第十六偈卷第十七偈啓書問卷第十八書問疏引贊卷第十九贊佛事行實序卷第二十文歌塔銘跋目録終音釋氓眉庚切音萌民也企去冀切音器舉踵而望也聿以律切雲入聲遂也畛止忍切音軫田間道也逌于求切音由與攸同
