body:
  text: 嗣法居士海眼編贊五祖演生鐵面皮銅眼睛老越徤兮瘦有神愛喫無皮鐵餕餡喜唱綿州歌太平船子頭無瓦葢屩無地行孤舟如葉泛華亭柳陰垂釣纜春江鯫徒勞努眼睛獲遇金鱗始趂心掀翻船子不留形凜凜高風亘古今懶瓚不習禪道也不焚香祗貪瞌睡無別思量御輦親臨都弗顧糞火煨芋充饑腸牛頭聞時富貴見後貧窮鳥絕消息山花自紅玄沙洪塘江口釣魚郎頓捨扁舟雲水鄉求見雪峯無別示祗教出嶺叅諸方指踢破全機負墮解道二祖不徃西天達磨不來東土德山學海驚瀾鱗藻珠浦談玄瓶瀉英名義虎路逢婆子問三心口似磉磐愚鈍鹵夜侍龍潭撲滅燈便解楖栗掃佛祖既具大手眼殺活之機因甚巖頭道不會末後句咦一任天下禪流亂指註普化鬼臉神頭馬頷顱腳盤山堂裡翻觔斗鎮州街上搖金鐸四方八面一齊來連架旋風都打却每日誘人到城門一朝脫去空木裰濟顛似癡非癡似顛非顛不重法門佛祖印猖狂飲酒咏詩篇禪心白似雪戒德潔於泉到頭依舊天台去收拾眉毛落半邊笑巖老和尚錦衣頓捨甘要為僧叅見絕學一頓烏藤傾家蕩產鐵骨稜稜金臺行化祖庭秋零扶起正脉燈續盧能疏通濟水流霔枯根瓜瓞綿延徧天下子孫標格氣崚嶒密雲老和尚大智得大機大體得大用翻轉崚嶒鐵面皮一條白棒掃瞿種德山臨濟出頭來自謂當仁原不讓獅頭虎背驢腮馬頷吸乾龍池水太白起波瀾橫拈鐵棒不容情是聖是凡俱掃蕩八臂哪吒聞之皺眉三目摩醯見之膽喪踞六法苑玉京名顯劍氣干霄金闕光閃平空扶起破砂盆者般惡辣天下鮮費隱老和尚豐城霜鐔光芒直干牛斗荊山美璞聲價重於連城浩浩德風昂昂氣宇或時說法喚甕作鐘有人問禪指鹿為馬棒如電掣驚起凌霄峰倒行喝似雷轟震得東波池𨁝跳何以如斯數珠擊破頭顱後傾湫倒嶽機難凑百癡老和尚道嶽崢嶸德海浩蕩斯意誰知我師我讚喚佛祖為米篩視菩薩猶婢奴說法如鯨噴巨浪接人似鵬翥扶遙鷗灘雨過金峯翠處處春山聞鷓鴣八仙圖新字沈居士五旬請白石鑿鑿青松落落壽等虛空福侔岱嶽君子務本也鼓腹驅耕知危識變也良溫純朴歲歲春風熟碧桃年年鶴算增滿閣庚星垂照錦堂中八仙隊裡添一僕汝今五十知天命須識先天那一着聞谷大師養慧禪人請風吹錦谷碧桃嫩雨洗香隄翠柳陰苕水光中全體現僧繇好手畫難成若道却是伊錯認定盤星若道不是伊面目甚分明咄咄平生專念佛坐斷六門機是牛欠角是馬欠蹄樵雲禪師毓顛禪人請德相堂堂性情耿直脫白開元支提創闢道行彌高戒律精潔軌範弘傳法門標幟面目儼然真身難覔毓顛禪人乞我題持去焚香高掛壁御馬監正奇吾王居士行樂高沙別業摩詰家風事親最孝為臣至忠若坐朝堂也不苟阿容若入佛門也信悟真空處世端正至善必恭念佛三昧心獲圓通君益尹居士持母行樂請題淑德坤儀高壽期人生七十古來稀旌門素志無瑕玷教子攻書倣斷機持齋向道超塵剎念佛心空淨域歸訓婦有方勤有節滿庭蘭桂戲斑衣㦸庵居士持先尊仰宗熊翁像請讚頂具摩醯眼心潛雪刃鋒撒手臨行句拍掌一笑中誰人能到此除必是仰翁叅見多尊宿了明向上宗與我道交心我識坐斷死關萬法空實心禪德小像者個模樣實心向上淳樸為人處世平常海會叅禪朝夕猛烈戒律精嚴恒修淨業五十年來無增無鼻孔凹額頭凸小處虛空包不住大處針鋒尖上現若向丹青認是伊猶如掉棒打明月體惟上座清可禪人請有相身中無相身本來面目甚分明若還紙上尋真蹟錯過汝師認別人獨靜坐驀追尋坐斷六門機方許出凡塵徹音知藏乃徒楷石請汝師汝畫請吾題行腳單明向上機觸聽音聲若了徹佛祖語言不爾欺漳州開元寺監院誨謙上座像軒昂德相自天然逈脫森羅體自圓廣大慈仁能濟眾發明心地可齊賢監院修賢畫師頂像留廣福常住請讚腳跟歷落眉毛拄天為人提掇棒掃廉纖孤巍峭壁鐵面無言素無有德名動九天簾前賜紫對御談玄爾繪吾像乃修乃賢持去供養廣福流傳出家無正因自不識好惡半世逐風塵廿年纔行腳聽經不識字叅禪會不着空費草鞋錢二途俱罔措業風吹我上天台喫飯咬砂聲矻剝觸翻漆桶便轉身破家蕩產已零落有人問我禪舌頭似木鐸畧有些兒勝於人驢脚却喚似馬謂是天童四世孫世間那有者瞎禿貧無片瓦葢頭富有七珍八寶原是順昌砍柴兒脫白天王作長老八坐道塲敗闕多有人歡喜有人惱胸中凹凸蹺蹊口裏說惡道好問法默然半句無慣拈白棒當頭掃寶印侍者請者無面目漢被人塗污面門更要乞我自讚敗闕處天台通玄落節便宜處錦山寺裡拔本法喜祗賣死猫頭廣福院據欵結案興化罰錢打克賓大難承當解把穩端的如何舉似人山僧公案待汝了耕月維那請者延平子南方不住北地而居海會闡法開山獨渠德重帝王親賜紫歸一生呵佛打祖任他罵我瞎驢者般醜狀堪畫後人難信難扶悟禪悟禪桶篐嚗處承當去他日知恩莫負吾悟本維那請腦無頂葢心中含毒不整威儀被人毀辱在家破家皈佛罵佛推倒嘉州大像慣騎陝府鐵犢如此無狀人貶向無生國山青青水綠綠有相身中無相身被人強畫醜面目或聞者而惡之或近者不敢觸許汝大膽心麄慣向虎頭拔角臨機要眼親殺活同啐啄高提祖印心當陽莫躲縮印心書記請生長順昌脫白建陽行腳海上徧叅諸方唱導北闕詔入禁閶對御談玄勅賜金章奉旨歸閩安國開堂禪債未了賊身難藏被汝描邈更乞讚揚持去為標格振臨濟宗綱吼林侍者請苴藞醜拙樣胸藏有三障斷滅佛祖心愧受帝供養三詔住禁林首闢濟宗教慣拈鐵楖栗劈破玄中要簸弄佛祖機放出無毛鷂任汝舉似人何妨天下笑慈吉後堂請𣯧頹面得人惡被汝描邈乞吾題皇宮說法我為首萬善弘揚佛祖機有人問爾說何法但道藤條直指揮語石西堂請真身寥廓無形相強把丹青繪紙上者般無狀惡辣僧如何穪得大和尚又不會經不會禪爭受帝王家供養尼濶玄慧上座請仁者樂山智者樂水拄杖單瓢風月為侶科頭箕踞長松下人來問禪無可語遯機法姪請頂無腦骨眼有神筋入佛魔界惱亂叢林一條白棒不讓當人三詔親宣入禁林勅封明覺大和尚蕭仲俊請者漢若似相如何生得者般樣者漢不似相如何喚作憨和尚說法如懸河慣把佛祖謗福建山蠻杜拗禪爭消藩商善供養戒善金居士請頂𩕳三台骨掌中有肉珠眉毛上掛劍佛祖莫敢窺汝善得覲我膽量過于渠尼慈善道人請老漢五十二全然無本據問禪不答禪錯為人指註識我者罪我我無辭焉不識我者罪我我無忌諱奉旨回閩繪吾像持去好將掛壁上北浪波莊作指南海慈吾徒留供養海慈禪人請者漢全不識好惡隨邪逐行腳不依本分行踏斷虛空骨獨許兒曹諳此音付與傳流為後學為法為人力提持收去當陽懸高閣雪紅西堂請頂上露寶印掌中有肉珠眼底空佛祖心內含太虛想必無人知此事且許省禪識得渠何謂也不因同床睡焉知被底穿天皷知藏請佛事掛雲板佛祖芳䂓衲僧巴鼻省要處直下分明提起時不用擬議大眾果然透得聲前句喫粥喫飯許你七穿八穴脫或未然且聽號令去也擊板云雷震一聲喧海嶽三腳蝦蟆鼓翅飛掛鐘板聲前薦得絕誵訛句後承當路轉賒聲句兩岐俱剗却廓開耳目透千差雖然如是政當今日斬新條行新令一句作麼生道輪槌一聲震佛祖盡來叅托起板云祇者個諸佛骨髓歷祖命脉叢林號令天人標格是則固是政當今日把柄落在山僧手裡畢竟作麼生提持遂擊板云符到奉行新行祖令肇建芳規一椎打徹千古流輝大眾畢竟如何是轉身句遂擊板云震碎虛空全體露昂藏鼻孔自遼天施茶榜江口通津客艘徃來不絕海門要路轂駐憩猶多時逢火傘張空炙得渾身汗出欲濟諸人之渴其奈獨力難成檀信慳囊若破趙州公案重圓無底砂鍋煎雲翻玉髓穿心磁銚注雪噴瓊花傾誠欵待鞠躬送迎頓令個個焦腑清凉庶使人人舌端知味通身暢快滿口馨香為悟本西堂火悟得本莫愁末悟來本空清風颯颯稍末一機今朝放下且放下處作麼生莫謂吾負汝却是汝負吾正法眼藏從教滅依舊江南唱鷓鴣為聞喜禪人起龕云全身放下獨坐寂寥山僧到此請出禪寮何謂不許夜行剛把火直須當道與人看舉火以火炬打相云者𫨻大事因緣若會者無佛處無生死不會者有佛處有生死聞禪人若能識破兩重關三腳鯉魚上剎竿撒手逍遙極樂國目前大道透長安畢竟路頭在甚麼處剔起眉毛腳下看為天目無痕禪人火天目山苕溪水有時行有時止踏翻海月亂波生擡頭撞著自家底無痕禪人會麼舉起火炬云向者裡薦取為月庭維那火以火炬龕前打相云者個月天上月夜靜中庭光皎潔有時兮復還圓何似今朝者時節去時掀翻佛祖機生死路頭便超越既已超越還要山僧為汝點眼始得擲下火炬云烈熖烜天毫末盡瓊葩吐露占春芳四月八為寧湛禪人火瞿曇老子今日生寧湛禪人今日死生死兩途沒相干臨機射透禾山皷其或未能山僧為汝撥轉一機去也性空真火性火真空汝身患癩直要火攻皮膚脫落盡特地起清風騰騰熖裡翻身去鐵樹開花朵朵紅為無昧禪人火汝從南方來今在北方去不涉兩程途是汝安身處雖然如是山僧不許你坐在者裡停囚長智急須了却目前關且如何是目前關舉起火炬云看便下火為慧林上座起龕云四十餘年住此菴專念彌陀無別叅兀坐攢眉休闇想吾今為汝作指南遂以拄杖引之舉火以火炬打相云慧上座若向者裡薦得便了唯心淨土本性彌陀截斷生死根擺脫癡愛網撒手歸淨域赤腳出娑婆燈籠喝采露柱謳歌雖然如斯猶是滯殼迷封仍須入大爐鞲脫皮換骨始得慧光圓照體真空任運堂堂逈絕蹤一副皮囊無著處慇懃付與丙丁童攛下炬為滿空禪人起龕以拄杖指龕云生時不肯坐死了不肯臥所謂有一人常在家舍不離途中有一人常在途中不離家舍既在家含請出解脫門速徃蓮池會舉火云一輪皓月滿虛空爍破迷雲幾萬重是汝轉身得力處臨行無礙即真宗滿禪人生長遼東死於閩樵驛路中生平戒律精嚴德動王侯欽重然既如是還須山僧指汝向上且如何是向上事舉火炬云燎却面門真見處頓超覺岸上頭關為密因書記火因該果海密證圓音氣傲佛祖骨格稜稜行腳未了出入叢林涅槃坐斷撤手便行鐵筆留下分付何人從茲脫却者皮袋蓮花香裡現全身遂攛下火炬為弘兖道人火人能弘道非道弘人戒行嚴持德被於隣末後一著撒手便行山僧恁麼指示還會麼設或踟躕火龍來也攛下炬云爍破面門光宇宙急須照顧兩莖眉為弘滿禪人火撞倒石露柱烈熖烜虛空鐵牛火裏走木馬嘶春風踏斷來時娘生路籠頭卸却出寰中遂攛下火為體惟禪人起龕云未有常行而不住未有常住而不行悄然獨坐暗中室為汝臨行撥轉身以拄杖一劃云向者裏去舉火云大道體寬圓同太極皮膚脫盡惟一真實末後一著不須外覔萬緣坐斷生死事畢雖然如是還得山僧指汝個出路擲下火炬云但看紅光騰宇宙烟消火滅白蓮生為雲响首座起龕云言中有響響中有言兩頭坐斷逈絕廉纖泥牛踏破澄潭月木馬嘶風過海天大眾且道路頭在甚麼處驀直去舉火云親覲山僧二十年同甘苦樂幾多般養兒待老終身望誰知我送汝歸山歸去添光彩鳥鷄上闌干打倒殿玉柱直越上頭關且如何是上頭關擲下炬云剔起眉毛仔細看為自珍公火自家至寶受用現成從門入者非是家珍恭惟自珍道舊與予交契年深病篤接到台山請醫服藥調治自知涅槃時到親囑山僧茶毘臨終自已安然直下撒手便去踢翻三毒海踏倒五蘊山來時赤條條去時無一物無生也無死無祖亦無佛大千沙界海中漚一切聖賢如電拂踏著自家田地穩裏許鎮州大蘿蔔擲下火炬云管證福足慧足為頓鋒侍者火職侍巾瓶已有年隨從左右道心堅三呼三應知消息舉目青山即是禪頓禪人還會麼擲下炬云刦火洞然毫末盡脫體風流得自繇行實眾請說行實師云從上知識俱有叅歷諸方來繇惟山僧難以啟口何謂家醜怕外揚無庸說也眾固請不已師乃云據山僧生緣是福建延平順昌縣白水墩頭連氏子父應招母章氏家世農業一夜母坐於庭前忽見一星墜懷中遂感孕于萬曆庚戌年五月十八日生屋上有光隣駭火發驟至光散眾以為異將滿三朝請術推命術者曰令郎非是庸俗之人後必然出人頭地年方十五遂捨建陽書林天王寺依法天公出家十八祝髮每思州縣僧仍世累拘牽志慕教乘遂謁支提山本輝法主習教數年一日自省云終日循行數墨猶入海算沙終不能了其生死辭去本云汝要成龍必歸大海山僧徑徃南海普陀山大雲和尚處受具復至武林聽經度夏寶壽始遇默淵師開示叅禪云迷時法華轉悟時轉法華冥契此話心中憤然遂𨦣志叅禪見永覺大師請話頭示山僧萬法歸一做工夫一年如老鼠咬棺材東咬西咬未咬著一處聞紹興東山爾密和尚坐不語禪工夫緊慎徃彼叅山僧問某甲乍入禪門乞師指示密云汝過錢塘江否山僧云曾過密云錢塘江水開示了也山僧云不會密云庭前黃葉落開示了也山僧云葉落後時如何密云青山獨露頂山僧作禮云謝師指示一日堂中打坐忽然通身慶快如坐空中是個大光明藏凝然不動至晚白方丈密云此是工夫緊切疑情頓發是你得力處恐怕話頭有掉舉山僧云話頭精采毫無走作密云到菩薩地位方能除其昏昧解制後聞天童密老人道播天下棒喝接人至彼親覲忽染傷寒大病歸延壽堂三個月將危矣作偈云木枕未推三個月灰頭土面得人嫌皆因恣性隨邪惡致令主公受倒懸夜靜空房疑病鬼燈殘聞鼠閙驚眠雖然八苦交煎逼自有靈符護肘邊至秋方愈出山航海到溫州叅魚潭便問古人云如牛駕車車若不行打車是打牛是潭云水濶魚行濁山僧云牛忘車破是如何潭云好個消息山僧便喝一日山僧上方丈云某工夫叅到動靜二相了然不生時如何潭云汝死了不得活潭復問薰風自南來殿角生微凉你作麼生會山僧擬對潭叱退山僧少頃上方丈云公案會也潭云試道看山僧云薰風連夜池塘起滿架薔薇一院香潭頷之一日看天童七書舉妙喜問圓悟和尚昔問五祖樹倒藤枯句歸何處祖曰相隨來也山僧看到者裏心中釋然適聞古淵和尚住白鹿城法通寺徃叅命職維那一日入室古問興化打克賓意旨如何山僧云嚴父出孝子古云且道他還甘去也無山僧云知恩者少負恩者多古便打山僧便喝解制後航海擬徃金粟至杭聞本師住黃崗太平寺道眼精明克意徃叅山僧問𦋺賓國王斬師子尊者因甚手臂自墮師云自作自受山僧云還有過也無師云南泉斬猫歸宗斬蛇喚作有過得麼山僧云今日親見古人作用也便禮拜師命掌書記一日呈十牛頌師問人在者裏牛在甚麼處山僧便扭師胸云在者裏師云者個是我牛如何是你牛山僧便作牛觸勢師云好個牛只是欠角在山僧便喝解夏復命為堂中首領一日本師落堂問大眾如何是本分事山僧云草本不勞拈出師休去因世滄桑辭師入天台叅通玄林野和尚山僧問有問有答便涉言詮無問無答寂寞沉迷去此二途請師速道林云掘地深埋山僧云還許學人修證也無林云無者閒工夫與你說修證話山僧云便恁麼去時如何林劈面便掌山僧喝林又掌山僧禮拜林命職維那一日午齋飯裏咬著一粒砂忽然一驚其膺頓釋會洞山問雪峰淘米公案見他兩人面目遂頌呈方丈云砂米盡去無回互覿面傾盆絕正徧鸞鳳不棲荊棘樹聽簫飛去月樓前又見道偈云吃飯之時咬著砂無端彈破半邊牙自從識得他家事兩個猢猻沒尾巴林見頌疑之勘騐數次直對無輟服膺三年復聞本師住長慶寺辭林破雪下山作偈云一腳踢翻峰頂去雲從龍躍起潭冰山河林沼渾如玉滿目春光踏四稜再叅本師喜贈一偈云劍㦸鳴秋世欲康買舟先我渡錢塘應知此去雲山杳豈料今來草樹蒼倦策喜同撑破戶輪槌煩任震虛堂他時熱面輕翻轉勿作克賓孝順郎丁亥冬本師赴金粟請命山僧主長慶戊子夏遣專使送拂子一柄付山僧冬辭師歸徑山住靜己丑春臨安邑侯允燦劉公請住錦山觀音寺方出世開堂庚寅夏至金粟祝本師四請為座元復送法衣源流付山僧與後學表信山僧自行腳十餘年喫飯不知是飯穿衣不知是衣及至飯裏咬著砂方知飯是米做直是無疑矣咦知我者罪我我無辭焉序重修三教寺序葢聞世尊顯化於西乾演教於鷲嶺孔子示跡於東魯周遊於列國老子降生於李下遁身於函谷指心性而歸源示真常以濟俗止止不須說我法玅難思仰之彌高鑽之彌堅吾道一以貫之忠恕而已矣無名天地之始有名萬物之母名言道體無涯理微莫極然其三教之精微各有旨歸苐形質之有異其心性又何殊耶明三即一明一即三統三教為一家援萬類歸三教其為聖人者乎所以亘古今而欽崇遍寰區以祀奉為聖賢踐履之階級作天人立身之根本也然都西隅三教寺者創於先朝頹於近代殿宇隨風搖碧落墻垣逐雨臥蒼苔月照虛堂內外經聲寂寂塵封古徑晨昏鐘皷寥寥是以韋䭾夢感龍榻旦達駕即幸此御覽蕭然便舉復暨輦回宮仍命山僧一言以為恊助竊思入海採珠須頼離婁敏手登山伐木必藉鄧子良材若要道塲重建還須古佛再來欲思丈室更新必得維摩復世恭祈臺閣垂光庶使祗園奐彩重興安國寺序樵陽勝地安國名藍青松欝欝全彰古佛之心翠竹蕭蕭直示西來之意鐘韻泉聲共響漁歌梵語相叅長虹跨兩岸之雄古塔露群峰之秀係宋朝黃簡肅公之第宅傾心捨為佛地朝夕焚祝以報皇仁故名安國也後肅公之子欲延大慧杲和尚開法杲命嗣子彌光禪師主持有語錄存焉奈星移物換鳩借鵲巢緇流一朝蕭索殿宇多載頹零茲承檀那再三懇請山野只得勉強住持若欲殿宇彌新全憑護法同伸隻手扶起剎竿共布黃金成覺苑功無浪施福不唐捐叢林接待老病規例序原夫釋迦設教夢感漢庭達磨傳宗法流少室迨至馬祖方創叢林輔以百丈鼎立規範無非為天下衲子以病老之居葢老宿居叢林有三等一者行腳高流叅訪知識或年頹邁休心罷叅而歸叢林為住持者遵其老宿當安慰也二者一生孤峻徒子竛丁老無恃怙而歸叢林為住持者憫其暮景當安慰也三者生同大眾逝歸普塔為住持者成就道行當安慰也病者在叢林亦有三等一者久住耆宿輔佐叢林為眾竭力致染其病二者學道叅方或寒暑或際饑飽忽然得病三者或因老病衣囊罄空為住持者憫念其故當分衣鉢之資以助湯藥之需務令調理得安也所以住持者為叢林之主凡事關其心為眾勞其力故立養老堂待其老者安居建延壽堂待其病者治養若無斯地而老者病者又何安焉此乃上古淳風今時規例則後昆賢哲莫不以為鑑玉泉禪院齋規序竊聞大智宏範以佐叢林始約禮度不失次序則有主賓賞罰之令無容奸滑私續之心海內賢士聞風而趨焉故有朱英吐合之秀紫葩生連理之枝廣顯無窮之緣普開圓極之照繇是德風之所興也葢叢林風規者膚腠也道德者正體也膚腠既𡚁其體能不亡乎其先人所制之鑑欲使叢室之勿替固為佛祖之墻塹者也然創之者原為招賢納眾接人無倦教化有方故曰法輪未轉食輪先轉其斯之謂乎先哲所行足為今範旌獎以重其德歷試以成其才輔翊叢林主賓互相為用莫各恃其才能翅奪我慢攪𧮂道義即壞風規以致佛祖門庭蔑裂也噫玉泉欲無言耳其可得乎惟冀抱德衲子而體遵庶斯庵之不墜矣海會共住規約序夫建法幢者敦益在於賢哲也道為叢林之體德乃法苑之基道德興而眾安道德衰而眾散如或不遵於軌則故使異端頓起也然國有典型佛有規儀若能舉止制守則上下肅如也海會雖曰肇創一時龍象驟然接聚十方凡日用舉措出入經務恐有曲直之私則立繩墨之法道義者進奸偽者退忍讓為至要恭儉為關鉗老者安之少者懷之貪夫可以廉懦夫可以立六和同住五戒各持粒米同餐杯水共飲靜六根以修身了三心而證道葢叢林規範不令而行不化而善有過則舉舉則必懲有過勿悛者藐先聖之規法也但偷心若此豈能學道耶嗚呼先聖禁律不誡於賢哲顓訓於愚頑者也安國共住規約序葢聞朝廷有禁諭法門有清規所以條欵叢林培植道德也其善學者超凡入聖其庸學者隨流逐俗故曰十方同聚會個個學無為此是選佛塲心空及第歸方能出其類拔其萃可為人天之鑑者矣然創天下之叢林為接四海之學者若無規例人法安立每日興居出入豈無錯謬者乎時當季運祖庭秋晚賢者傷心太息佞者肄情放逸以致威儀失序道德澆漓雖近知識心不向道問著佛法口如啞羊見人空腹高心坐談不落典謨如斯濫入空門虛消信施不愧唐喪光陰便言我是老叅欺誑後昆遂使上下不和以致法門壅塞普梆若鳴偷心潛形板响赴齋突出先坐食畢先起去就乖寮舍聚頭喧喧但說人間雜話不忖食從何來靡愧行人辛苦職事見聞責之便起嗔心闘捔稍不如意即欲抽單視叢林如驛舍訕法門為異端如斯行腳天堂未就地獄先成豈能為法器者乎重眉禪師語錄序佛祖源流門庭高峻壁立萬仞磊落千層如臨濟入門便喝德山見人驀棒縱有身負須彌胸藏雪刃者莫敢近傍覷著詎容望風捕影之徒鏤沙雕玉者哉惟喝下承當棒頭領畧赤骨𩪸地白手掀天方可紹續正宗弘傳心印我重眉法兄執侍雪峰亘老人十有餘載親遭痛棒掀翻形山頓明大事旋而南山繼席克了未了公案歷住隆壽諸剎大顯象骨門庭西堂遯機持來語錄揭日月之英華負神霄之敏㨗騰踏獨步殺活超方標宗綱之赤幟開鑿人天正眼裂野狐之邪網劈碎滯殼迷封可謂得之於心應之於手到處白拈名家宿將矣若具一隻眼者切莫蹉過法濟重和尚紀夢師住燕之海會時夜寢恍入藏殿見座上有釋迦文佛觀音文殊列坐兩傍師禮拜竟傍有一僧身著青衣眉目秀麗相貌端嚴向師作禮云大師禮佛師云是僧云大師禮佛當發願生他化天說法度生師云隨處好說法度生為甚教吾發願生彼僧云大師因緣將至畢竟發願到彼天師便合掌發願竟其僧不見歸乃覺是夢音釋鯫于候切音陬小魚也欝紆勿切氳入聲木叢生也懲直陵切音澄㣻也悛逡綠切音詮改也
