body:
  text: 嗣法門人戒恆編偈送天申禪師之金粟玄風搖寶鐸危露滴金盤玉兔天中皓今宵誰共看去去踏斷溪山泬佛祖機關都漏泄針鋒影裡騎大鵬等閒挨落天邊月九九奇峰盡點頭千僧井魚跳上闕大藏靈官一夜書趙州一轉更親切教外別傳舉知音楖栗橫拈驀頭楔送韻峰禪師之閩西風颯颯白雲飛塞雁蹮蹁向南歸扶笻高舉難留住空憶金山泉石輝與我同條不共轍作家好手抽釘楔龍象奔騰氣昂昂踢倒三山秋水月大地寒光一片明達磨眼睛已漏泄南山鱉鼻好驚人咬殺大蟲非關舌與竹菴西堂本色道人堅守操研心肯綮不放過終日如愚鐵脊禪佛祖機關曾明破入室勘驗每投機從上相承心印心臨濟兒孫貴直截全提大用掃狐疑寬時私通車馬窄時官不容針等閒到處莫狼籍珍重牙爪貴深密送徒弘讚行腳山僧送汝去參方若到叢林聽舉揚學道先須忘我慢見人有禮莫輕狂逐隊觀山并玩水空過老來頭𩯭霜不明大事枉行腳將何憑據敵閻王一人所在也須到切莫匆匆忽略過德嶠挾復上法堂再振威儀見祐老詞鋒何等氣超羣古人行腳有好樣彼既丈夫爾丈夫不學鷦鷯小樹呼佛祖機關急打破後生可畏作良模示翠山侍者望湖山兮青且翠對清溪兮湛且碧漪漪紋兮可瞻之蕩蕩澄兮可飲汲侍余數載意勤勤古策風高無等匹三喚三呼露肝腸步步親隨相輔弼出入左右不離原五葉千燈望汝續示耕月副寺不是心不是佛硬似綿團軟似骨本無向背絶囊藏問來不識是何物珍重汝今仔細看參學直須具眼目縱然辨得甚分明盲依舊入空谷直勘破莫放過透脫威音那畔前臭鶻汗衫都卸却赤灑灑光剝剝頂𩕳撼動黃金鐸佛法不從被顢頇操手堅持細敲磕不是一番寒徹骨爭得梅花香撲鼻示天錫禪人祖師心地印衲僧正法眼顯煥露真機到即不須點識得最綿密睡時失却口起來摸著鼻不坐佛祖窠穿靴水上立騎馬上須彌俊鷂趁不及仔細著眼看燈籠入鐵壁會得其中意大事已了畢不枉南方請我來相扶法道賴汝力參禪向上要英靈如鷹見兔便生擒良繇可驚人可畏氣槩超羣努力行示顯吾王居士在家必達出家必達文殊堂裡萬菩薩朝夕同眠同起時動靜施為常省察臨機日用痛加錐生死魔軍必鎚殺魔軍殺盡心坦然風標獨立澄光彩堂堂一物沒親踈趙州東壁掛葫蘆夜來伸手忽摸著出格男兒是丈夫顯吾居士一門善須效龐公證道乎示心光禪人心光熖熖智水溶溶光前絶後異目超宗把住也猛虎當路踞放行也翻身活似龍從前伎倆都掀却空拳平地達綱宗示洞玄知藏以字不成八字不是豁開頂𩕳全彰心印亘古神光圓明鏡智逈脫根塵能所不立萬仞軒昂消聲削跡撥轉一機孤明歷歷無言處演言絶路處明禪流出大藏教漸通義頓圓衲僧正法眼本不涉廉纖百千妙義都翻却佛法明明在汝邊示罡風侍者鹽官索扇子頭角甚分明鳥窠吹布毛直下便領旨發明向上機千聖豈可擬骨格磊落兮操道為聖卓榮軒昂兮身佩祖印機用現前兮衲僧巴鼻後生可畏兮為法壯志大辨若訥兮縱橫來去透脫玄關兮根源有據騰踏當前個駿駒赤梢鯉魚鼓溟水示悟本西堂山不在高有仙則名水不在深有龍則靈屋不在飾有賢則興承當此事須是其人臨濟兒孫肆喝雷霆聯芳挺秀奕葉相承超兮俊兮箭鋒相拄縱兮奪兮殺活臨時朦𦡫辨色涇渭分明岐路逢人莫亂舉必須珍重密潛形送慈吉後堂之盤山住靜神京東北有名山多有高人隱此間寶積道風千古震搖鈴普化也非凡秀水環山清供足蒼松偃徑白雲閒林泉盤𪋤多嘉果四季鮮花好景觀爾去居時休貪樂佛法時時細敲磕牙瓜深藏莫露鋒作家相見同啐啄吹毛用了急須磨切忌莫留元字腳身佩無文寶印彰等閒莫亂認初學大梅隱山三十年為衣荷葉尋常著又不見趙州住院二十年一個破床三隻腳守分安貧養聖胎不賫書去告檀越汝看古人恁麼行至今道風播天下與耕月首座金鵬不展翅展則雲天萬里去巨鯤不變化變則滄海波濤起展變本無有劣優壯志摩霄騰漢外汝覲山僧十有年相從輔弼苦心堅勘問孤峰雪不白解言玉出崑岡前機括相投從此契千斤擔子脫汝肩珍重臨機莫造次要辨諸方五味禪從上宗乘無語句當陽拋出金剛圈塞破虛空佛祖口殺活全提閫外權摩醯正眼親端的明明滅向瞎驢邊示澄寰何太監向上一路千聖不傳要親自到得兔忘筌機不離位語不出纏行也禪坐也禪話頭精采絶廉纖追到青天轟霹靂冷灰豆爆見根源裂破娘生鐵面孔透脫臨濟要三玄若會己躬端的處再來海會喫粗拳送慧高禪師住鴈宕山秋月明秋水清白雲片片襯君行兔角杖頭開正眼毛拂子示英靈君不見昔有南山白額虎今出通玄英邵武等閒踢出三腳驢縱橫踏斷千江水驚起鯉魚飛上天觸發帝釋傾盆雨詎諾尊者攢眉愁坐看龍湫噴峰頭天然佳景剪刀石遡來名地隱高流一片閒閒古寺址好建法幢立宗旨翻却三玄四主賓烏藤敲出虛空髓生擒活捉玉麒麟妙用臨機須好手送爾復後堂旋南閉關海會相送意自恬金臺聚首已經年法門須賴為藩障龍象叢中首領賢氣宇昂昂自超卓洪機敏捷逈寥廓此時別去正秋凉暑退炎威三伏縮玉燕翩翩歸北塞天鵝翼翼度南郭法戰諸方老古錐三玄戈甲展韜略程途參倦暫休心歸閉禪關資養學且將水牯加飽喂頭角養成穿海嶽無鬚關鎖一線通萬里雲天飛徑鶚贈佛頭菴位中禪德出關挂錫金峰下韜光𨦣志堅養成頭角峻氣宇漲山川佛頭直坐斷露布絶廉纖若透機前句須明法身邊識得者般事打開鐵壁禪放出無毛鷂展翮摩青天出關寄藤溪乞我示贈言後生真可畏他日繼燈傳送尼𦙌待者遊五臺鹽官索問犀牛扇頭角分明全體露此時宜用足清凉道上須當勤保護途行不必問臺婆目前直去是平路俯仰峰巒月半腰六月山深積雪凍清凉石是文殊床現出娑羅花樹香常放兜羅光五色雲中示現跨獅王化作老僧問文喜玻璃盞子拈舉揚金剛窟兮銀世界劫火洞然常不壞遊觀勝蹟古今存妙德臺山恆捏怪若到其間具眼看任他魔佛俱捉敗不見文喜打文殊今古作家誰比賽送遁機法侄住青林湛湛銀盤秋水清金風吹發桂香林山巒瑞靄增輝色地傑靈光有主人白雲離谷來途接黃葉為錢襯爾程好將鈯斧隨身去開闢芳規振祖庭豹入青林深遁跡攫雲啓戶驚雷鳴操卓凌霄超衆象豈學鷦鷯小樹停溟壑大光玄化度超宗異目指鑑顧探竿影草驗諸方吾侄英偉瞌睡虎祖道騰騰耀古今雪峰一脉獨流布御製書賜賦謝龍腹深藏二酉書却憐愚昧贈盈車學能濟世為師表悟到無文笑蠹魚萬卷本來原具足一塵不立自空虛焚香捧讀猶懷璧欲報涓埃愧未如敕愍忠寺開堂辭闕承恩到愍忠橫拈白棒闡宗風十方龍象如雲集夾道幡幢映日紅但向此間求妙悟更從何處演真空好將大地為爐鞲凡聖同歸化域中萬善殿開堂時有白鴉常飛來殿上傍有羣鳥相隨皆呼為瑞鳥今古希有之事賦此志之世罕傳聞有白鴉時清赤羽亦無瑕詔豫禁苑揚宗旨何處靈禽現瑞華風暖呼羣來玉殿雪寒尋食啄梅花豈同鶖鷺落荒浦素質超羣足可嘉和行壁薛侍郎韻大道原無隱樨香共子聞紅爐三尺雪青嶂萬重雲法印空諸相禪機不落文心恬境亦靜一念斷紛紜登乾元山勝地近城郭清幽逈出塵登猶輕世界仰可摘星辰烟散羣巒秀湖平一鏡新曉鐘開萬戶誰是夢回人再參本師和尚病骨難忘針拶處不辭險道扣柴門已知長慶家風別自是楊岐正脉尊喝似雷轟山嶽震機猶電掣地天昏棒頭意旨親蒙領受乳爺娘方是恩挽大雲得戒和尚法海慈航普運悲却來末世整威儀堅持戒品如冰雪不動心源若鏡池金錫罷拈空掛壁鐵盂不應竟生絲化緣已畢歸直際草木無情也泪垂贈息齊金太傅撑天拄地棟梁材况復乘雲上九垓青史留題猶羡矣黃麻曾賜亦奇哉雖居高閣緣心淨看破浮雲道眼開燮理調羹扶聖化清明昭著總元裁答秋潭李孝廉道在當人動用中無為無念即真宗玄機啐啄疾如鷂白棒縱橫活似龍一滴曹源流海宇三玄濟脉起家風相投針芥知音者竭力維持賴爾躬寄禮部天陳居士身致雲霄豈等閒却來海會扣玄關知音原不在弦上立願還期出世間選佛選官何足道越凡越聖亦非艱高風令我長相憶皎月當空如晤顏贈海子總理振宇陳太監文華星斗蘸湖光海宇扶風理總綱信道歸心輔法社施仁清政立朝堂門前緑柳鶯長囀戶外甘棠花正香般若靈苗培植已且看時至自芬芳答易齊馮侍郎韻相逢却不是先年一念回頭越昔賢萬事只如風過樹此心猶似月當天碧桃燦熖凝霞彩紅杏流陰帶露妍鐵壁銀山俱透過放開兩眼閲三千送元復嚴孝廉之富春匣裡寒光射斗星苧袍林下道風清了無佛法與君說剪得山雲贈子行秋桂飄香迎驛路晚風歸雁落春城投機千古難忘意弗忍區區折柳亭贈際甫劉邑侯昔日鷲峰記莂來如今示現履金階琴堂鳳舞仁風洽柱國龍綸濟世才麥秀兩岐甘雨潤禾登九穗享春臺須知更有通天竅直驚羣上九垓贈漢陽知縣睿生曲居士傳得文星之楚西清風滿道動旌旗霜飛六月嚴威凜折獄片言决詞裴榻高懸遺古蹟潘花再插續芳規世人相贈金唯最山野囊空只贈詩題朴菴何孝廉嶼淵亭箕踞溪山擇木陰還同君子淡其心流觴曲水添人興坐月催詩助客吟怪石留雲千種態蒼林啼鳥百般音怡然樂道眼空世海印高懸韜跡深送潛初趙秀才赴試春日雷鳴魚戴角冰河解凍躍天垓詞鋒秀麗輝龍目筆陳縱橫起蟄雷玉斧隨身游法海金𢖍授手占文魁莫忘雪嶺密遺事酬唱新章酒一㮎慰一生應通政還鄉事親德政忠心錫彩綸能踈寵位秩榮紳掛冠林下全名節退食山中得侍親別業𢖍門容膝隱驅耕農里樂清貧聲光匝地干牛斗素志無能越比倫贈鑾儀衛春雨雷居士春風吹玉樹夏雨滴花心山色和烟拂泉聲雜鳥吟聚談三月暮共坐五更深不負靈峰囑垂光護法林禮笑巖祖塔祖雖已去剩浮圖落落聲光洽帝都三尺毒蛇藏洞穴一靈妙性逈寰區風吹薝蔔香天地月繞窀樓照法軀遍界兒孫從此出人人瞻禮德何孤禮德韶國師塔道僃九重天瞻之在目前幻軀潛馬鬣窣堵點牛眠亂石憑雲護殘碑被土湮瞻依增慟感祖道是誰傳贈別山禪師負笈曾聞參少室昔人已去更安心本無世念居巖谷得晤天顏住禁林提唱宗乘施法雨弘揚教義動雷音我因詔對非緣小又遇高禪意轉深送印心堂主之天童上林花柳正芳菲賚詔南行出帝畿指日到山奉聖諭乘風策馬逐雲飛松陰夾徑寒侵靣山色連天翠滴衣因有其人揚祖道恩垂泉石盡生輝寄林瑞菴匡練禪師我住鄽中君住山子承父業自耕剛𭚱潛不發繇基矢起止須防趙老關千朵奇峰銜月冷一溪碧水照人寒瑞雲望斷空勞眼祇見銀蟾去復還示化南首座一句投機似印空翻身劍閣活如龍操持臨濟玄戈甲滅却汾陽異目宗鐵橛齒且藏鋒骨格超羣意氣雄解道觀音買糊餅伸手原來縮手中示印心書記萬機𥨊削處截斷衆奔流擊節冥符合臨機啐啄投心融吞衆象氣格逈諸儔拈起吹毛劍縱橫得自繇送吼林徒行腳行腳之人非等閒要明大事志須堅跨門要辨主賓句退步擬議喫痛拳莫作籬邊兔守穴直騰漢外鶴冲天靈雲已見桃花後他日吾宗賴爾傳腰包頂笠走諸方撥草瞻風見法王頂具神機千聖眼心通旨趣五宗綱家離糟甕遊獅窟書報寺焚付井塘學道如斯不退屈管教相續祖燈光耳根圓通文殊具眼選圓通較量諸根證不同惟有耳聞通實相元非身觸豈明宗當陽領喝開心印把斷關津絶聖踪彼土法輪種種別此方教體在聆功露地白牛本然清淨絶纖塵遍界堂堂白牯身兩角觸翻滄海月四蹄踏破碧郊春靈明歷劫原無相妙性超方沒比倫異號彰名隨別類風流意氣樂天真大佛頂相無相髻珠如日耀巍巍坐斷涅槃因無邊菩薩莫能覩有念凡夫未見真大地含容載不起虛空充塞却難倫三祇修證功圓滿頂放毫光遍剎塵七處徵心佛審阿難七處心窮諸玄辨已相呈不容妙體存知解豈落樞機妄影真掣破重重祕密網顯揚歷歷本來人經行誰動誰能靜內外中間絶點塵八還辨見佛問阿難何所見八還見處本非真指出緣塵已破妄莫將魚目當珠珍都盧剎海歸毛孔廓落乾坤露法身根境識三虛捏怪圓明妙性絶踈親因事有感道不行時覲者稀似兒喂飯哭相違千軍易得秦為礫一將難求漢用機堪笑捕魚驚雪浪何如拋釣隱巖扉故園留得梧桐樹自有丹山彩鳳歸行腳自警海嶽崩枯劫火然任從銷殞志彌堅黃金難買光陰住白髮偏催歲月遷選勝觀山非我意超方涉水覲高賢必須徹見娘生面步步清風透碧天過南海禮觀音大海無風浪湃天慈航高駕普陀顛婆心到處開幽繫手眼通身破愛纏楊柳水灑滋九界洛伽光放照三千此方的旨從聞得頓入三摩契本然題百鳥朝鳳雞冠花天生一朵貴為王羅列羣英朝上方常聽窗前風力𨷖頻呼籬外雨聲狂偏知曉露通身潤猶喜秋紅滿髻粧既有羽儀全盛德五更何不報天光海會方丈前有文官果樹枝𠏉久枯丙申夏豫進院至秋花復盛開咸謂瑞應賦之覺苑文官果樹枯靈根頓發葉扶蘇枝頭半露梓童眼𠏉底全彰古佛軀海會堂前呈瑞氣皇都市上獻良圖秋來萬卉皆零落獨羡奇花燦爛敷住錦山時見一斷竹插於盆內枝葉復生以為異事賦此寶地長竿萃奇無根斷節插生枝色翻錦水擬龍化翠擁苕川引鳳棲千古虛心堪羡爾一林堅節可欽伊蒼森挺立培三徑奕葉流芳無盡時知夢如驢覷井井中金夢搆醒來空手尋槐國已知長日月黃粱頓覺棄書琴春花蜂採愁風落秋樹蟬鳴避露侵正眼揭開觀世界三千剎海冷沉沉露地白牛牧人懶放遍界難藏白牯身分明頭角露天真非收非放隨他意微束微拘亦懶巡不犯人家閒水草何妨國土逐風塵牧童垂手休相覔脫却蓑衣臥月明龍吟枯骨異響難聞金鎖骷髏明月曬誰知個裡有龍吟若將耳聽成虛妄返復眼聞會異音無無聞淨裸裸離名離相最靈靈瞿曇敲問生何處絶後再蘇越古今木馬嘶風何人道聽無韁木馬出籠紗萬里平郊看晚霞大耳聞聲能辨別玄沙敲鐵驗知他風吹石臼團團月雨打銀燈朵朵花一切韻音皆妙唱何人會聽解歸家夜明簾外古鏡徒輝山月邀松簾外歸徒勞古鏡挂柴扉圓明湛寂清幽室暗閉除蒙脫垢衣水底有天銀世界潭中無物玉輪飛忽來捲起見天下始信風光自發輝沒底船子無漏堅固沒底船子不漏針斷篙無手足人撑放行把住觀風景舞棹停橈問主賓死水棲時空世界古帆高挂見天心從來不載他人物空去空來一葉輕向道莫去歸去背父從來曠劫未曾迷切莫貪求繞外馳向道逃時已背父歸來面目自慚兒古今共住忘家舍晝夜不眠讀典詩日月循環無定凖無心逐物豈遷移青山白雲無根却住白雲隱隱在林岑無去無來住古今體應風規悉應遍浮沉碧落散難尋海納湍虛月影山含不動淨雲深若有思惟皆妄念非心合道是禪心靈苗瑞草野父愁耘混沌未分先有性無陰陽地發靈苗不從雨露春風長詎涉秋冬霜雪凋奚須野父愁耘秀閒放耕牛荒草郊定水滋原深得力枝枝撑出月高標宗鏡録華嚴十種無礙一理事無礙妙理含虛法界中剎竿頭上播真風珠光交網毗盧頂智劍摧魔人我空翠竹森然明祖意青山廓徹露心宗融通根境原非二離却求真枉用功二成壞無礙洞然海嶽已相摧武帝開池得劫灰世界堅牢返成壞天人得相復還衰心隨萬境從他變性徹三空法眼開國土流離今古有循環鞏固又零頽三廣狹無礙小中現大從心應大隱小時方寸盈一念廓開通實相三身圓滿證宗乘滄溟吞納百川注世界撮來粒米輕妙性虛空平等法聖凡體共證無生四一多無礙一性圓明體遍周十方世界一毛收心融妙理攝多種道契玄機截衆流鼷鼠能降狂醉象鮒魚吞却巨洋舟揭開正眼觀塵剎收放縱橫得自繇五相即無礙萬象森羅現性中世間種類悉相同星辰日月從明暗大地山河觸處通清淨本然誰起滅靈瑩覺破自心空目前色法普賢境百草頭顛即是宗六微細無礙微塵分析入真空極目凌虛意莫窮水盡鯨吞石現出珠穿蟻度密思通藕絲牽象承渠力芥子藏山孔竅中一點靈光今古耀頭頭道契總圓融七隱顯無礙隨機應現度迷津或現羅剎菩薩身脫卸珍衣披垢服橫拖布袋入寰塵雲籠明月光圓滿雪覆青山頂露新順逆皆從方便接入鄽垂手總歸真八重現無礙香海浮幢華藏界一花一葉一如來大圓鏡智涵諸象隨現剎塵坐寶臺竹色入簾風美影月光歸室地無埃頭頭妙用皆真體物物全彰契本懷九主伴無礙千丈盧身蓮眼紺廣含妙義不思談普賢菩薩為高子妙德比丘作次男龍騰江海雲從翼虎嘯山林風出巖舉目明三誰主伴法身充滿作指南十三世無礙目前物物斬光新亘古騰騰非昔今當體廓開天地靜靈機透脫劫空沉春花燦爛秋凋落日月循環宇宙明大道本來無更變隨他去就不遷心過采石磯吊李太白滄茫舟泛錦帆飛風信經時過釣磯憶昔先生捉月處至今名邈尚流輝當時浪說騎鯨去到此猶言乘醉歸欲識渠儂真面目蹟遺江漢有神扉咏漳州開元寺優曇花漳水無端繫客槎閒中相對有曇花清香匝地蜂難近緑葉邀風秋易賒昔日已開天竺國而今猶綻法王家靈枝自是超凡品豈與羣芳𨷖麗華音釋鷦茲消切音焦鷦鷯小鳥也蠧都故切音妒木中蟲也穗徐醉切音遂禾成秀也韜他刀切音叨弓衣也鼷胡雞切音奚小鼠也沌徒本切音囤混沌元氣未分也
