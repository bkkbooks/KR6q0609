body:
  text: 嗣法門人海淳編再住錦山觀音禪寺語録進院上堂拋磚引玉價重連城點鐵成金克家之子衆中莫有克家之子麼僧問昨夜苕溪春水發梅香探步迎雲活一𫨻風光笑轉新乞師指示無篙筏既是無篙又作麼生撑師云拄杖在我手進云曲曲水灣灣溪連環九鎖如何去師云但看把艄人進云流入滄溟正杳然漁郎來問如何道師云白雲深處老僧家進云釣盡獰龍風正順滿船空載月明歸師云好個消息乃云豹隱大山將有年口生白醭懶談禪無端又被風吹出舌動雲雷震大千所謂法無定相居必有方道不虛行遇緣即應再禮耶舒相好整頓佛祖徽猷提起無文寶印印破百匝千重放出陝府鐵牛觸殺南山白額臨濟老禿奴未是白拈賊大丈夫兒超釋迦越彌勒切莫稱鄭稱楊點胸點肋須知更有向上一路始得正當為衆竭力畢竟作麼生道雲門一曲重新唱扶起門前舊剎竿復舉法燈和尚云本欲居山藏拙養病過時祇緣先師有個未了公案出來與他了却時有僧問如何是未了底公案燈便打云祖禰不了殃及兒孫僧云過在甚麼處燈云過在殃及你處師云山僧鄙志如斯只思崖壑潛身亦為本師有個現成公案未了今日對人天衆前舉似且如何是現成公案錦包特石化為壁焦尾青桐太古音臘八上堂驀拈拄杖云一二三四五五四三二一識得一參學畢踏翻無底船穿靴水上立脫却臭肉汗布衫莫向糊餅裏呷汁可笑瞿曇夜覩明星悟道大似判官手裏拾得鐵筆連忙走入閙藍中便道金剛般若波羅密以拄杖一劃云錦山忍俊不禁為他劃斷爛葛藤亦免後代兒孫將鄭州梨喚作漳州橘且聰上座有甚麼長處便恁麼道摘破香囊薰大唐昭陽殿宇生春色上堂迦葉慳阿難富靈雲見桃花香嚴擊竹悟者般淡話知他是有祖師意是無祖師意錦山一向風頭稍硬不入他華屋不履他門途獨宿孤峰目覩雲漢松石為枕蒲草作榻有時臨滸看瀑有時耕月鋤雲大衆且道山僧與麼為人還會祖師西來意也無儂家不管興亡事盡日和雲占洞庭立兩序上堂建大法幢擊大法鼓𣒰檀林裏獅子遊行瑪瑙階前象王蹴踏同扶臨濟綱宗共展衲僧巴鼻且衲僧巴鼻作麼生展一棒掀翻滄海去直超佛祖上頭關春日上堂僧問新春百物盡萌芽不意梅花蚤到家未審衲僧分上還有循環也無師云花簇簇錦簇簇進云恁麼則堂堂獨坐千峰頂卓卓分明萬古春師云虎嘯風生進云有意氣時添意氣不風流處也風流師云好個慶快衲僧乃云天地容顏麗江山氣象新髮從今日白人是舊時人冰解銀壺活波斯便轉身陽和無硬地驊騮踏軟塵五陵公子閨閣佳人携琴載酒睇盻而歌曰勝日尋芳泗水濱無邊光景一時新等間識得東風面萬紫千紅總是春有個英俊衲僧道長老者話是古詩為甚今日作佛法用但向他道自從踏斷來時路拍拍拈來總是歌安維那知客侍者上堂雲門一曲臘月念五錦山移向念四吹唱貴乎拍拍相隨著著是令手提輪槌萬人叢裏敵勝三頭六臂潛形八面哪吒乞命任他魔佛到來具大眼目分辨涇渭雪竇打破茶鍾驚起木馬疾如閃電走得通身白汗流犀牛扇子扇一扇揚下大千塵剎中覔則知君不可見見不見清寥寥無瑕玷攤向人前任展轉歲旦上堂僧問金輪影動遍界流輝玉闕令行大千草偃政當恁麼時未審承誰恩力師云木馬嘶風萬里驚進云可謂一人有慶兆民賴之師云堯風永扇萬年春進云應時納佑理自常然祝聖一句又且如何師云祥雲繚繞擁金闕進云某甲即不然師云汝又作麼生僧舉坐具云只將者個為標格仰祝吾皇億萬春師云重説偈言乃云三百六旬之首二十四氣之初斬新條令拄杖開封佛祖到來也立下風龍象蹴踏必敬必恭伏惟大衆萬福襄扶正法流通政當今辰祝聖一句作麼生道閶闔九重仙樂奏瑤池三祝等乾坤元宵上堂今夜燈明古佛放白毫相光遍照大千世界釋迦彌勒在光影裏橫尸倒臥等覺妙覺在光影裏頭出頭沒文殊普賢在光影裏轉身不得天下衲僧在光影裏覔佛覔祖乃至四生六道蠢動含靈在光影裏張牙努目錦山恁麼告報諸人還信得及麼若也信得功不浪施若也不信三十年後趙婆沽醋佛誕日上堂未離兜率十影神駒追不及已降皇宮黃梅時節動薰風未出母胎無端特地自活埋度人已竟人從陳州來不得許州信大衆既是不得信因甚麼年年初度驢糞燒香馬尿茶金盆惡水驀頭澆酬恩打殺非常事也是奴兒見婢驕是則是錦山不圖酬恩報德自有別行一路窺籓不入據鼎不嘗直向悉達未降皇宮已前當頭坐斷不重諸聖不重己靈何謂佛之一字吾不喜聞或有個英靈漢道和尚恁麼提唱大似掩耳偷鈴山僧許伊具衲僧眼還山上堂無邊剎海自他不隔於毫端十世古今始終不離於當處驀拈拄杖云木上座駕隻鐵船遊四天下文殊把舵普賢搖櫓直至西瞿耶尼打坐北鬱單越赴齋在中途忽遇一陳狂風暴雨東海龍王轟個霹靂雲散天霽連忙回到山門遇著金剛云我快活我快活任汝到處去來不如我者裏木上座云者裏是甚麼所在金剛無語懡㦬而退以拄杖卓一卓喝一喝上堂語不到處諸佛難下口機不離位刺腦入膠盆明眼漢沒窠臼彌綸三界撈摝四生高超物表明格外機裂破無為之鄉鋤盡性田之草透過威音那邊理事無礙圓同太虛無欠無餘拈起也大地黑漫漫放下也目前平坦坦全提一句意又作麼生當頭坐斷鐵牛頸驚走波斯落楚鄉喝一喝中秋上堂僧問驚風括地透衣寒月到中秋分外圓銀宇光輝人盡望馬師拈示更無端如何是今宵團圓底意師云斬却月中桂清光滿太虛僧擬議師便喝乃云萬機不到處寒光蕩蕩地口説不到處金風颯颯地手提不起處玉露滴滴地穩密田地處秋水湛湛地所以神光不昧萬古徽猷含剎海於毛之中移乾坤於兔角之上山頭鼓浪井底揚塵新羅國裏打三更太陽門下正當午中秋請上堂寺裏擂鐘鼓普請今夜看同去遊月府還有來玩賞者麼一年一度中秋夜蹉過佳期不再來復舉馬師父子玩月師云三人證成鱉祖云正恁麼時是如何師云無孔鐵鎚當面擲西堂云正好供養師云兩手捧不起百丈云正好修行師云好事不如無南泉拂袖便行師云未免鐵蛇繞腳祖云惟有普願獨超格外師云雖有格外機且無祖師意馬師父子雖排一盤棋勢完全却被山僧花劈了也諸人委悉麼機前明的旨句後削千差重陽上堂乃云秋風開竹戶分明獨露本來人落葉響空階驚起法身藏北斗夜半醒來沒處尋擎頭戴角空中走天魔弗識來繇聲聞莫知去就八臂哪吒把捉不住千眼大悲覷他不破若是明眼道流自合知機識變隨機普應萬物齊彰有此韜略不妨登高坐石看斷雲與野鶴俱飛遊倦倚松聽竹韻和雨聲共亂東籬舒菊慶賞清杯敘己交遊談玄談妙設若萬機休罷千聖不携意作麼生無事間來門首望馬拖車過響咿啞杭州府餘杭縣法喜禪寺語録順治庚寅年師受衆紳襟居士等謂於八月初一日進院至山門云閙市門頭通方閫域不可思議象龍直八畢竟與阿誰相見喝一喝佛殿雲門打殺德山折殿簡點將來各見一面新長老到者裏合作麼生到即不點伽藍堂弘宗在我護教由你赤膽丹心相扶到底遂以手插香祖師堂無角鐵牛眠少室驀地看來只是你昔年若解把住封疆佛法不到今日正當佛法委付不肖且道放行是把住是方丈者一片地乃是驅耕奪食之場𤊳佛煉祖之所你有一丈還你一丈你有一尺還你一尺其中若有作家便請單刀直入有麼有麼便據坐當日孝廉何朴菴居士等請上堂師至法座前拈衆紳襟請啓云雷音震忉利文光動天府句句截千差言言洞肺腑大衆聽宣切莫莾鹵拈僧會司請啓云同中有異異中有同磨銅削玉體露金風如何是體露金風底句以手度帖云丹桂香飄秋正濃宣畢以拄杖指法座云大寶華王露頭露面早為諸人説法了也更要山僧第二杓惡水潑還委悉麼其或未能不免畫蛇添足去也遂升座拈香云此瓣香道超日月德逾乾坤爇向爐中端為祝延今上皇帝聖壽萬安伏願社稷休徵邊圉寧靖此瓣香錦繡叢中流出箭鋒影裏拈來奉為本縣文資武烈諸位尊官并護法紳襟居士等伏願常為覺海金湯永作彤庭玉柱此瓣香名不得狀不得突出難辨欲避無從爇向爐中專申供養現住金粟本師百癡元大和尚用酬法乳之恩遂攝衣就坐師云齧鏃之機陷虎威將軍立處十分危不容眨眼揚眉看敵勝還他獅子兒衆中還有獅子兒麼出來哮吼看僧問苕水磨銅千頃緑佳山抹黛一痕青自古法王無法説為誰説法為誰聽師云自古輪王全意氣不彰寶印自然尊進云雖然如是爭奈落在第二頭師云渠儂得自繇進云恁麼則龍驤虎驟風雲際會去也師云十方同聚會個個學無為進云天共白雲曉水和明月流師云切忌隨波逐浪乃云全機提唱曲為今時獨踞高峰宗風掃地驀拈拄杖云新法喜和泥合水去也我為法王於法自在殺活臨時高超物表誰知業債難逃無端被人推上曲彔木牀口裏水漉漉地説性説心説玄説妙雖然如是若説著一字當墮拔舌犂耕所以承言者喪滯句者迷直令鵾鵬變化點鐵成金海嶽夷平移星轉斗有恁麼驅耕手𫨻方可撑門拄戶為法為人揄揚祖道正當今日開堂新行條令一句作麼生道拈起鏌鎁光燦爛銅頭鐵額也攢眉復舉寶壽開堂三聖推出一僧壽便打聖云恁麼為人非但瞎却者僧眼瞎却鎮州一城人眼去在壽便歸方丈師云寶壽劈太華之手三聖擒猛虎之機二老雖竿木隨身逢場作戲一時足可觀光若謂扶臨濟正宗太遠在何謂只見波濤湧未見海龍宮當晚小參若論此事如無毛鷂子遼空不留其迹直得星攢碧落月浸丹邱山青水寒風恬浪靜者個説話猶坐在潔白地上未到縣崖撒手在新法喜不作者般去就要且大家委悉山僧昔在天台通玄寺一日飯裏咬著一粒沙向威音未開口已前和聲嚼碎七零八落清滴滴白寥寥去來不以象動靜不以心有時十字縱橫有時壁立萬仞有時揚眉瞬目有時簸土揚塵山僧分上盡情吐露了也汝等諸人分上又作麼生良久云莫怪相逢太多事光陰似箭急相催立頭首執事上堂僧問如何是和尚家風師云拄杖箬笠進云如何是古佛重光師云堯眉八彩舜目重瞳乃云虎豹威雄全歸牙爪之力鳳龍飛舞必藉羽翼之功巧匠墨繩裁長補短良工好手繡錦鋪花雖是俊俏英靈岐嶷神方能擔荷宗乘扶持法社自然水乳相投意氣相接上下肅如內外安貼正當竭力之際如何指陳妙手不須誇遍拍三臺猶藉大家催重陽孝廉何朴菴嚴子參請上堂大凡參禪向上一著如今日衆紳襟登高相似必須到頂若不到頂焉知宇宙寥廓秋毫為大東魯為小既然到此合作麼生轉身進前則千尋瀑布退後則萬仞縣崖左邊荊棘參天右邊毒蛇攔路到者裏轉得身生死不能羅籠愛欲不被牽纏挺出風塵之表直超玄妙之機有句無句毛穿却者邊那邊超然不涉若是倚墻靠壁漢大似瞎驢繫鐵橛朝打三千暮打八百有甚麼過雖然如是莫道法喜壓良為賤擲拄杖下座結制上堂洪爐大座自今開龍象憧憧奮迅來瓶鉢此時俱放下莫將山水挂心懷諸人既到此有三件事與諸人議定一者生時不肯坐死了不肯臥二者不得覔佛覔祖指東畫西三者不得動著法地若動著一切不安但二六時中平坦去無是無非無人無我因緣到來春雷震動直得百草頭上現出金毛獅子一毫端上突出無位真人照用同時人境俱奪歷古磨今輝天鑑地若是隨羣逐隊漢東邊浪蕩西邊遊戲他日閻王老子打算飯錢將何抵對莫道山僧無警策事到頭來悔已遲上堂僧問向上宗乘即不問如何是鐵饅頭師云塞斷汝咽喉進云恁麼則無米飯阿誰能喫師云無面目漢進云未審還有不從口食者麼師云有進云如何是不從口食者師云從鼻孔裏食進云莫道邇來多淡泊雲門胡餅趙州茶師云謝汝供養乃云雪峰毬雲門普發機須是千鈞弩李廣將軍射石頭錯認南山白額虎寒山撫掌笑呵呵金牛飯桶堂前舞何謂今日因齋慶讚供養十方諸佛生歡喜心乃合掌讚歎云善哉無上士供養極如意大寶妙莊嚴功德不思議美則美矣有個深沙神道我自從喫飯不曾咬著一粒米自從穿衣不曾挂著一寸𮈔雖然恁麼且道他還具眼也無不見道有念盡為煩惱魔無心未合祖師意大佛開光上堂法身無相體遍虛空報身有形光騰丈六容儀挺特貌目慈嚴見者皈依聞者讚歎乃至童子戲聚沙為佛塔皆以成佛道何況蔡居士發大勝心重粧聖像今日又請山僧升座舉揚般若為佛開正知見洞明十虛毫髮無間所以粧報身而證法身信宗乘而悟般若亘古今而不昧顯幽暗而常明無行不圓無果不滿正當今日為佛開光一句作麼生道以拂子向佛點云點開碧眼無遮障洞見十方塵剎中復舉趙州云金佛不度爐木佛不度火泥佛不度水真佛內裏坐師云趙州老漢擬他別有長處元來坐在窠臼裏大似頑蛇戀窟無有透脫之路法喜設使若有恁麼見解斬為三假上堂佛祖樞機宗門關要無言童子暗嗟吁無腳仙人劈面跳我若據令行你便高山看紙鷂我若平坦去你便入海撈蝦蟹我若十字縱橫你便花街柳巷觀聽大衆且道此人還是神通妙用法爾如然有人緇素得分明許汝親見法喜冬至上堂冬節以前混元剖判萬有參分冬節以後晷運密移陰消陽復正當冬節日萬卉回春意日添一線長寒梅香破玉石筍暗抽條若論衲僧分上腳跟底硬剝剝地金刀剪不碎玉斧劈不開一任寒暑遷流生死交謝何曾動著一𮈔毫復舉慈明圓祖冬日挂榜僧堂前作此字其下注云若人識得不離四威儀中首座顧謂衆云和尚今日放參明聞而笑之師云法喜有人識得此意大開東閣安排明設或未然山僧不惜唇皮與諸人注破慈明向潔淨地上打疊了也寫出篆文鳥字不落時機鬼神莫能測天魔覻不破大衆還委悉麼一般清意味料得少人知請化士上堂扶持祖道必賴高人化導檀那還須上士入鄽垂手應運無方打氊拍板唱無腔曲自然到處合調達者知音為衆竭力遠涉程途一句作麼生道搶榆尋食非鳳毛膽氣包天入虎穴因雪上堂馮夷剪破澄潭練飛作天花掩畫圖夜深庭際堆三尺未審有人立也無山僧記得古人有言下雪有三種僧一者蒙頭打坐二者吮筆吟詩三者圍爐説食我法喜門下幸無此輩三飱粟米飯一桶沒鹽羹苦樂同受發明向上宗猷亦有古人之風不見楊岐和尚云楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居又我本師云屋不在廣無礙即居衆不在多相安即住所以一言以為天下法剪除衲子膏肓令人安心向道正當恁麼時還有立雪咨參者麼雪後始知松柏操事難方見丈夫心上堂僧問如何是海底泥牛銜月走師云看取腳下進云如何是巖前石虎抱兒眠師云通身無影象進云如何是鐵蛇鑽入金剛眼師云髑髏粉碎進云如何是崑崙騎象鷺鷥牽進云佳人引月上樓臺僧喝師便棒進云恁麼則袖裏金鎚光燦爛吹毛寶劍逼人寒師云惜取眉毛好僧又喝師云退過一邊乃云君子一言必須至理相打躍拳必須倒你參禪之人必須參到無參處疑到無疑處山窮水盡處緊把牢關毫無走作向一念未生已前直下坐斷根泯情忘死生路絶到與麼田地釋迦老子是個撑糞船漢達磨祖師是一枚白拈賊天下善知識是個塗毒鼓三藏十二部是判官簿一千七百則公案亦是腐草堆山僧如斯告報諸人還信得及麼不枉山僧到寺已承檀信請揚正法頂門若具摩醯眼識破根源沒甚奇臘八剃度上堂僧問世尊夜覩明星悟道如何是悟道一句師云坤維步步起腥風進云霜風徹骨寒處處梅花發師云入眼即成勞進云金屑雖貴入眼成翳何物入眼而不成翳師云琉璃殿上莫㞘沸乃云慧刀割斷愛羅網圓頂緇袍德不孤要識如來成道日彼既丈夫我丈夫汝未出家時心心慕道念念離塵既出家已秉佛律儀登佛階梯若是伶俐漢聞者般話便能領略則不用埋頭雪嶺六載勤勞夜覩明星方成正覺果能恁麼不負出家之志且今日瞿曇成道得度一句作麼生道金刀削盡娘生髮便是牟尼佛子孫元旦上堂僧問昨日殘年即不問今朝新歲意如何師云十八佳人愛巧粧進云如何是新年人師云剔起眉毛看兩眼烏崒嵂進云如何是舊年人師云自携瓶去沽村酒却著衫來作主人乃云昨日臘已去今朝春又來佛法無定期豈容人安排既無安排畢竟如何驀拈拄杖云山僧以此祝聖聖壽無疆以此讚官僚必享千鍾祿以此願檀護共證佛菩提以此説佛法我法妙難思以此慶新年萬物咸皆泰所謂在天而天在人而人居方而方居圓而圓智周萬物以無勞形充八極而無患者是衲僧分上事如何是新年頭佛法可笑憧憧賀歲客借婆衫子拜婆年元宵上堂始賀年初一今朝又上元華堂歌擊鼓燈月耀乾坤正當燈月交輝之際光境未忘之時見是何物直饒光境俱忘復是何物大衆向者兩途覻得破燈明古佛不須別處尋討今夜花衢柳巷動地放光俾一切見者聞者手舞足蹈是事且止祇如衲僧分上又作麼生自從劈破華山後萬年流水不知春解制上堂心不是佛智不是道破紙包屎橛囫圇嚼不破所以道人貧智短馬瘦毛長牛角不用有馬角不用無大者大法身小者小法身日應千差事同一體打開布袋口分袂各天涯石女夜來吹觱篥無影草裏驚出蛇雖然如是若要變化去山僧更助汝一陳風雷相送遂卓拄杖云幾多頭角成龍去蚯蚓依舊鑽泥沙喝一喝佛涅槃日上堂愁雨灑斑竹春山啼鷓鴣瞿曇末後事金槨示雙趺騎驢下地走穿鞋赤腳歸平生盡用腕頭力腳跟線斷追不及無處覔千古令人思不息作哀聲下座佛誕日新城縣圓明菴完萬佛懺請上堂僧問未離兜率已降皇宮未出母胎度人已畢請問和尚為甚麼今日又降生師云為人須為切殺人必見血進云恁麼則大地瞻仰去也師云速禮三拜進云遍身現塵剎何處不風流師云與闍黎分上毫無干涉乃云清淨法身金沙灘頭馬郎婦圓滿報身紋生錦繡玉麒麟千百億化身牛頭沒兮馬頭回今辰悉達降誕九龍吐水沐浴金軀大衆且道者三身浴那一身以拂子劃卅云若向者裏倜儻分明已知三世諸佛共個鼻孔出氣即一為三即三為一總在生死關頭接物應機是則是更須知有一人不受教化造無間業不重諸聖不重己靈朝打三千暮打八百終日聲色裏臥且道此人還受懺悔也無大膽駕頭衝突過小膽哀告訴所繇辭衆上堂法無定相烏雞徹夜潑天飛道不虛行象駕不遊於兔徑去去來來合自繇旋天轉地機如箭明明歷歷絶囊藏覔則知君不可見蚊蟲眉上打鞦韆夜叉頭上全體現杖挑日月出苕溪路逢衲子隨勘驗大衆路逢達道人且與他説個甚麼峰前疊翠如螺髻江上楊花似蝶飛音釋咿於宜切音伊聲也肓呼光切音心上鬲也圉偶許切音語垂也㞘都木切臀也
