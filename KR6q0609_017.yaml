body:
  text: 嗣法門人戒修編偈山居四首自笑行蹤野鶴如乃尋青嶂結茅廬深鋤僻地堪栽竹寬縛疏籬好種蔬心路絶時休覔道玄關透脫勝看書有人來問居山意盡把家私説向渠住山真趣道高標猶勝陶公懶折腰旋拾毛縫破衲謾裁兔角挂單瓢古今空住忘賓主南北無鄰有鹿樵月照蘿龕清獨坐一爐柏子案頭燒青嶂緑蘿並古松三間茅屋白雲封砂鍋壘石煮新月紙帳疏窗禦晚風無事心懷常灑落有為鬼計被羅籠浮生多少奇男子開眼堂堂失主公搆箇茅菴遠市塵四圍松竹自為鄰提籃深塢搜籩笋持钁開園種野芹荷葉雲衣堪禦冷松花月餅早嘗新城隍那及居山好得意安然道亦親船居杖笠飄飄出帝都買將小艇置瓶盂柳堤邀月陪詩興花浦停橈聽鷓鴣晦迹一身輕似葉忘名四海樂如鳬世間萬事俱休問船子中峰可共途皇太后賜御果賦謝忽承名果惠空齋對此深慚汗滿腮上品却非人世有異香端的自天來萬善殿建水陸道場買鳥放生遂成口占靈禽業重難逃避飛海騰空盡網來幸遇聖恩功德普此番放去脫輪回送別山禪師之錦忠山同住禁林將有年而今分袂意茫然老來辭闕思幽隱拄杖挑雲入錦巔示禹工王居士治水疏通得禹工曹源一滴潑天空若能啓口都吸盡始信龐公鼻孔同示念觀邵知縣有念歸無念即空觀心寂照却迷蹤一機撥著火星現迸破虛空湧日紅示見素徐居士見處超然獨露身素心無繫逈根塵靈源徹底明如鏡海印重光山色新示涵初沈居士涵虛湛寂性圓明學佛如初一念成金骨天然非鑄就頓超生死劫空城示濟川何居士振濟川流鐵壁通要知靈脈湛源泓若能吸盡西江水扶起龐公古道風示厚菴曹翰林無位真人在目前臨機造次莫茫然若知向上出身路佛法無多不值錢示欽天監正長公楊居士文華偉象長英公天地根生與爾同向此靈瑩算得徹直超三際契真宗贈愍忠普潤律師靈源法雨潤無私普利羣機洽帝都淨戒宏傳為範則精嚴無犯德何孤贈秋潭李孝廉久扣禪門佛祖關幾番來問用心參吾宗賴汝相扶起秋桂清輝映碧潭駕幸海會見方丈前葵花盛開以手撫之索咏逈出塵埃品自殊衆芳林裏却如孤丹心唯向日邊轉感得天風著意扶謝易齋馮侍郎惠禪衣禪衣惠我過隆冬竹榻蒙頭禦雪風年老畏寒真受用坐來不覺五更鐘遊銀山鄧隱峰道場寓古佛崖度暑偶成昨住皇宮碧玉殿今居崖洞白雲窩消融萬慮全無事每日間間打睡多承恩三詔住瓊殿爭似山居石洞房別是一番風景趣粗衣淡飯味偏長示尼體真心道人正體圓明本性空六門出入任西東何妨妙運搬柴水只要當人識主公示尼濶玄慧道人火爐古鏡濶無多公案兩重急透過坐臥經行常管待玄關踢脫出娑婆示尼六瑞祥道人自家一座紫蓮臺觸著鋒芒眼豁開六念門頭都打脫渾身即是古如來壽青藜耿都憲庭前丹桂正芬芳况有台星在畫堂間把青藜著青史蟠桃九熟待君嘗贈御馬監正奇吾王居士忠直仁慈是道場宿承記莂作金湯高沙別業今雖隱尚有清名布大方志禎輔李居士割股燃臂保母難兄難弟越尋常竭力殷勤事北堂割股燃身何足道直須親見本爺娘贈福緣一足禪師繼濟英風棒喝親揮開天地絶纖塵維揚一足關難過猶勝馬駒踏殺人遊廬山東林寺經遊蓮社古巖阿極目廬峰峻秀多親到遠公送客處相傳三笑虎溪過與吼林鯨侍者大法明時萬法明從來千聖共途行臨機眼目須端的濟上英風可繼承示季子錢知縣萬法歸一歸何處石女三更繡露柱默地時時著眼看毫端覷破超調御示蘭谷馬總鎮果是靈峰記莂人而今斷不昧前因吹毛寶劍輕提起大地山河一斬新寄耕月屋首座老年晦迹在書林日望都門絶雁音一句無私遙致囑時危切莫下青岑寄佟部院馮侍郎遙望京師路八千想來學道更心堅數年已別參商濶一偈馳來問衆賢寄秋潭李孝廉智劍洪機大辨才通身手眼揭天開單提一句相分付倒嶽傾湫劈面來與寶印初聞二上座個事洞明本現前臨機大用掃廉纖頂門一句相分付他日吾宗賴與傳安國家風偈一鉢千家飯一盤淡苦虀若喫同此住不喫任東西示明壽程信童丹桂根原在月中一枝今已映簾紅童真若也能明道壽比河沙算莫窮石機禪人在俗時割股供養求度以偈示之出家兩字豈常尋學佛應須苦行深為法忘軀雖可證還期究取本來心與秋潭普現李孝廉圓明普現徹心宗奕葉相承繼濟風棒喝臨機全體用當陽縱奪據天中與雪紅維那同喫莖虀已數年桶篐嚗處見青天將來唱道為綱領殺活臨機貴現前示寶印侍者職侍巾瓶有數年逢原左右學心堅三呼三應元無事祗要當人識本源寄錦封史邑侯祥雲垂殿擁仙官匣裏龍光射斗寒况欲調羹真敏手沙盆共掇竟無難錦山八景潮音松籟碧潭虛湛印金盆碎玉清音濯兔魂天籟松濤堪好聽危樓靜夜似箎塤錦岫溪聲錦岫珠林古畫屏山晴鳥語悅人心溪聲咽石風清耳晝夜鏗鏘不斷音功臣塔影七級浮屠聳碧空盤層星月繞西東團團孤影千山現卓立功臣山錦封石鏡朝雲寶鏡當空試眼看盈虛名邈詎相瞞雲開獨露大圓象今古光輝奪夜寒門松夜月門徑喬松垂翠陰夜來月影亂篩金鶴翻珠露衲衣冷紫綬秦封華蓋欽劈嶺樵歌鐵壁銀山雷劈破中流月映水光茫漁樵對答歌聲徹隔岸村煙送夕陽長橋遠筏長虹高駕兩崖邊波底遊龍影躍然遠筏急流施好手一篙撑破水中天古木歸鴉紫陌喬林綴翠香流陰殿角蔭炎涼靈鴉遠哺歸投宿日落峰頭帶月翔遊金山寺金山擁翠壓羣峰名震江南古道風獨踞中流分兩岸千山萬派盡朝宗示宏讚侍者索汝犀牛破扇子要明去處眼如瞽湛然虛寂體如如動著蟭螟吞石虎壽慧明上座六旬慧眼圓明展大機金剛正體破羣迷從來不落花甲子戒德巍巍佛祖齊火爆重重紙褁肛藏煙觸著無明火噴天㘞地一聲全體碎恍如雷響震山川化米驢腮馬嘴吞諸方鼻孔遼天絶覆藏一日三思無別念束腰篾解要檀郎送紫萊侍者參方智辨龍蛇展大機莫存知解涉離微掀翻海嶽遼空去擊水鵬摶遍界飛示人念佛生老病死苦五首潤腠佼膚血氣充移山煮海壯豪雄此生不念彌陀佛業債隨身死苦空一生創業受波奔老覺多情愛子孫自把彌陀如子想必生淨域品為尊貪心恣意染沉疴受苦無人替汝何若念彌陀如不退直超苦海出娑婆蝸名蠅利算無窮教念彌陀不得工一息不來隨業去分贓冤債鬼西東人生五濁苦千般謾把琵琶月下彈時想彌陀精進念頓超塵剎樂邦安金剛經五眼能觀諸法相所矚對前塵觸處知分析隔窗不見人毛頭輕撥轉心空天眼通舉目觀塵剎乾坤掌握中慧目明如鏡觀諸法性空能明佛祖病寂照契心宗頂𩕳正法眼異目頓超宗覷破千差旨慧命永流通佛眼超三際了明最上乘髻珠如日耀普照利羣生答淵堂禪師栴檀林裏懶優遊疏拙何堪與世儔兩手扶犁深過膝鐵牛耕破萬峰頭募造大殿金梁跨海非常木拄地撑天必大材報道東君如有意一齊吹入我門來示頂相關主向上玄機不二門直須透脫始超倫腳跟歷落無絲繫佛祖從教一口吞示普悅瑆侍者單提一句問知音白棒當頭直指心撒手懸崖歸去也路逢活虎要生擒與易齋馮翰林大根猛利直超羣異目明宗孰比倫智辨英才匡佛祖氣雄剎海一毛吞遊天台華頂智者大師求經臺華峰頂上有經臺此日登臨曙色開遙憶昔人功行重至今石不上莓苔天台石梁橋一虹雄跨兩山巔萬仞凌空挂玉簾五百高流橋上過腳跟底下絶塵纖召對有感上林降旨鳳銜來自愧何緣到九垓如此疏慵何所重聖明端不棄樗材拄杖一條楖栗撑天地掃盡邪魔野干蹤涉水登山兼賴汝鉗鎚衲子悟心宗贈國柱李近侍佐佛如同常輔國忠心在簡道心堅全身已作擎天柱傑立時時在御前示竹書王提督翠竹森森即佛心能持節操是高人若明至理無生意了却凡心始出塵示悟本上座實究真參是上乘直須頓悟本來人丈夫若負出家志大海金鱗被陸沉示可航禪人參禪好似咬生鐵咬去咬來要念切拶破蟭螟銅眼睛泥牛頸上迸出血寄一菴張居士機契超然逈絶依宗風深究自心歸初參相見竹公也四喝承當便發揮與開蓮侍者臨濟綱宗正脈長後生可畏便承當全提鐵面輕翻轉白棒一條滅祖殃示律己書記點不加文任所之還須踏倒自無疑威音那畔能明了始信宗門也大奇示少林箕朴上座佛祖機緣作指南百千公案令人參莫將祖意亂分解剖露圓成落二三和豐干三生歌三應凡身性不迷投胎出世自家知不題詩句石頭上誰識牧童即是伊示聖果知藏承當護法大丈夫須明心地作良圖今朝分付吾徒也珍重保持德不孤募造亘信和尚塔無縫塔樣越尖新好手僧繇畫不成若有作家知此意玉樓安隱法王身與念菴傅居士入哲超羣大丈夫明心見性絶疑狐全機殺活巨靈手臨濟宗風賴爾扶啓賀徑山費老和尚六啓伏以岡陵萃薰風時令薦蟠桃華嶽呈祥靈鶴銜籌增海屋恭惟座下派衍曹水活錦鱗以輪波瑞慶鍾軒感金星而誕命旌幢崇豎摧折魔軍法震洪音紹隆多子某緯蕭末品拾艾幽人企遏雲以連陰叨餘光於鄰燭伏願瑤池慶祝壽同趙老雪眉道德尊崇宗傳達磨心印疑龍閃而霧集睇獅窟以雲奔匪敢赴筵不成雅獻庶大含弘之量有微懇意之誠伏冀尊慈均祈涵鑒賀本師百和尚五旬啓伏以蓮花碧沼薰風襲襲動天香雷震晴空梅雨霏霏滋法界薩多雲集寶座煙縹慈風掃蕩於邪風慧日爍開於晦日恭惟座下道化三千棒頭敲碎虛空骨名喧四海腳尖踢出瞎驢兒欣逢大愧未蒞筵遐瞻懋德之祥光惟願籌添之上祝某微軀荏苒鄙質疏庸勤懷寸意虛酬深慚藜羹未獻伏願靈椿益老道眼愈明寶航古柏崇芳法體神堅亘秀暗迷為慧炬險隘作津梁道帙鞏固於名藍法鼓聲聞於上國臨啓俯腮不勝遙瞻答衆護法啓伏以靈山斗望鹿園玉樹再敷春選佛場開龍圖紺殿重稽巘全憑麟閣英才荷宗豎教妙在鴻都俊哲作塹維藩恭惟臺下智談雀孔學識豹文既而外現宰官身子韶深領大慧之妙道須知內祕菩薩行子瞻巨佐佛印之法門承錫珠韜荷委鼎命某墻面奚用灰心易寒但知業債難逃兩角穿雲耕野水良由公案未了一條兔杖敲清風伏願金門瑞靄常擁佛日耀乾坤奎璧聯輝冀散潘花衛鷲嶺瓊基壯麗大開獅象之行林壑尤深多集龍蛇之變法筵永固道帙維新謹此致酬仰祈鑒亮復臨安劉邑侯啓伏以造化青天曉日麗龍章之藻靈明蒼狗春風來鳳閣之庥口角雷鳴震裂文殊鼻孔眼睛電掣爍破仲尼心肝治世嘉言允皆正法恭惟臺下政題垣府德洽神與紫泥函帝里之珂聲赤鳥飛金城之月色念祖道之寥曠荷玉音以雅臨某忝最後學愧識先賢𣰦𣯶破袈裟久潛雲谷黑漆曲拄杖常靠牀頭幸蒙知己投誠敢不如命伏願鼎羹在手撥轉如來正法輪玉帶隨身請解錦山鎮泉石頭頭共慶物物咸新肅此布忱統祈垂鑒辭臨安衆紳襟啓伏以佛門護法全憑隻手擎天孔道持𢖍獨賴傾心砥柱恭惟臺下屏翰綱宗璠璵器宇名齊東箭之聲功並南金之勵初自尺緘馳衲扶起砂盆不惜兩道眉毛振揚金鐸某山林自適巖谷家風辜負明光敬辭法席草鞋絆蹻棲遲流水落花布衲蒙頭嘯咏白雲黃葉爰申薄札感籲初衷遍報高賢曲陳微意他日相見別峰不殊錦水承恩孤岸崚嶒猶望作塹某不勝酬謝之至復餘杭衆紳襟啓伏以昭象璇𢖍胸運仲尼日月天然智敏通達佛祖徽猷口吸西江眼空東魯騎金鰲騰霄漢遊獅窟護禪林恭惟臺下躍龍庭英飛鳳穴鼎鼐砂盆同掇股𣍱剎竿共扶幸佳章之雅召蒙台駕以親臨某樗材匪用終愧白額大蟲智囊弗聰敢效赤梢飛鯉意欲巖阿藏拙只思耕種度時奈為法喜虔誠豈挂草鞋不赴伏願文星垂照光映林泉手彈沒絃琴貴遇龐公而會聽口吹無孔笛喜逢郭輔以𢋫鳴祗樹重新祖庭增彩肅函附謝統冀鑑原復衆護法啓伏以紫府名先攀香風之玉桂祖庭秋晚賴屏翰以鼎新慕貫時之貞英戢晞陽之厚德禪河共泛寶所同登恭惟門下聲名摩詰身騰塵剎寰中伯仲給孤金布栴檀林裏馳書遠達為法翹勤某性慵疏拙惟圖崖壑看雲德鮮行微意在溪山臥月因見投誠篤切詎違法席荒墟拄杖橫敲已愧德山老漢熱喝領略敢匹臨濟小廝伏願心空及第頓超不二法門覺苑花開直證一乘妙果法幢永固丕振宗風獅窟繞圍常演雪曲不盡寅衷均祈丙鑒復邵武胡邑侯啓伏以翰墨流芳遍灑祗園舒瑞色德音布野普被樵水現禎圖壼道民瞻仕林文憲恭惟臺下琴堂折獄威凜六月飛霜花縣行春樂同千家𥠖庶某奉聖旨而歸梓幸遇郭公以再來一介鄙軀雅蒙鼎箋垂召赴單條楖栗尤賴摩詰振家風伏冀道眼圓明識破威音個事心花頓悟妙契鼻祖真宗鐵笛同吹砂盆共掇荷蒙曷勝肅啓奉酬書問請天童木老人道崢海嶽德峻坤維佛法揚萬億國中宗風播大千界內旌幢高豎法鼓遐聆直令凡聖欽崇所以人天景慕羡為法燈大燭世間者也然今佛心天子久修梵行慧性敏捷時以萬幾之暇體究禪宗之理曾會棒喝之機密契幽微之旨繇能篤信於佛乘始闡宗風於禁苑所行者聖人之道也所肄者聖人之教也寬讓恕禮以待人慈惠撫循而顧念每以駕幸萬善殿咨詢當代禪郢無不揄揚推獎道德然和尚名傳丹闕風扇彤庭是以特遣欽差齎詔詣山惟冀不吝洪慈慨然飛錫莫負聖明之誠心有失宗門之正信遐玄昭著速蒞金筵仰企雲光肅端躬候復福嚴費老人門庭高峻道德積乎淵微模範森嚴名譽播夫閫野鉗鎚大振人人於棒下翻身罏鞲洪開個個於機前見性闡初傳之妙諦挽象季之狂瀾光逾先人恩垂後裔某行微慧淺多慚無益於法門識陋見疏深愧有辜於師長自甘隨緣去住乃携杖履天涯疇知聽業牽纏得挂鉢囊北地久疏視問時深臨履之思遠阻山河惟切岡陵之祝諒以法臘年高自獲戩穀之休無煩葵藿之望者也某叨蒙老人福廕屢承朝廷恩渥前歲之事已悉聞於江南客秋九月駕臨延壽寺面召入內萬善殿結冬激揚宗旨延斯制解敕號賜印殊遇種種所有問對暇時業已悉諸宸聽先密老人語録井五燈嚴統奏進皇上謂此書盛益於世敕御書房裝成四套以俟入藏深知臨濟家風非真獅子兒莫擅入門閫所以屢請知識參對不緣江風有恙老人早被遇矣謹復上明發本師百老人乙未年受燕京檀護請住海會寺破落門戶𠢔撑今此法席頗成時有南方衲子來彼每詢慈履興居法燈照世令天下仰慕桔不勝之喜也客冬荷上詔入內庭問對賜紫皆賴和尚之威光帡幪之德澤雖今法門奕耀祖風振實愧無補於法門遡來彼方學者好講習公案穿鑿語句續衍宗譜以為流傳心印嗟乎多有不信教外別傳真參實悟故法道誠難行化矣今子蒼公旋南省覲敬肅慈燭答易齋馮侍郎適接手教啓函采覽當知宿有般若之緣以致今時參究之切據言向上一事忽然透徹極讀來偈詞鋒婉雅吐句驚人知居士見處平實匪落情識異路靡被聲色所埋但宗門中事非比牛迹功深鷦鷯搶樹必須尅志深入玄奧方得大機大用如萬派洶瀾倒嶽若大鵬鼓海擒龍不容擬議直截橫吞果能到此階級庶使知恩有地惟希保任謹復與子濂杜兵憲既受吾法當遵佛行善自護持操卓精明不被法執所障頓超見聞覺知控佛祖鉗鎚任他傾湫倒嶽而來自有出身之路直截斷凡聖窠臼開鑿人天眼目可謂作家手假故從上鴻儒隨處現菩薩身恆與知識遊禪河泛法海竿木隨身師資唱導由斯扶揚祖道光賁法門矣餘不既贅伏惟采聽慰一生應通政致仕朝內宰相山中衲子推憶崇古之風遽荷殊常之眷精鋭靈瑩動靜神逸外弘五典之教內究一乘之理逈出塵寰深明妙道不汲汲於榮名不戚戚乎祿位疏倣陳情賦成歸去解組丹陛回侍慈幃而名節獨立忠孝兩全高超物外孰能為焉謹裁拙句一律少申世外之交不盡塵思伏冀鑑存音釋籟落蓋切音賴凡孔竅機括皆曰籟佼古巧切音攪好也樗丑居切音攄惡木也宥爰救切音又寬也俯匪父切音甫低頭也庥虛尤切音休庇蔭也籲俞戍切音預呼也肄以智切音易習也
