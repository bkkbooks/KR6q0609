body:
  text: 嗣法門人成秀編示衆示衆今朝正月十有八衲僧腳下熱火發燒得眉毛已焦枯石女堂前把墨潑同門出入不相知喚作張三却李八喝一喝示衆諸大德若論參禪者件事如老鼠咬生鐵相似沒你下口處沒你鑽研處沒你承當處沒你棲泊處擬欲搆之轉見轉遠若欲放之灼然目前如銀山鐵壁仰之彌高鑽之彌堅約不進前推不向後諸人到者裡作麼生轉身吐氣若欲轉身吐氣直教無手足人拳踢相應猛力一推縱饒銀山鐵壁也須粉碎大衆愍忠恁麼道還知落處麼若知落處正好吃山僧痛棒如其未薦三十棒等待別時來示衆舉杜順和尚云懷州牛吃禾益州馬腹脹天下覔醫人𬉹猪左膊上此頌美則美矣祇是不經人檢點若被明眼人覷破不值一緉破草鞋諸人委悉麼猶其未能萬善為汝注破殊不知這老漢口甜心苦句裡藏鋒眼觀東南意在西北明眼作家自合超格且如何是超格底意一僧便喝師云好一喝只是無主僧又喝師云汝連兩喝主落在甚麼處僧擬對師連棒趂下堂示衆道曠虛玄體無向背觸之不得視之眼聵以拄杖卓云盞子撲落地碟子成七塊大衆既是盞子撲落地因甚碟子成七塊一僧云鵓鳩樹上啼意在麻畬裡師云意旨如何僧云祗許老胡知不許老胡會師便喝僧禮拜師劈脊一棒示衆若謂諸佛出身處蟭螟眼裡輥繡毬若謂衲僧出身處從天降下則貧寒從地湧出則富貴若謂衲僧行履處無中有路透荊林還他好手若也透不過亦還他好手何謂虎瘦雄心在人貧志氣高示衆馬祖升堂蘇嚕蘇嚕百丈捲席悉唎悉唎若作佛法會全無巴鼻不作佛法會大似失利諸人向者裡的當得去任汝拈毛拂穿却衲僧鼻孔將兔角杖煆煉聖凡剔摩訶衍之骨髓鋤斷性田之妄根發向上真機逈脫樊籠一道逍遙門門解脫且如何是解脫門泥牛吼破三更夢木人坐斷六門機示衆凡知識樞機三賢罔措十聖難明匆平白地上拈起一絲頭直使法地震動窠臼掀翻於無事中生事無句中顯句真心無相頓超萬行妙性本空不著一塵貧者濟他驪珠受用富者令伊徹骨貧窮赤灑灑淨裸裸智月皎於太虛慧鏡澄於碧海包羅萬法𭣣攝毫端誠能如是則與千聖同躔共個鼻孔出氣若乃隨羣逐隊菜囊飯袋漢妄心牽引何時了辜負靈臺一點光示衆參禪學道先須發起信心信心若固志氣超羣縱有一切魔魅所撓必不退墮矣所以信門深遠法城堅牢成就一切菩提殊不知信心原是當人靈源種智成佛作祖慧命衲僧悟道根由皆從信心所成豈不見神光參達磨斷臂求法立雪乞示為法云軀今古標榜此是第一個信心也六祖參黃梅五祖每日作務墜石春碓勞其身心苦其筋骨此是第二個信心也臨濟問黃檗佛法大意連喫三頓痛棒不生退屈此是第三個信心也仰山參溈山不明此事發心牧牛三年常受風霜寒苦此是第四個信心也雪峰九上洞山三到投子嘗職飯頭為衆竭力此是第五個信心也踈山聞大溈一語便賣被單而作程費千里跋涉咨請指示此是第六個信心也慈明結伴參汾陽更衣入兵隊不顧危亡此是第七個信心也天童密老人參幻有和尚親上燕京三次不憚路險艱辛力創禪門崛起臨濟正宗此是第八個信心也山僧舉此數員尊宿以曉諸人從上乃佛乃祖皆從信心而成無上之道所謂信乃道源功德母長養一切諸善根今日參禪者頗多鮮有悟者何也祗因用心不切依稀鼻孔倣佛眼睛雖在堂中趺坐其話頭暫時弗覺被掉舉忽然掉過西便向西邊境界上作活計忽然掉過東便向東邊境界上作活計於此錯過光陰埋沒己靈辜負諸聖若求其悟者鮮矣諸人若為生死事大放下諸緣離心意識單提一個話頭疑來疑去參到無參處追到無追處緊緊把定牢關毫無走作就將娘生鼻孔直下扭破如冷灰裡豆爆徹底翻身故云絶後再蘇佛祖欺汝不得諸人若信山僧此言如此參究去若不悟道佛法不靈驗山僧成大妄語自甘拔舌與諸人無分示衆佛法無人說雖慧不能了或時閙閧閧或時靜悄悄諸兄弟若向靜悄悄處安身如駑馬伏櫪羈蹄望絶崖而跪足正是墮在毒海此謂膏肓禪病也若是具眼道流正在閙閧閧處別立一機瞬目視伊行即打坐即錐長劍倚天外直騎千里駒畢竟如何保任不萌草解藏香象無底籃能盛活蛇小參萬善殿結制小參僧問祥雲生滿座瑞氣擁禪堂少室真消息請師直舉揚師云今晚小參進云昔日藥山小參不點燈今日和尚因甚又點燈師云驢馬不同途進云德山小參不答話和尚答話又作麼生師云一個栗篷當面擲進云恁麼則男兒自有冲天志不向古人行處行師云料汝跳不出僧一喝師便棒問雲從龍風從虎聖人作而萬物覩本來無一物且道覩個甚麼師云踏著稱錘硬似鐵進云恁麼則又有也師云也少他不得進云逈古輪王全意氣不彰寶印自然尊師云祗好瞻仰近他不得僧一喝師云向你道近他不得又惡發作麼進云和尚也須照顧師便打僧又喝師亦打乃云大道無外絶塵緣而獨立妙性無形寄森羅而顯相含融法界普應無差湛爾堅凝寂然常照剖開纏內之心珠截斷塵中之見網塞破毒險蘊坑躍翻生死魔窟若能恁麼方可入禪入道創發菩提心栽培靈苗蒂時時發現亘萬古而常新歷歷無私應十方而通暢萬機頓歇即入圓宗廓爾無垠了達實相大衆明日荷蒙聖恩洪開爐鞲陶鑄聖凡人人各為死生大事個個悟無上菩提果然如是皇恩佛恩一時報答且報答一句作麼生道葵蕚丹心向日傾虔誠披露焚香祝晚參一老一不老死蛇頭上驚出草拶破江西馬簸箕傾出驪珠一栲栳真得通身白汗流貼肉汗衫卸却好諸人做工夫到此田地卻是個好消息如人家窮子相似蕩盡田園家産上無片瓦蓋頭下無卓錐之地全無活計逈出膠盆智遠水孤峯性寂寒潭皎月一機普攝萬類齊彰體湛靈明本無來去一句全提逈超物格且如何是獨超底意鳥啼花裏千般語月上峯頭一色明晚參驀豎拂子云三世諸佛也參者個歷代祖師也參者個天下知識也參者個萬善堂內也參者個諸人朝夕參底若喚作心心本無相了即無生性本真空體無涯際絶兩邊泯前後一道清虛冥然通貫若不喚作心騎聲蓋色越古騰今一𫨻光明蓋天蓋地彌滿十虛籠罩萬類有情無情真如平等諸人於此信得及功超遠劫果證菩提若明此事更無餘事更有般漢好似瞎驢趂大隊隨人高低遊山玩水正是業識𢗅𢗅出入叢林虛消信施弗忖己過弗修自德問著佛法口似磉盆人我貢高勢雄海嶽如斯出家濫廁僧倫有何補於法門者哉莫怪山僧太多事見人落井豈傍觀晚參僧問三世諸佛向火熖裏轉大法輪還端的有也無師云有進云畢竟如何師云同生同死進云恁麼則野花香滿徑幽鳥不知春師云不是這時節乃云燈籠沿壁上高臺玉兔走入盤籃去新羅國人喫鐵鞭北鬱單人喪家具諸人會得此意即啞卻山僧口換卻汝眼睛若是超方作家舉著便知落處自合窮則變變則通橫三豎四坐一走七白似雪黑如漆觸著威震雷霆進步無門可入誰知古路坦然平懊恨諸人信不及山僧為汝聊通線不須簸揚塵土覔眼上眉毛本現成白綽花冠黃頭吉非是超羣衲僧個事大難委悉喝一喝晚參云大抵操道者貴乎徹明根本莫向枝葉上攀求體會不假於言詮研趣豈在乎形跡寬廓非外綿密非內蕩蕩乎仰之杳然八極巍巍乎視之充塞四維其象也莫能推其玄其微也莫能測其奧然探江海異於行潦者深廣也登泰山別於丘陵者高大也豈小知小見而能測度妙道者哉蓋道也者人能弘道非道弘人若捨近而趨遠貪小而棄大如剖蚌蛤之腹而求明月之珠入荊棘之林而求鳳雛之𡖉此必難獲也若是愚蒙劣根之人斷佛種性不能續其佛祖慧命蓋自拘於小節而奚成乎大法器者耶殊不知至道無難惟嫌揀擇但莫憎愛洞然明白三祖恁麼道肝膽肺腑盡情披露了也諸人委悉麼此事今生若不會等待當來問彌勒晚參云神鋒原不費磨礱朝暮提持在手中鐵壁銀山俱劈破頂門迸出一輪紅凡參禪者必要猛烈性燥提起話頭一咬便斷方與本分稍有相應不見唐時李駙馬云學道須是鐵漢把手心頭便判直取無上菩提一切是非莫官尚且他為官長終日紅塵擾攘王事鞅掌具此力量逈脫樊籠何况為釋子乎今時修道不了者祗因一翳初起華影駢空瞥念才興森羅滿目則有世界崢嶸乾坤凹凸貪愛之所纏名利之所縛縱有功德法財變成鴆毒所以楞嚴經云妙性圓明離諸色相本來無有世界衆生由心生故種種法生其心若滅種種法滅乃至生滅滅已寂滅為樂至此千差萬別掃歸大圓覺海四大五蘊輥作寶月琉璃無明窟裏突出金毛獅子愛欲河中化作上味醍醐法無難易轉變由人至寶內懷終不他求靈珠在握應須自慶處繁而不亂履險而常安若闡斯宗須明妙旨其或未也機關不是韓光作莫把胸襟作等閒晚參一僧出衆云某甲死了開口不得師云大衆打鼓送亡僧去其僧便喝師云且喜不曾斷命還救得活其僧無語歸衆乃云者僧死了開口不得果然絶後再蘇機用超宗越格好手還他將相才擒下臨濟白拈賊對靈小參八十餘年幻夢中千般活計一場空今朝撒手歸西去生若修因死有功蓋謂魏氏平生持齊念佛積德纍功治家有道教子有方可謂女中丈夫若論大道本來不分男女相亦無生死遷流明明絶滲漏歷歷不囊藏超聲越色離見離聞超生死證菩提出輪回趨樂土此謂出世之道也今日孝子時大紀請山僧對靈指示超慈親欲報劬勞以酬罔極如斯孝道酬恩報德盡矣政當薦一句作麼生道一念頓超煩惱海即心即佛不須疑除夕小參僧問嚴冬萬卉皆凋落為甚梅花獨占春師云因緣時至其理自彰進云爭奈一年將盡夜萬里未歸人師云過在阿誰進云臘隨一夜去春逐五更來師云往往來來有甚了期僧便喝師云三十棒自領去乃云溪河冰結玉玲瓏野衲圍爐燒葉紅拾得毛補舊衲蒙頭打坐禦寒冬這話却似山僧昔年住山家風只有二七衲子同為伴侶黃虀淡飯粗布麻衣钁頭隨身草鞋絆腳日出而作日入而息夏栽紫芋春種葫蘆山中活計受用為常一種平懷泯然自靜也無客送亦無客迎也不送嵗亦不迎春所謂山中無曆日寒盡不知年山僧雖不能過於古人亦自守其本分也今日叨蒙陛下洪恩開選佛場使其一切衲子安心向道頓悟無生况住此琉璃殿宇坐受如意供膳汝等諸人須要知恩報恩知德報德雖然如是道眼若明金易化三心不了水難消大衆今日三十夜到來人人有一件大事還委悉麼有一頭水牯牛過窗櫺頭角四蹄都過了惟有尾巴過不得且道過在甚麼處良久云參立春小參舉新豐和尚云井底熢塵生高山起白浪石女生得兒毛長數丈若欲學菩提應須看榜樣師云萬善不似新豐虛空裏藏影白日下點燈直令他學菩提者如推門落臼井底熢塵生高山起白浪石女豈生兒毛不能長若欲學菩提何須看此樣何謂也祗要一念證真功超纍劫三心若了道越僧祗如寒谷逢春陽回萬象直使日暖花開普現色身三昧鳥啼松韻共轉根本法輪銀河開凍錦鱗𨁝跳上天土塊翻身蚯蚓驀過東海所以頭頭惟心妙用法法當體全真囊括百億日月藏於眉縫之中提掇四海乾坤置於掌握之內斯乃法爾如是道性超然理合真空而遍周體應萬機而無間靈源湛寂根境圓通歌館樓臺盡是真如寶所花街酒肆悉皆菩提道場不捨一法即如來是則名為觀自在正當春元之始令行之初畢竟如何卓拄杖云擊碎泥牛天地轉芒人耕種劫空田結制小參僧問還丹一粒點鐵成金至理一言轉凡成聖轉凡成聖即不問如何是我手何似佛手師云一任汝顛倒進云百年三萬六千朝返覆元來是者漢如何是我腳何似驢腳師云踏斷趙州略彴進云參商雖兩地明月共一家如何是人人有個生緣處師云山僧是福建白水杜拗蠻進云恁麼則古皇未兆前威音那畔事師云如何是威音那畔事僧一喝師打云未夢見在乃云滹沱正脉已秋殘太白枝能耐歲寒幸遇吾皇功德主芳規復振於名藍今日十方聚會四海同參個個擎頭戴角口吞佛祖人人倒嶽傾湫眼蓋乾坤目機銖兩舉一明三猛烈英靈踢脫窠臼不涉見聞露出佛手且如何是佛手以拄杖一卓云五九四十九晚參云頂𩕳具眼辨生死之去來腰佩靈鋒任殺活之縱橫直令天魔膽喪頓使外道歸降咸入總持法門共證圓通覺海所謂凡夫具聖人法即是聖人心若悟者事同一家若迷者萬別千差雖然如是諸人要會向上事但從萬別千差裡薦取葛藤窩裡薦取是非堆裡薦取無明窟裡薦取煩惱熖裡薦取屎窖坑裡薦取於此薦得永劫不忘晚參云句剗意羊頭車子不停住意剗句生鐵稱錘活活鋸意句交馳須著力全機頓赴絶廉纖所謂向上一事千聖不傳要人親到家鄉識得閨閣中物於此不疑千聖舌頭亦不瞞頇自己不見高亭參德山隔江招手亭便領悟即返高亭住持更不別參又大梅參馬祖問如何是佛祖云即心即佛梅當下領旨便隱大梅山二十年後出世諸兄弟若要承當大事皆因夙生有大根基故為法門英傑回天奪化之機跨竈衝樓之勇有比超卓方可作宗門中種草若是懦夫寒灰之志焉敢入大爐鞲如鉛汞落爐相似見火便流有何用哉今愍忠門下稍有幾個英靈漢子若能保任三十年後也會呵佛罵祖去也何謂不見道吾不敢欺於汝等汝等皆當作佛晚參云大悟無道大富無糧大地無草大海無魚有人透得四轉語無禪可參無道可學一任聲色裡坐聲色裡臥有時孤逈逈也得有時俊悄悄也得有時逢場作戲也得有時歌館春臺也得如其未也不可狐尾續貂裘楚雞彩鳳正謂參學人具眼目看破生死本是空何須更問孫臏卜晚參僧問愍忠升堂即不問古鏡未磨是如何師云光吞萬象進云磨後是如何師云逈脫諸塵進云磨已未磨是如何師云黑漆漆地進云一念不生全體現六根才動被雲遮師云你又被他轉却乃云佛祖心印拶破百匝千重仰山鐵鍬剷斷殊途異轍不踐娘生舊時路豈落凡聖去來機孤光烜赫縱橫卷舒上無攀仰下絶己躬直饒祕魔杈下死枉用心機子湖狗取人心肝虛張大口德山棒如雨點大似掉棒打月臨濟喝似雷轟亦如峯頭過浪到者裡天魔拱手外道罔知若是頂門別具哪吒眼必有吞佛噉祖氣槩旋天轉地機關猛虎頷下解鈴蒼鷹爪下奪食如是超作稍有衲僧氣分若蒞法戰之場驚怕危亡者只好倒卸鎗甲縮頸傍觀有分如此之流真可憐憫何謂不信自心元是佛縱然千聖莫能醫因雪小參六花現瑞騰空閗戰五花魁一色虛明點徑玲瓏諸色淨獵人捕獸無路牧童歸道失村銀樹幾株山中樵子富貴玉蓑一領溪邊漁叟風流烏盆變作白盆紺殿化為碧殿瑪瑙階前鋪白氊珊瑚枝上堆玉屑物物全彰淨法身頭頭盡是普賢境正當恁麼時且黑白未分一點落在甚麼處妙性縱橫沙界外大悲千眼莫能窺小參屈指光陰早已過靈臺一點未揩磨到頭不識歸家路換却人身爭奈何薦取莫蹉跎東廊打倒西廊壁𭣣拾眉毛劫轉多凡學道者學出世之道須惜光陰如寸金明此大事猶喪考妣所以大修行人無有剪爪之功豈肯棄本逐末耶或登山則思藥山觀夜月笑聲百里共相聞或渡水則思洞山覩影悟道會得渠我是一家或觀月則思馬祖示諸人唯有南泉超物外或看雲則思忠國師示唐肅宗釘釘著懸挂著或修行則思香嚴擊竹聲無端打失一隻眼或倚松則思古人樹下居單瓢破衲度寒暑或坐石則思仰山閒打坐溈山勘驗有轉身蓋行腳者一動一靜一機一境鳥啼花落風動水流皆是入道之門發露之機若乃見道者則忘其緣境未見道者則被緣境所障若能根境俱忘光吞萬象逈絶諸塵根境如如是名了道晚參云臘月二十二空王殿露柱拈來仔細看衲僧閒家具所謂千年田八百主且道此人修何行業居何國土上無片瓦蓋頭下無卓錐之地天堂留不住地獄詎能拘不織而衣不耕而食喫官酒臥官街當處死當處埋還用修證也無不見善財童子參無厭足王正參見時其王將此罪人百般加害苦楚或劓其鼻者或挑其眼者或割其耳者或截其手者或斷其足者乃至炮烙燒身洋銅灌口將此罪人治畢方見善財相執手云我已得無礙三昧陀羅尼門是則雖是不到心空及第處舉心𡚶念業隨身除夕小參僧問心如皎月連天淨性似寒潭徹底清一句逈超千聖外何須見性與明心如何是明心師云鏡雖打破光體猶存進云如何是見性師云明明歷歷黑黑漆漆進云心性相去幾何師云昨日夜叉心今朝菩薩靣進云心性已蒙師指示年窮歲畢是如何師云處處神前燒夜紙聲聲爆竹送殘年進云恁麼則城上已吹新歲角窗前猶點舊年燈師云不須更說偈言乃云一年三百六十日普天之下已除夕我為禪寂老光陰人為名利驚寵辱逗到今宵總是空不想無常生死逼若向生死劃骷髏一生參學事已畢諸兄弟今日除夕節届無可與諸人分歲昔日賢和尚烹一頭露地白牛與禪和共享後來經官動府皮角納官結案現在愍忠即不然幸有俞旨誡殺耕牛山僧固不敢私烹勉強支吾常住自有窮計較管教諸公今夜樂欣欣何謂渴飲曹溪水饑吞栗棘蓬夜來燒默炭炙得暖烘烘大家團圞頭唱個杜拗山歌和氣藹然便乃超出古人一頭地伏惟大衆歸堂喫茶立夏小參至道無難惟嫌揀擇但莫憎愛洞然明白三祖恁麼道早是揀擇了也者拄杖子只接上上機不接中下之機雪峰恁麼道亦是揀擇了也十方世界中惟有一乘法無二亦無三釋迦老子恁麼道也是揀擇了也爭如海會門下饑則進食寒則添衣無禪可參無佛法可學便是一員無事道人此際薰風南來戶牗打開時觀前文果花散步郊外望麥秀火雲驟集奇峰野鳥時喧古樹芙蕖將放出水玉梅已熟垂金可以適意暢心懷倦時晝寢南窗下海會恁麼行履還是有揀擇耶無揀擇耶不見道但有一絲頭便是一絲頭告香小參云火熖那容蚊蚋泊劍鋒寧許赤挨身衆中若有擎天手奪鼓旗正令新智不到處三世諸佛難下口名質未興千眼大悲莫能辨祗因一念忽生花開世界便有生死之流凡聖之立因果差殊明暗相奪昧卻本來真常故受種種顛倒名利之所牽愛網之所縛皆因曠劫已來習蘊八識田中必須操智慧劍披忍辱鎧斷生死根破無明殼誠能有此力量稍有參學氣分諸兄弟明日結制安禪早晨大衆告香躬對佛前洗心發願務要超生死關悟佛知見如斯决志自有出頭時節若是借衣求食者枉勞辛苦許多般有何利益者哉伏惟大衆裁聽重陽小參師云善迹迹者莫能迹善言言者莫能言去此二途別有生機者麼僧問如何是跳出金毛獅子師云嚇殺天下人僧一喝師便打乃云今朝九月九不喫趙州茶痛飲茱萸酒八十公公穿繡鞋老來不覺自家醜不風流處且風流今日登高各出手或有會吟詩者出來吟一首應個時節猶其未能且聽延壽舉似新婦騎驢阿家牽婆婆空手執鐵鞭三人遊到婆伽國回來依舊在堂前聖僧問云汝適才到甚麼處來答云朝遊婆伽國暮遊七金山聖僧云且道他方境界與此方是同是別答云處處黃花開遍地也有白衣送酒來寓秦郵放生庵王春元請對靈小參師云善戰者便請單刀直入若是擬議頂門著箭衆中有善戰者麼一僧便喝師云頂門早已著箭了也進云天上天下亡者獨尊師云也好與他三十棒僧禮拜云謝和尚賞罰分明師云痛棒也有人喫乃云六十餘年幻夢中惟持仁義素門風生前若肯修功業福本良田在己躬臨行撒手歸何處自在逍遙極樂宮所謂如是因如是緣如是報如是果故此去來無𦊱礙動靜以常安逈今古絶羅籠一任生死去來明知生不被生之所遷死不被死之所流脫或未能山僧權設個四教門示真實相直令王開翁頓入如來常光妙喜世界一喝云此是漸教令他已信十善回因向果又一喝云此是通教令他頓超生死速證涅槃又一喝云此是頓教令他了悟本性逈越三祇又一喝云此是圓教令他圓滿菩提歸無所得既無所得無修無證無生無滅有語是謗無語是默踏著本地好風光直下頓超生死宅然而今日孝子王懋德恭請山僧對靈開導尊翁且道還有指示也無越格倒拈苕柄傾腸倒腹為阿誰師過洪州華藏院請小參遡來祖席在江西常憶寶峯馬簸箕偶爾到來請升座正值閩公慶誕時驀拈拄杖云棒頭指出金剛眼掇轉須彌作壽山遂卓云諸人看看木老人騎山門出佛殿和泥合水去也穿卻龐公鼻孔一口吸盡西江故解道男也不婚女也不嫁大家團圞頭共說無生話諸人要見龐公靣目麼山僧為汝指出日靣佛月靣佛也無頭亦無足頭頭合道契無生從來壽量又多福且道福壽有多少喝一喝小參以拂子打相云三世諸佛出不得者綣繢歷代祖師出不得者綣繢天下知識出不得者綣繢四海衲僧出不得者綣繢以拂子劃破圓相云三世佛不在裡許歷代祖不在裡許天下知識不在裡許四海衲僧不在裡許畢竟在甚麼處安身諸人若薦得全身在裡許全身不在裡許須知豎窮三際橫遍十方出沒卷舒無朕無跡逈脫根境遍界難藏既是難藏諸人還知山僧踐履處麼莫道諸人不知縱使千眼大悲亦覷山僧跟腳不破便歸方丈小參參禪辦道具有宿根僧相難得佛法難聞故釋迦云止止不須說我法妙難思諸增上慢者聞必不敬信雖然婆心甚切苦口呵責瞿曇老人你也怪伊不信不得何謂也若要會個中事大似蟭螟吞白額蚊蚋叮鐵牛無處下口若要捨之推之不去崚嶒萬仞若欲覔之視之無形渺無邊際若要用之胸藏日月身佩須彌爍迦羅眼看不破八臂哪吒提不起殊不知覷不破處光吞萬象充塞太虛提不起處機用超羣殺活自在山僧盡力提掇盡情吐露若是英靈禪流一聞便領眼裡無筋漢正好拽來推水磨音釋聵歸謂切音貴目無精也躔呈延切音廛踐也蠻謨還切音獌南夷也蘊委粉切音縕積也
