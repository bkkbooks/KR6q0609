body:
  text: 嗣法門人海鯨編拈古雲門因僧問如何是超佛越祖之談門云糊餅後妙喜云雲門直是好一枚糊餅要且無超佛越祖之談底道理拈云妙喜只知其一不知其二殊不知雲門一枚糊餅具臨濟玄要賓主洞山君臣偏正乃至百千法門無量妙義總不出者枚糊餅諸人還委悉麼苟或未然且向糊餅裏咬嚼文殊普賢夜半起佛見法見被世尊貶向鐵圍山拈云世尊為三界之師爭奈無大人器量若是錦山一任他起六十二見終不動著他一毫何謂無明實性即佛性幻化空身即法身趙州與文遠侍者論義鬪劣不鬪勝勝者輸糊餅遠云請和尚立義州云我是一頭驢遠云某甲是驢胃州云我是驢糞遠云我是糞中蟲州云汝在彼中作甚麼遠云我在彼中過夏州云把將糊餅來拈云趙州與文遠大似村童鬪百草有甚奇特趙州雖然贏得個糊餅也是乞兒貪小利巖頭初參德山入門便問是凡是聖山便喝頭禮拜後洞山聞云若不是奯公大難承當頭聞云洞山老漢不識好惡錯下名言我當時一手擡一手搦拈云德山殺人不眨眼氣宇大于王巖頭是煆過精金應無變色洞山惡語傷人痛如刀割三老任是作家未免遭人貶駁若到法喜門下總束作一坑埋却何故殺人可恕無理難容覆盆庵主因僧從山下哭上主閉却庵門僧於門上畫一圓相了只於門外立主從庵後出却於山下哭上僧喝云猶作者個去就主便捶胸云可惜先師一場埋沒僧云苦苦主云庵主今日被人瞞也拈云者僧却有孟德之才且無孔明之見覆盆頗有韓信之計惜無蒯通之明我當時見者僧從山下哭上但問云上座喪父母耶見伊眼目定動連棒趂下山亦免臨濟一宗寂寥在楊岐因慈明和尚忌日至真前以兩手捏拳向頭上作角勢次以坐具畫一畫復打一圓相方乃燒香次作女人拜首座云休捏怪岐云首座作麼生座云和尚捏怪岐云兔子喫牛奶拈云楊岐親覲慈明三十載竊些殘羹餿飯忌日伎倆俱露將此供養報德酬恩美則美矣爭奈首座忍俊不禁雖然直不藏曲也是其父攘羊而子證之五祖演一日升座顧衆云八十翁翁輥繡毬便下座宗泰欣然出衆云和尚試輥看演打杖鼓勢操蜀音唱綿州歌云豆子山打瓦鼓揚平山撒白雨白雨下取龍女織得絹二丈五一半屬羅江一半屬玄武泰聞大悟便掩祖口云只消唱到者裏演大笑拈云可笑演祖不改舊鄉談操蜀音打蜀鼓知他是佛意是祖意宗泰無端好聽曲調不覺渾身墮在聲色裏了當平生直至而今轉身不得諸人還肯錦山恁麼道麼喝一喝金州操因請米和尚齋不排坐位米才到乃展坐具作禮操下禪床米遂就操位而坐操却席地而坐齋罷米便去侍者云和尚受一切人欽仰今日坐位却被人奪却操云三日後若來即受救在米果三日後來云前日遭賊拈云金州用蕭曹之計張陷虎之機米和尚貪他羊羔不覺渾身墮穽法喜若作米和尚見不排坐位但云和尚用心不臧見伊擬議便把操位掇退非惟自有出身路抑且塞斷金州口鼓山晏示衆云鼓山門下不得咳嗽時有僧咳嗽一聲鼓云作什麼僧云傷風晏云傷風即得拈云大小鼓山把斷要津不通凡聖則不無爭奈輕輕被人拶著却又龍頭蛇尾而今莫有為鼓山作主底麼芙蓉楷因僧問胡家曲調不墮五音韻出青霄請師吹唱楷云木雞啼子夜鐵鳳呌天明僧云恁麼則一句曲含千古韻滿堂雲水盡知音楷云無舌兒童能繼和僧云作家宗師人天眼目楷云禁取兩片皮拈云大凡提唱宗乘要明旨趣還他芙蓉作家可謂答這僧話當頭不犯善避來鋒足稱賞矣若論具衲僧牙爪猛虎口裏奪食毒龍頷下解鈴手假猶欠一籌在棗樹因僧辭乃問云若到諸方有人問老僧此間法道作麼生對僧云待他問即道樹云何處有無口底佛僧云祇這也還難樹豎起拂子云還見麼僧云何處有無眼底佛樹云祇這也還難僧繞禪床一匝而出樹云善能祇對僧便喝樹云老僧不識子僧云要識作麼樹敲床三下拈云棗樹平白地上拈起一𮈔頭直使須彌搖動海水沸騰者僧慣經洶浪善識風帆撥轉船頭別行一路錦山不肯坐觀成敗拔劍相助攪動滄溟與彼魚龍知有性命大衆且道是助主家助賓家具擇法眼者試辨看南泉坐次一僧問訊叉手而立泉云太俗生僧合掌泉云太僧生僧無語拈云叉手合掌左邊半斤右邊八兩縱饒直下翻身也是野狐伎倆麻谷問臨濟大悲千眼阿那個是正眼濟云大悲千手眼阿那個是正眼速道速道谷拽濟下禪床谷却坐濟云不審谷便喝濟拽谷下禪床濟便坐谷出去濟歸方丈拈云擊節扣關衝樓跨竈一挨一拶機奪超羣還他二老好手若論大悲正眼驢年未夢見在祇林和尚每叱文殊普賢皆為精魅常持木劍自謂降魔才見僧來參便云魔來也以劍揮歸方丈如是十二年後置劍無言僧問十二年前為甚降魔林云賊不打貧兒家僧云十二年後因甚不降魔林云賊不打貧兒家拈云銅頭鐵額望風遠避鶻眼龍睛無處摸索叱佛祖如奴婢降魔魅遠遁潛還他祇林敏手格調甚高雖十二年用劍刃上事要求知己並無半個徒勞用盡腕頭力賣金不遇買金人德山因僧來相看便近前作撲勢山云你恁麼無禮合喫山僧手中棒僧拂袖便行山云饒汝與麼也祇得一半僧轉身便喝山打云須是我打你始得僧云諸方有明眼人在山云汝天然有眼僧以手劈開胸云貓山云黃河三千年一度清拈云獅子擊象金翅搏龍行腳若無超方眼入門不識賓主句安敢到他爐鞲之所殊不知者僧是煆過底精金美璞不受人鉗鎚雖然德山親入虎穴爭奈不得虎子幽溪因僧問大用現前不存軌則時如何溪繞禪床一匝而坐僧欲進語溪遂與一踏僧歸位立溪云汝與麼我不與麼汝不與麼我却與麼僧擬再進語溪又與一踏云三十年後吾道大行拈云者僧參禪鹵莽學識顢頇雖然設個問端不妨孤峻只解恁麼來不會恁麼去若是個漢不消一踏瓦解冰消管教幽溪口啞去在南泉因趙州問明頭合暗頭合泉便歸方丈州云老漢被我一問直得無言可對首座云莫道和尚無言好州便一掌云合是堂頭老漢喫拈云趙州一問平地上氀氀南泉歸方丈死水不藏龍首座雖路見不平爭奈失錢遭罪或有人問安國明頭合暗頭合但云當堂不正坐那赴兩頭機且道與南泉歸方丈是同是別夾山因僧問如何是相似句山云荷葉團團團似鏡菱角尖尖尖似錐僧云學人不會山云風吹柳絮毛毬走雨打梨花夾蝶飛拈云夾山答者僧話不妨攢花簇錦巧妙尖新要且不曾答出相似句聰上座忍俊不禁也要露些面目與諸方檢責如何是相似句奇怪石頭形似虎火燒松樹勢如龍學人不會海壇馬子如驢大丹山彩鳳似楚雞百丈問黃檗甚處來檗云大雄山下採菌來丈云還見大蟲麼檗便作虎聲丈拈斧作砍勢檗遂與一掌丈吟吟而笑便歸升堂謂衆云大雄山下有一大蟲汝等諸人也須要看百丈今日親遭一口拈云作家相見機如掣電眼似流星驗人有險崖之句全提有拔山之威黃檗若無百丈爭見汗馬功高百丈若無黃檗那知歷代功臣雖然父子相知水乳相合檢點將來未免傷鋒犯手夾山示衆云我二十年住山未嘗舉著宗門中事有僧問承和尚有言二十年住山未嘗舉著宗門中事否山云是僧便掀倒禪床山休去明日普請掘一坑令侍者請昨日問話僧來山云老僧二十年只説無義語今請上座打殺老僧埋向坑中便請上座若不打殺老僧上座自打殺埋此坑中始得僧束裝行李潛去拈云善迹者謂迹之所莫能迹善言者謂言之所莫能言若據山僧檢點將來夾山大似靈龜曳尾自取喪身之兆者僧親入虎穴敲牙弄爪賞他大膽有般不識好惡漢謂渠不會轉身句怕夾山打殺便束裝潛去誰不知頭正尾正可謂高山放紙鷂遠望落前村烏臼因玄紹二上座參臼問二禪伯發足甚麼處玄云江西臼拈棒便打玄云久知和尚有此機要臼云你既不會後面個僧祇對看紹近前臼便打情知你同坑無異土拈云者僧擎頭戴角破浪衝關倒嶽傾湫危亡不顧却有些衲僧氣槩烏臼雖行閫外威權檢點將來性命却落在者僧手裏具擇法眼者試辨看趙州因訪茱萸到法堂上從東過西從西過東萸云作甚麼州云探水萸云我者裏一滴也無探個甚麼州以拄杖靠壁便出法堂拈云者二老漢同門出入宿世冤家一人把住封疆不通消息一人直上峯頂暗透重關四面懸崖轉身有路雖然如是祇如趙州拄杖靠壁便去意作麼生賊是小人智過君子臨濟侍德山次山云今日困濟云者老漢寐語作麼山便打濟掀倒禪床拈云德山有吞吐天地之氣打破虛空底鉗鎚臨濟有包藏宇宙之機揭翻海嶽底威力二俱作家有縱有奪不是沙場經戰久揭天犪鼓喪紅塵古寺和尚因丹霞參經宿明早粥熟行者祇盛一鉢與和尚又盛一鉢自己喫殊不顧丹霞霞亦自盛粥喫者云五更侵早起更有夜行人霞謂古寺何不訓誨行者得與麼無理寺云淨地上不要點污人家男女霞云幾不合問過老漢拈云古寺門深似海峻若丘山非是作家難入閫奧所以欲觀其人先觀所使更有超師之作丹霞智劍過人機鋒敏捷到者裏却被行者鈍置一上當時若是聰上座也不消呌古寺教誨行者但云某甲今日失却一隻眼直教古寺行者疑著三十年石頭問長髭甚處來長云嶺南來頭云大庾嶺頭一鋪功德成就也未長云成就久矣猶欠點眼在頭云莫要點眼麼長云便請頭垂下一足長禮拜頭云子見甚麼道理便禮拜長云如紅爐一點雪拈云長髭好不丈夫人人鼻孔遼天個個舌頭拖地可惜一鋪功德被人點污了也當時若是出格道流待他垂下一足便掀倒禪床不為分外若是如何若何未免落他圈繢南關道吾或執木劍橫在肩頭作舞僧問手中劍甚處得來吾遂擲於地僧却置吾手中吾云甚處得來僧無對吾云容汝三日下一轉語僧亦無對吾拈劍肩上作舞云恁麼始得後雲峯恱拈云邪法難扶拈云大衆將今視古宗師橫拈倒弄或擎叉或弄蛇或輥毬或放狗各具一種神通三昧收放自繇因甚道吾手提木劍作舞雲峯喚作邪法難扶還是肯他語不肯他語巴陵鑑因雲門舉雪峯云閉却門達磨來也意作麼生鑑云築著和尚鼻孔門云阿修羅王惡發把須彌山一摑𨁝跳上天報帝釋為甚麼却向日本國裏藏身鑑云莫恁麼心行好門云汝道築著又作麼生拈云雲門慣用白拈手假或時藏身處沒蹤迹或時沒蹤迹處已藏身自合知機識變殊不知却被巴陵覷破賊身已露大衆且道巴陵具甚麼眼是賊識賊明招有疾國泰深來問候侍者通報云深師叔來招令請深才入方丈招便呵㖿呵㖿深師叔救取老僧深云和尚有甚麼病招舉頭一覷云咦眼子烏𠷈𠷈地依前是舊時深上座乃轉身面壁拈云諸方盡謂明招是獨眼龍權衡佛祖龜鑑宗乘尚且一疾不能自作主張却被國泰一拶慚惶面壁迄今轉身不得且道面壁意作麼生酒逢知己千杯少話不投機半句多雪峯在洞山作飯頭淘米次山問淘沙去米淘米去沙峯云沙米一齊去山云大衆喫個什麼峯遂將盆覆却山云據子因緣合在德山拈云洞山垂𮈔千尺意在深潭雪峯不貪香餌味可謂碧潭龍當時若會石女停機夜色向午木人轉路月影移央於此君臣道合父子投機必為他家種草誰知龍駒不困鹽車下鵬鳥扶搖鼓域中金牛和尚因臨濟來乃橫按拄杖方丈前坐濟遂拊掌三下歸堂牛却下人事了便問賓主相見各有軌儀上座何得無理濟云道甚麼牛擬開口濟便打一坐具牛作倒勢濟又打一坐具牛云今日不著便遂歸方丈拈云大衆看者兩員戰將射雕絶技脫兔奇謀羽檄交馳縱奪可羡一人有生殺之權一人善布陳之法雖然陳勢已圓未免得失機括未山尼因灌溪參問如何是末山尼云不露頂溪云如何是末山主尼云非男女相溪喝云何不變去尼云不是神不是鬼變個甚麼拈云直下便喝震動須彌煙菟戴角何不變去是法住法位世間相常住簡約而精明神通而莫測落霞孤鶩齊飛秋水長天一色性空和尚因僧來參空乃展手示之僧近前復退後空云父母俱亡略不慚顏僧呵呵大笑空云少間與闍黎舉哀其僧乃打筋斗而出空云蒼天蒼天拈云者漢平地上布偃月龍蛇陳要擒豪傑英才誰不知者僧解劍刃上轉身弓弦上走馬不能收入彀中其知善戰者矣大衆這則公案少有人拈提安國今日特為諸人揭露去也擲下拂子云超羣須是英靈漢敵勝還須獅子兒夾山問月輪子甚處人月云閩中人山云還識老僧麼月云和尚還識某甲麼山云不然子且還老僧草鞋錢老僧然後還江陵米價月云與麼不識和尚未審江陵米作麼生價山云善能哮吼拈云夾山善能琢玉鏤金攢花鋪錦月輪步步登高著著有路機峻敏捷互奪互存謂是作家若到海會門下棒打折也未放過伊何故為人須為徹殺人要見血南泉示衆云今時人須向異類中行始得趙州便問異即不問如何是類泉以手托地州遂與一踏踏倒却向涅槃堂云悔悔泉令侍者問悔個甚麼州云悔不更與兩踏拈云南泉慣唱無腔曲趙州善打氊拍板雖然曲調甚高未免一場巇嶮廣福即不然或有人問如何是類但以兩手捏拳作角勢放在額上且與南泉以手托地是同是別靈雲問僧甚處去僧云雪峯去靈云我有一書寄雪峯僧云便請靈脫履拋向前僧便去雪峯問甚處來僧云靈雲峯云和尚安否僧云有信相寄道了脫履拋向面前峯休去拈云靈雲寄書相識滿天下知心能幾人誰不知雪峯祇有受璧之心且無割城之意當時若是安國見僧脫出履拋向面前劈脊便棒何謂重賞之下必有勇夫仰山一日因溈山和尚以手相交過各撥三下却豎一指仰亦以兩手相交過各撥三下却向胸前豎一指覆一手以目視瞻溈山休去拈云圓機體用密旨無差暗去明投明來暗合雖則父子經文緯武射策全施檢點將來大似靴裏動指黃檗一日普請鋤茶園檗後至臨濟問訊按钁而立檗曰莫是困耶濟云才钁地何言困檗舉拄杖便打濟按杖推倒黃檗檗呼維那拽起我來那扶起曰和尚爭容得這風顛漢無禮檗却打維那濟自钁此云諸方火葬我這裏活埋拈云黃檗大似阿修羅王身披鎧甲氣湧波騰背負須彌手擎日月橫行四天下誰敢當頭視伊善則善矣祗如黃檗被臨濟推倒因甚却打維那不見道做客莫在後事官莫向前南泉山下有一庵主人謂南泉和尚近日出世你何不去參見主曰非但南泉出世直饒千佛出世我亦不去泉聞乃令趙州去勘州去便設拜主不顧州從西過東從東過西主亦不顧州云草賊大敗遂拽下簾子便歸舉似南泉泉云我從來疑著者漢次日泉與沙彌擕茶一瓶盞三隻到庵擲向地上曰昨日底昨日底主云昨日底是甚麼泉於沙彌背上拍一下曰賺我來賺我來拂袖便行拈云者捏死蛇頭漢只可無佛處稱尊不能向異類中行當時若具衲僧手眼奔流度刃之機見趙州設拜便震威一喝待他眼目定動直推出庵門豈不俊哉所謂當斷不斷返招其亂趙州到黃檗檗見來便閉方丈門州乃把火於法堂內呌曰救火救火檗開門捉住曰道道州曰賊過後張弓拈云兩個漆桶擦癢一擦便骨出慈明和尚或時方丈內安一盆水劄一口劍下面著一緉草鞋膝上橫按拄杖入門便指擬議便打拈云作家宗匠慣用格外之機不落時人窠臼可謂超宗異目海會當時若見一腳躍翻待伊打便接杖云盲枷瞎棒打某甲不得管教懡㦬歸方丈趙州到臨濟後架洗腳濟便問如何是祖師西來意州云恰遇山僧洗腳濟近前作聽勢州云會即便會啖啄作麼濟便歸方丈州云三十年行腳今日錯為人下注腳拈云臨濟具通天手眼有驗龍蛇之機趙州獨蹈大方有跨海之勇二俱作家一縱一奪不犯鋒鋩各有出身之路如何是出身之路坐斷十方猶點額密移一步看飛龍馬祖因龐居士問不昧本來人請師高著眼祖直下覷士云一種沒絃琴唯師彈得妙祖直上覷士禮拜祖歸方丈士隨後云弄巧成拙拈云龐公機鋒峻捷海口舌鎗馬師眼似流星曲垂提獎酬唱宗乘還他二老若會不昧本來人總是一隊黑漆桶王延彬太尉因到昭慶煎茶次朗上座與明昭禪師把銚忽翻却茶銚尉見問朗茶爐下是什麼朗云捧爐神尉云既是捧爐神因甚麼翻却茶銚朗云事官千日失在一時尉拂袖便行昭云朗上座吃却昭慶飯了却向外邊打野榸朗云上座作麼生昭云非人得其便拈云太尉拈出倚天長劍逼人毛骨悚然朗上座有舌戰羣儒之才善退圍兵之法明昭更用旗奪鼓英雄奔流度刃機略雖然各有出身之計未免總被太尉看破羅山間在大庾嶺住庵時有僧辭去疏山間云我有一信附與疏山得麼僧近前云便請間以手挃頭上却展手云還奈何麼僧無對後到疏山堂內舉一僧云諸人還會麼衆無對僧云天下人不奈大庾嶺何拈云烽火連三月家書抵萬金羅山欲附鴻音疏山大似寄人不的當被渠到處揭露與明眼人識破以致家醜外揚丹霞因過一院值凝寒於殿中見木佛乃取燒火向院主遇見呵責云何得燒我木佛霞以拄杖撥灰云吾燒取舍利主云木佛何有舍利霞云既無舍利更請兩尊燒院主自後眉毛墮落拈云丹霞燒木佛也是小兒伎倆院主眉毛墮落因禍得福雖然如是祇如丹霞拄杖撥灰覓舍利還有也無不見道有智人前不得説夢灌溪初參臨濟濟扭住溪云領也濟托開云且放你一頓溪後示衆云我見臨濟和尚無言語直至如今飽不飢拈云臨濟大似金翅鳥王直取龍吞檢點將來也是虎頭蛇尾當時見灌溪云領也再徵之汝領個什麼待他擬議連棒趂出直使知恩有地趙州在南泉時井樓上車水見南泉過乃抱定柱懸一足云相救相救泉遂以梯上打云一二三四五州便具威儀上方丈適來謝和尚相救拈云趙州家富飯飽弄箸南泉救人就窠打劫雖父子敲唱俱隨未免傍觀者醜音釋蒯苦夬切音快姓漢有蒯通鹵郎古切音魯鹵莽輕脫苟且也顢謨官切音瞞顢頇大面也渠追切音逵牛名髭津私切咨口上毛曰髭煙音烏楚人謂虎為煙菟𭗲虛宜切音希山相對而危險也
