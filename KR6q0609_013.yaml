body:
  text: 嗣法門人戒弘編頌古世尊初生下乃以一手指天一手指地周行七步目顧四方云天上天下惟吾獨尊混沌乾坤總一靈全身裏許未彰形生時子母同啐啄突出禍胎便唬人世尊一日升座大衆集定文殊白椎云諦觀法王法法王法如是世尊便下座囓鏃之機猶是鈍那堪升座法如斯座中若有江南客休向樽前唱鷓鴣世尊靈山會上有一女子於佛前入定佛敕文殊出之文殊繞女子三匝鳴指一下乃托至梵天盡其神力而不能出世尊曰假使百千文殊亦出此女子定不得下界有罔明菩薩能出此定須臾從地湧出佛敕令出罔明却至女子前鳴指一下女子從定而出大定廓無門了無相動靜平等如虛空因邪却打正瞿曇女子壁立萬仞處漏泄陽春文殊罔明大洋海底頭出頭沒咄咄揭開正眼觀將來總是一場乾打哄罽賔國王秉劍至獅子尊者前問曰師得蘊空否祖曰已得蘊空王曰離生死否祖曰已離生死王曰既離生死可施我頭祖曰身非我有何吝於頭王即揮劍斷尊者頭白乳湧高數丈王之右臂旋亦墮地七日而終不即不離何蘊空罽賔猶問起驚風乞頭施我便揮刃血染秋霜樹葉紅頭已落臂旋墮牽牛下水先濕腳一身還了一身休萬里雲天飛一鶚達磨初見梁武帝帝問曰如何是聖諦第一義磨云廓然無聖帝曰對朕者誰磨云不識帝不契廓然無聖空谷聲應動容不墮悄然機狂人尋頭因照鏡忠言截舌逆耳不聽從此驀渡江面壁提祖印分皮分髓大誵訛展轉事從叮囑起咄洞山和尚因僧問如何是衲僧孔竅山云十八女兒不繫裙衲僧孔竅難摸索任汝喚他破木杓十八女兒不繫裙頭戴花冠赤雙腳雲門因僧問如何是一代時教門云對一説對一説子規樹上多饒舌懊恨空山啼不休却把春風輕漏泄花溶溶雲曳曳添得普賢眼中屑雲門因僧問如何是目前機門云倒一説倒一説貴買硃砂畫明月非是目前機亦非玄妙訣黑似漆白如雪爍迦羅眼莫能別高沙彌住庵後一日歸來省藥山值雨山曰你來也高曰是山云可煞濕高云不打者個鼓笛雲巖云皮也無打什麼鼓道吾云鼓也無打什麼皮藥山云今日大好一場曲調三個孩兒打花鼓一邊唱了一邊舞胡笳曲調雖分明識者聽來不合譜巖頭因沙汰鄂州作渡子兩岸各挂一板有人過渡打板一下頭乃舞棹迎之一日因婆子抱一孩兒來問呈橈舞棹即不問且道婆子手中兒甚處得來頭便打婆云婆生七子六個不遇知音祇者個也不消得便拋向水中野艇泛滄浪雲寒樹色蒼澄淵施桂棹問者絶商量靈機發樞也獰龍活捉啐啄同時也真風度籥婆子脫體賣風流龍蛇陳上看謀略楞嚴經云見見之時見非是見見猶離見見不能及王公春戲躍青驄手握金鞭望海東村酒野花偏媚客歸來無限意無窮臺山路上有一婆子僧問臺山路向甚處去婆云驀直去僧才行婆云好個阿師便恁麼去後有僧舉似趙州州云待我為你勘破遂往問臺山路向甚處去婆云驀直去州才行婆云好個阿師便恁麼去州歸舉似大衆我為你勘破婆子了也古佛當時只趙州惱亂叢林卒未休眼光爍破四天下機關逈別孰同儔樹高枝大招風雨虎踞當途惹戈矛勘破老婆無伎倆如今四海水平流南泉因東西兩堂爭貓兒泉乃提起云大衆道得即救取道不得即斬却也衆無對泉遂斬之晚趙州外歸泉舉似州州乃脫草鞋安頭上而去泉云子若在即救得貓兒善施社稷之權能用定亂之劍萬人叢裏驗龍蛇大用之機如掣電斬却貓兒血流沙草鞋頭帶隔天涯當時有具同時眼一箭紅心定不差報慈嶼讚龍牙真云日出連山月圓當戶不是無身不欲全露牙一日在帳裏坐僧問不是無身不欲全露請師全露牙撥開帳云還見麼僧云不見牙云不帶將眼來嶼後聞乃云龍牙只道得一半偏中有正正中偏黑狗銀蹄烏半邊帳幔揭開全體現更無回互絶廉纖趙州問僧發足甚處僧云雪峰州云雪峰有何言句示人僧云尋常道盡十方世界是沙門一隻眼爾等諸人向甚處屙州云闍黎若回寄個鍬子去一舉四十九窮漢露家醜趙州寄鐵鍬不知誰下手昔有古德齋時不赴堂侍者請赴堂德云我今日莊上喫油飽云和尚未曾出入德云汝去問莊主者方出門忽見莊主歸謝和尚莊上喫油糍未動腳跟天下遍被人拶著露頭面分明舉似更狐疑且喜莊頭通一線臨濟將示寂謂衆曰吾去後不得滅却正法眼藏三聖出云爭敢滅却和尚正法眼藏濟云已後有人問汝向他道甚麼聖便喝濟云誰知吾正法眼藏向者瞎驢邊滅却長安風月古如今可笑安心病更深臨濟正眼瞎驢滅玉斧慣將祖道平金雞啄破琉璃殼猛虎插翅出山林克家之子自超卓別有生涯立祖庭麻谷持錫到章敬繞禪牀三匝振錫一下叉手而立敬云是是谷便去次到南泉繞禪牀三匝振錫一下叉手而立泉云不是不是谷云章敬道是和尚為甚麼道不是泉云章敬是汝不是此是風力所轉終成敗壞麻谷參訪驗作家是與不是辨正邪放行也推車合轍把住也別有生涯金錫振兮全體用卓然立兮機獨逈到處春社唱神歌好手手巾呈好手一喝金剛王寶劍三尺龍泉光燦膽佛來魔來一齊斬遼空一鏃破三關萬里江山悉平坦一喝踞地獅子金毛踞地無窠臼奮迅驚羣誰敢禦哮吼頓破野狐心遠遠逃潛無覔處一喝探竿影草探竿衡鑑已隨身拈出人前辨偽真非是超宗異目者莫將魚目當珠珍一喝不作一喝用一喝不作喝商量大用全提振祖綱是聖是凡俱點額奚須較論短和長曹洞五位君臣正中偏月浸銀河冷淡天三更玉女垂簾睡曉來照鏡自羞顏偏中正空王殿上曾宣令誰敢當頭觸聖顏三下鳴鞭肅寂靜正中來挂印雷霆上築臺揮戟能招回落日金梁跨海非凡材兼中至煙菟已有食牛志天生骨氣力威雄獨踞當途距爪利兼中到閶闔九重旗擁道經文緯武早排班豈容暗裏來投到奪人不奪境風擊天高鳥絶蹤深山幽谷鮮人逢夜來明月千峰白荒草間花滿徑紅奪境不奪人牢關據住擊難開略許間人任往來塞外將軍行正令狼煙掃盡掣旗回人境兩俱奪弓指陳前爭日月血流垓下定乾坤興亡不管渾間事土曠人稀莫可論人境俱不奪夜靜松邀月到家一棚花影漾袈裟僧繇好手難描畫誰識山中景况佳巖頭昔在鄂州撑渡時遇僧去雪峰託僧傳語云我近日將三文錢買得一個黑老婆逐日撈蝦摝蜆且與麼過時僧至雪峰舉巖頭前話峰乃下禪牀云窮鬼子窮鬼子道我快活不徹風流和尚是巖頭娶個老婆黑似漆灰頭土面聰明王摝蝦撈蜆度殘日緑柳溪頭唱哩囉夜宿蘆花當草席自揚家醜傳雪峰惟有同條諳此意趙州因僧問狗子還有佛性也無州云無僧云上至諸佛下及螻蟻皆有佛性狗子因甚却無州云為伊有業識在趙州狗子無佛性七殺金星在命宮攪得一家不和睦錯拳打殺阿家翁雲蓋安因僧問如何是獅子子安云善能哮吼僧撫掌云好手好手安云青天白日却被鬼迷僧作掀禪牀勢安便打僧云驢事未了馬事到來安云灼然作家僧拂袖出去安云將甌盛水擬比大洋金毛獅子善哮吼驚起須彌空裏走北斗七星顛倒顛普化法堂翻筋斗掣電機直下掃烈烈轟轟雲蓋老臨濟問黃檗如何是佛法的的大意檗便打如是三問皆被打遂辭檗至大愚於大愚言下大悟太歲當頭坐命宮靈符雖遣亦逢凶崚嶒鐵面輕翻轉便自操戈滅祖宗普化常入市振鐸云明頭來明頭打暗頭來暗頭打四方八面來旋風打虛空來連架打一日臨濟令僧捉住云或遇不明不暗來時如何化拓開云明日大悲院裏有齋僧回舉似臨濟濟云我從來疑著這漢全機超卓殺活縱橫大用現前不存軌則臨濟老察秋毫坐斷山雲不放高慣能相敵巨靈手退身一步是良謨泉大道訪慈明明問片雲橫谷口遊人何處來泉云夜來何處火燒出古人墳明云未在更道泉遂作虎聲明以坐具打一下泉推明就位明亦作虎聲泉云我參七十餘員善知識今日始遇作家水將杖探金將火試賔主互換顯全機大用天旋無忌諱區區投璞鑑知音價增十倍必須貴一拶一捺露風規劍閣翻身超前軌長沙因僧問本來身還成佛否沙云你道大唐天子還刈茅割稻否僧云成佛又是何人沙云是你成佛知不知本身是佛須勘破雪上加霜曾嶮墮大唐天子第一人豈去刈茅與割稻金毛踏倒玉欄干堪笑瞎驢推水磨五祖演禪師謝監收上堂人之性命第一須是欲得成此先須防於若是真人一二三四五六圈拈起毛一串穿血濺梵天舌墮地依然搭在九郎田涅槃經云清淨行者不入涅槃破戒比丘不入地獄涅槃地獄兩無著一個瞎驢三隻腳常遊花館樂欣欣葡萄美酒戀貪著不忘却手中把個破木杓龍牙遁初參翠微問如何是祖師西來意微云與我過禪板來遁才過微接得便打遁云打即任打要且無祖意又參臨濟亦如是濟令過蒲團遁才過濟接得便打遁云打即任打要且無祖意遁住後有僧問和尚當年問二尊宿祖意明也未遁云明即明已要且無祖意龍牙祖意問師家禪板蒲團對不差鶻眼龍睛須辨的縱橫殺活較些些一勘過二勘過佛祖機關曾明破忠臣至死不改言提獎欽賢道遠播雪峰示衆云南山有一條鱉鼻蛇汝等諸人切須仔細看長慶云今日堂中大有人喪身失命僧舉似玄沙沙云須是稜兄始得僧云和尚作麼生沙云用南山作麼雲門以拄杖攛向峰前作怕勢雪峰拋出險崖句誘引羣兒弄鱉鼻自有靈機展變通各出手眼提祖印死蛇弄活好驚人沒齒咬人無藥治五湖衲子知不知珍重參方須仔細維摩居士問文殊何等是菩薩入不二法門殊云如我識者於一切法無言説無識無示離諸問答是為入不二法門於是文殊問維摩言我等各自説已仁者當説何等是菩薩入不二法門維摩默然打鼓弄琵琶相逢兩會家不二法門旨黑豆未生芽秋水澄空兮練色霜月皎漢兮無瑕絶蹤迹沒周遮八面團圞無縫𦉑摩醯三眼難鑒他歸宗剗草次有座主來參偶見一蛇過宗遂鋤斷主云久響歸宗元來是個粗行沙門宗云你粗我粗主云如何是祖宗豎起鋤頭主云如何是細宗作斬蛇勢主云與麼則依而行之宗云依而行之且置你甚處見我斬蛇主無對歸宗老刪荒草金鋤揮去斬癡頑大用玄機如電掃淨妙法身全體彰岸頭生死即慈航姹女已歸霄漢去呆郎猶自守空房徑山䇿謁雲巖遊禪師取道雲居值雪遂留月餘一日聞板聲豁然大悟及造雲巖遊遙見指云者漢甚處見神見鬼來䇿云雲居聞板聲來遊云聞後如何䇿云打破虛空全無把柄遊云向上事未在䇿云東家暗坐西家廝罵遊云嶄然超出佛祖他日起家一麟足矣月漾漾雲悠悠默然冷地唱涼州旱地忽聞雷電掃驚醒紅爐臥鐵牛歸云來兮賊贓露遠投璞兮辨真偽鵝王擇乳素非鴨類俞道婆凡見僧來便云我兒僧擬議便掩却門佛燈和尚往勘之婆見如前喚燈云爺在甚麼處婆轉身拜露柱燈便踏倒云將謂有多少奇特便出婆起身云兒兒且來識你則個燈不顧經綸學富眼蓋乾坤誘得羣子遠涉閨門雷驚掣電也蟄起出戶鵬搏擊海也攪亂星昏一曲離騷歸去後清風江上少人論趙州因僧問萬法歸一一歸何處州云我在青州做領布衫重七斤萬法歸一歸何處生鐵稱錘活活鋸虛空背上刮毛裂破腦門血濺地赤骨𩪸絶忌諱𣰦𣯶布衫重七斤覔他來處提不起咄黃龍南垂語云鐘樓上念讚牀腳下種菜時如何黃檗勝云猛虎當路踞鐘樓上唱無腔讚牀腳下種無根菜叢林跳出沒牙蟲毒尾九條攤世界古德垂語云一畝之地三蛇九鼠李靖三兄生九子用中相背性相知更聽輪王宣密令一頓赴動各行持洛浦參夾山不禮拜乃當面叉手而立山云雞栖鳳巢非其同類出去洛云自遠趨風乞師一接山云目前無闍黎此間無老僧洛便喝山云住住且莫草草匆匆雲月是同溪山各異截斷天下人舌頭則不無闍黎爭教無舌人下語洛佇思山便打濟稱華美奪魁標赤稍金鱗尾未燒妙握乾坤司造化冰肌碎玉鑑衡雕夾山老武鈐韜截斷舌頭安國法機離正位體全超同安問僧近離甚處僧云東州安云雙澗孤松煙青月白那個是上座主人公僧云始屆同安便遭此問安云記劍刻舟破珠求影豈不是闍黎境界喫茶去僧云那個是同安正主安云途中駒子不勝驊騮僧禮拜安云誣人打令舞拍全無松煙幕幕澗水灔灔虎笑巖吹觱聲龍吟洞昏雲掩遇貴則貴遇賤則賤互奪互存各逞一見一𫨻風流笑轉新突出日面與月面雪峰在德山作飯頭一日飯遲方曬飯巾次見德山托鉢至法堂前峰問鐘未鳴鼓未響托鉢向甚處去山便歸方丈峰舉似巖頭巖云大小德山未會末後句山聞令侍者喚頭來問汝不肯老僧那巖密啓其意山休去至明日升堂果與尋常不同巖至僧堂前撫掌大笑云且喜老漢會末後句天下人不奈伊何雖然如是只得三年活冰寒在水青出於藍德山父子半癡半憨末後句子覿面相瞞臨機變通也指鹿為馬密啓其意也不落言詮巖頭老漢智過李𣆀咦可憐鈍躓棲蘆鳥金毛踢倒玉欄杆風穴上堂云若立一塵國家興盛野老顰蹙不立一塵家國喪亡野老安貼於此明得闍黎無分全是老僧於此不明老僧即是闍黎闍黎與老僧亦能悟却天下人亦能迷却天下人要識闍黎麼左邊一拍云者裏是要識老僧麼右邊一拍云者裏是夷齊廉潔遁高岡徒説辭金還趙王清白門庭風化度名超道業兩難忘明招一日去保寧於路逢見保寧長老明便問兄是道伴中人自點鼻云者個閡塞我不可徹與我拈却少時得麼寧云和尚有來多少時招云噫洎賺我踏却一緉草鞋便轉國泰代云非但某甲諸佛亦不奈何招云因什麼以己防人狹路相逢遇作家探竿影草驗龍蛇根塵拈却靈通竅肯諾全機逈絶遮山瘦松而有秀蚌吐珠而無瑕莫輕忽弄爪牙虎口鵲兒難奪他圓悟勤夜參遠瞎堂出問淨裸裸空無一物赤骨律貧無一文戶破家亡乞師賑濟悟云七珍八寶一時拏遠云禍不入慎家之門悟云機不離位墮在毒海遠便喝悟以拄杖擊禪牀云喫得棒也未遠又喝悟連兩喝遠便禮拜破戶蕭條一物無蕩然靡寄絶親疏窮途指出衣中寶病者奪他肘後符入深穴捋虎鬚肆橫一喝太心粗傍敲正打全殺活迷雲破處太陽孤日容和尚因奯上座參撫掌三下云猛虎當軒誰是敵者奯云俊鷂沖天阿誰捉得日云彼此難當奯云且休未斷者公案日將拄杖舞歸方丈奯無語日云死却者漢也二鼠侵藤是誰得力奪角衝關彼此得失展拓也超山川之奇峻縱奪也奪河漢之清潔鼻孔正眼端的九苞彩鳳舞丹霄鈍鳥籬邊尋啄食雲門因僧問如何是法身向上事門云向上事與你道即不難作麼生會法身僧云請和尚鑑門云鑒即且置作麼生會法身僧云與麼與麼門云者個是長連牀學來底我且問汝法身還解喫飯麼僧無語水淨於螺碧風光滿目青雲收天際外桂魄一輪明鶴住雪巢兮一色虎嘯山崖兮兩聲明眼衲子覷破坦平閫外權衡行正令了無面背露全身洞山初因僧問如何是佛山云麻三斤麻三斤一稱稱恰好鈎頭意分明莫向言中討本是鄭州梨喚作青州棗不識大哥妻東村王大嫂雲門上堂云乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移又云雲起雷興死蛇頭上出荒草露出珊瑚日杲杲黑漆崑崙下滄溟簸土揚塵沒處討西舍白蕭公東鄰黃大嫂分明只在九郎家眨眼已過長安道僧問九峰虔如何是頭峰云開眼不覺曉僧云如何是尾峰云不坐萬年牀僧云有頭無尾時如何峰云終是不尊貴僧云有尾無頭時如何峰云雖飽無力僧云直得頭尾相稱時如何峰云兒孫得力室內不知有頭無尾在半途無頭有尾生慚愧出入行藏自家知超機限量絶倫配高著眼切須會圓陀陀無向背金針玉線孔相投繡出鴛鴦成一對溈山示衆云老僧百年後向山下作一頭水牯牛左脅書五字云溈山僧某甲此時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作什麼即得溪山易改稟性難移貓兒唾洗臉雞澡弄沙池漳州橘紅原非火勘破溈山老作家同光帝謂興化云寡人收得中原一寶只是無人酬價化云借陛下寶看帝以兩手引幞頭膝上化云君王之寶誰敢酬價明眼君王久蘊珍等間拈出示知音最尊最貴誰酬價挂向街頭賣至今鄧隱峰一日推車次馬祖展腳在路上坐峰云請師收足祖云已展不縮峰云已進不退乃推車碾損祖腳祖歸法堂執斧子曰適來碾損老僧腳底出來峰便出於祖前引頸祖乃置斧路逢劍客須呈劍大用之機全體現據令當仁不讓師臨危險處豈驚戰南泉住庵時有一僧到庵泉向伊道我上山去作務待齋時做飯自喫了送一分來少時其僧自做飯喫了一時打破家事就牀臥泉待不見來便歸庵見僧臥泉就伊邊臥僧便起去泉住後曰我住庵時有個靈利道者直至如今不見自家勾賊養家裏目識錙銖難辨伊大膽還他須鑑賞旗奪鼓丈夫兒家罄空物件破歸來看見同牀臥撩衣去後更思君也是貧兒思舊貨黃檗在南泉首座一日捧鉢向南泉位上坐泉入堂見乃曰長老甚麼年行道檗云威音王已前泉云猶是王老師兒孫在下去檗便過第二位坐天睿神機卓爾超萬人叢裏奪高標直饒逈出威音外未免平途跌一交仰山參古提和尚古云去汝無佛性山又手近前三步應諾古笑云子甚處得此三昧來山云我從耽源處得名溈山處得地古云莫是溈山的子麼山云世諦即不無佛法即不敢仰山却問古和尚從甚處得此三昧來古云我從章敬處得此三昧仰山云不可思議來者難為湊泊賔驗主主驗賔如珠盤輥越光新拶著通身是手眼唱愈高和愈精據住也吞聲削迹放開也照用同行日旋三昧靈通處胸藏六合發天真睦州問座主講甚麼經主云涅槃經州云問一𫨻義得麼主云得州以腳踢空吹一吹云是什麼義主云經中無此義州云脫空謾語漢五百力士揭石義却道無靈鋒寶劍驗龍蛇擊碎驪珠光透波誰識睦州孤峻處葛藤特地越增多普融藏主入五祖演室次祖舉問倩女離魂話且道那個是真的藏主有契遂呈偈曰二女合為一媳婦機輪截斷無回互從來往返絶蹤繇行人莫問來時路祖印可一念未生全體現異身妄見各分離去時自有通人愛回合生緣是舊妻臺山祕魔巖和尚嘗持木叉每見僧來禮拜即叉却頸曰那個魔魅教汝出家那個魔魅教汝行腳道得也義下死道不得也義下死速道速道學徒鮮有對者傾湫倒嶽赴來機殺活全提不眨眉雖是躬能入虎穴徒勞不得虎兒兒興化獎因僧問四方八面來時如何獎云打中間底僧禮拜獎云昨日赴個村齋中途遇一陳卒風暴雨却向古廟裏躲得過四方八面逈藏身簸土揚塵沒處尋投入鬼家宜躲避三更驚起夜叉神達磨面壁玉女深居把繡針織成蜀錦重千金拈來攤向街頭賣不遇知音枉費心昔有婆子供養一庵主經二十年餘常令二八女送飯給侍一日令女子抱定云正恁麼時如何主云枯木倚寒巖三冬無暖氣女子歸舉似婆婆云我二十年秪供養得個俗漢遂遣去燒却庵魚詬相濡湛碧涵虛珠沉淵媚劍埋丘墟夜半有力負之而趨柳惠黜國奪璧相如異目全提能縱奪一時燒却播江湖臨濟示衆云有一無位真人常在汝等面門出入初心未證據者看看時有僧問如何是無位真人濟下禪牀擒住僧擬議濟托開云無位真人是甚麼乾屎橛雲無心而出岫水無情而自流尊而無上貴莫能侔妙其間也隨處作主用如是也殺活自繇賊贓剛被人覷破漠漠窮途有許愁雪峰示衆云望州亭與諸人相見了也烏石嶺與諸人相見了也僧堂前與諸人相見了也後保福舉問鵝湖僧堂前則且置什麼是望州亭烏石嶺相見鵝湖驟步歸方丈保福便入僧堂望州與烏石相見不相識一根拄杖兩人扶象骨條路同出入驟歸方丈入僧堂無毛鷂子趂不及雲巖晟問尼僧汝爺在否尼云在晟云年多少尼云年十八晟云汝有個爺年不十八汝還知麼尼云莫是恁麼來者否晟云猶是兒孫接機應物是兒孫祖父從來不出門無相身中常獨露空王殿裏鎮乾坤霍山景通初參仰山山閉目坐霍云如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是語訖向右邊翹一足而立仰山起來打四藤杖霍因此自稱集雲峰下四藤條天下大禪佛把住鄉關信不通何言佛祖一家風炊香別甑隨人作取領補襟要巧工高山不住鳥死水豈藏龍雷轟電掣傾湫疾試看拏雲躍九重音釋罅呼訝切音嚇裂也嶄士減切音劖山高峻貌鈐其淹切音箝矛其柄謂之鈐詬吁句切音昫魚相詬以濕又吐沫也
