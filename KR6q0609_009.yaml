body:
  text: 嗣法門人法璽編福建邵武府安國禪寺語録總鎮馬蘭谷為女保安請上堂僧問雕弓彎似月寶劍凜如霜如何是鎮臺財施一句師云今日放衙來寶所進云旌旗遮日月鎧甲耀山川如何是和尚法施一句師云一棒揭開千聖眼不容擬議落凡情進云祇如兵隨印轉將逐符行如何是機前一句師云把斷要津不通凡聖乃云春風入戶喜天開夢覺雲中燕入懷月裡嬋娟臨下界空花結彩自飛來所謂為憐三歲子不惜兩莖眉然而鎮臺今日敦請山僧升座宏揚正法祈佛力法力僧力錫福延齡信佛者祿位高遷信法者貴子聯芳信僧者合衙吉慶所以信乃道源功德母長養一切諸善根一念逈超空劫外心花頓悟果圓成且如何是果圓成底人金魚玉珮調羹手撥轉如來正法輪師寓福省羅山法海寺上堂大道體寬銀魚眼裡藏夜市法性磊落蒼蠅腳上繫崑崙所謂道在目前不須碎啄凡聖同源德相具足歷劫湛圓動念即錯錯錯錯麒麟只有一隻角復舉僧問巖頭奯禪師如何是塵中主山云銅沙鑼裏滿盛油師云者僧問端捨父逃逝巖頭答話澤壑藏舟不曾指出塵中主使伊直下瞥地去即今有人問山僧如何是塵中主但向他道十字街頭石敢當德庵金居士請上堂僧問山花爛熳香流遠天氣晴陰亂鳥鳴只道春歸無覓處誰知轉向此中來如何是來的消息師云春風匝地繞進云春夏秋冬隨改變若能轉物即如來畢竟作麼生轉師云打破空王殿獨露本來人進云自是不歸歸便得五湖煙景有誰爭師云間殺闍黎乃云東君司令布穀催耕鞭起泥牛掀翻大地然後可以培植靈苗且道靈苗作麼生培植祗如金居士昔在榕城皈依山僧便能持齊研道今又遠來安國請法豈不是培植靈苗者哉靈苗既植自然覺花現瑞奕葉流芳所以初祖道吾本來茲土傳法度迷情一花開五葉結果自然成驀豎拂子云花開也以拂子打相云果結也且道法作麼生傳復以拂子擊香几云塞却耳門親聽取嘉聲千古播坤維明發先師忌日拈香云昔年遭毒手今日恨難休幾番曾入室敗闕當風流者漢平生口吞佛祖眼蓋乾坤做盡伎倆令人凑泊不得虛空剜窟寵平地栽蒺藜千聖莫能近百怪盡驚懼大衆非是不肖不解隱藏揚他過咎祗因痛恨難消故此今日當陽顯露雖然如是也是其父攘羊而子證之雪紅西堂嗣法上堂僧問挑來重擔足千鈞得遇英靈始放肩自此台山宗派遠一燈分出萬千燈今日續熖聯芳意作麼生師云大衆瞻仰有分進云可謂千軍猶易得須知一將甚難求師云萬人叢裡奪高標進云將來出世為師表佛祖從教立下風師云大用現前不存軌則乃云機前一句子千聖不知名歷祖咬不破頂𩕳一著子虛空包不住大地載不起祖翁一片地大悲千眼覷不見天下衲子搆不著圓陀陀光灼灼若喚作佛手又是驢腳喚作正法眼却是破木杓台山今日將大千世界盡情花劈了也又拈來搓作一團拋在九郎田畔諸人還知落處麼如若不薦幸有克家子付與荷擔著解制上堂聖制功方滿九旬期已終栗蓬屎橛撒向虛空踢翻佛祖爐鞲推倒大地禪床放行四海衲僧任他橫擔日月緊帩草鞋西遊華山北往五臺吟風咏月任性優遊然雖如是或在前途遇著明眼阿師問如何是安國禪汝等諸人作麼生道良久云個事目前不透脫眉毛礙著自眼睛因事回山過香嚴寺請上堂道布乾坤賑濟三有法垂樵水遍潤大千一塵含法界事理無殊途所以眉毛𥈤上建立空王寶所露柱腳底生鐵鑄就金剛一任八面風來魔魅侵他不得何謂明來明打暗來暗打虛空來連架打四方八靣來旋風打縱使三頭六臂到此俱立下風茲今奉旨還山偶過香剎檀信傾誠請揚法化入此門來莫存知解若能透脫向上一路管教生死頓絶是非永忘祗如今日與諸人相逢合談何事獅子吼時芳草緑象王行處絶狐踪因事奉旨還山上堂蜀犬見日則吠夏蟲難以語冰皆由見聞不廣便有許多參差所謂是非毀譽之場疑則羣咻而久則論定然後撫松柏而稱知己也以正眼觀來大似浮雲遮白日螢火燒須彌縱使伎倆用盡毫無干涉况荷堯天重垂雨露林泉增色魔外潛蹤且回寺酬恩一句又作麼生道遂拈香云惟將者瓣栴檀木仰祝皇圖億萬春師誕日請上堂僧問祥雲彌安國瑞氣擁台山翹誠臻慶祝請乞示無生師云坐觀青松猿探月閒行白日鬼挑燈僧以手打圓相云未審者個壽量有多少師拈拄杖云與木上座同年進云祗如今日還受慶祝也無師云好事不厭繁進云如是則鶴鳴松頂月雞唱劫前春師云無生雪曲誰能和進云好音在耳人皆聳水到渠成共一家師云難得到恁麼時節乃云老漢庚星有幾何但看空王那一步無手巡官掌上輪屈指算來六九數裸體無衣壽莫量逈脫根塵涉露布今承衆信請上堂凡聖同臨慶初度大似擔水賣河頭爭奈諸人都不顧顧不顧回互由基神箭慣穿楊擬欲翻身墮險路坐斷無角鐵牛機了取無生當體悟大衆既了取無生又悟個甚麼若不會待台山點頭即向汝諸人道師寓秦郵放生庵為薦先皇帝上堂拈香云此瓣香在於教體目之如來藏在於禪體目之佛祖心印在於聖體目之尊而無上貴莫能侔向爐中專為酬薦大行先皇帝伏願逈脫根塵速證樂邦無量壽了明心地該通華藏釋迦文僧問英明聖君最尊法道因甚麼歸西太速師云長安雖好不是久居進云天上天下惟我獨尊即今在甚麼處安身師云曾騎玉馬離宮闕已握金鞭入紫微進云恁麼則處處稱尊人不識和尚何以薦君王師云頓超直入如來地進云不是苦心人不知師云幸汝證明問開闢山河首創清朝基業撒手歸西請師何以薦師云金蓮地湧安身處寶蓋天垂極樂宮進云仗承妙法開迷徑了性無為向上宗師云不是英靈士到此也茫然進云恁麼則從今躍倒閻浮樹十方世界任縱橫師云目前無𦊱礙隨處任逍遙進云正好通身受用師云前途更有最高峯乃云舜日正當天浮雲忽遮蔽大地盡悲號草木皆含涕所謂聖君辭世天地慘然庶民無以恃怙緇侶將何依倚嗚呼鳳鳥不至河不出圖吾不復夢見周公矣雖然去聖時遙而德政布于天下合國為臣者盡忠盡孝玉柱擎天四海為民者思之仰之安居樂業有情無情均霑恩澤憶昔山僧進京時皇上始信宗門三顧而三召特眷優隆朝夕駕幸參禪問道謂山僧首創宗門肇開覺路及至山僧請假回閩聖君忽離宮闕位傳受於金枝化道中華已畢速返無量佛剎然則今辰頂禮千佛寶懺用答罔極之恩美則美矣再勞僧衆同到金靈座前拈香祭奠伏惟尚饗示衆入內萬善殿應制臨行示衆拙訥慵質祗堪山谷潛形德鮮樗材何動天子降詔既然到此覿面承當叨逢聖明之世幸值照臨之庇所以天下有道菩薩降示大地無私寶位綿延皇風與宗風共扇佛日同舜日齊輝乾坤永泰法海彌隆綱宗建立全賴護法匡扶學道禪流安享國王水土政當應制臨行一句作麼生道天上有星皆拱北人間無水不朝東示衆面目未露名相未分離相離名無踪無跡直下覷得破釋迦老子達磨大師任汝呼喚驅遣若向鬼窟裡尋聲捕影依稀鼻孔倣佛眼睛喫棒未有了日在示衆跛鱉騎牛入露柱磉磐跳上松蘿樹翻身撲落折驢腰𭺗起惺惺立地沒巴鼻步步坤維超祖意且如何是超祖意大衆試道看良久云若道不得錦山不肯辜負諸人去也以拄杖一時趂散示衆有一物光禿禿也無頭亦無足不動道場遍遊諸國敵生死軍破煩惱賊千聖不同躔萬法不為侶終日如愚不憤不發且道此人還會佛法也無蚯蚓喫鹽泥尾巴長屈曲示衆錦山有個獨腳虎關諸兄弟還有過得者麼把將公驗來與你證據看一僧出衆便打師一掌師云公驗已見如何是堂奧中事僧便喝師云未見主在僧擬喝師連棒趂退示衆舉法華經云大通智勝佛十劫坐道場佛法不現前不得成佛道瞿曇老漢恁麼說話大似波斯失却冊若論佛法甚處不現前燒香掃地合掌低頭運水搬柴拈匙展鉢出門便見佛殿入門便見僧堂處處大用神通事事圓明解脫無非是當人受用處錦山與麼指示還有過人處也無琅𪻱玉琯纏秋樹颯颯金風動野蘋示衆達磨面壁不死偷心神光立雪埋沒己靈盧能壁上倩人書偈已露賊贓南嶽磨磚作鏡赤土塗牛妳馬祖一喝用心不臧黃檗三頓棒太平奸賊臨濟滅却正法眼欲隱彌露雲門顧鑑鷂子過新羅德山末後句暗騙明瞞雪峯輥毬特地狼藉者一隊老古錐牙如鐵橛口似血盆能縱能奪能殺能活猶如戴角虎搖嶽驚羣今日被法喜一時捉敗了也還有與他雪屈者麼出來相見如無且看聰上座與他雪屈一上以拄杖打散示衆驀拈拄杖云者個上拄天下拄地汝等諸人因甚麼摸索不著殊不知常在手裡拈起也文殊普賢無容身地放行也釋迦彌勒腦碎膽裂祗如不拈不放意又作麼生有時卓向千峯上劃斷山雲不放高喝一喝示衆夫參禪者須要參活句不要參死句如何是參活句句剗意意剗句意句交馳切莫隱諱如何是𭆤死句不發生機如人抱橋柱洗腳死活不知諸兄弟參禪人直要具大眼目若是金鍮莫分奴郎不辨顢顢頇頇今朝入一叢林明日出一保社恁麼行那有了日示衆舉傅大士云空手把鋤頭風前捉蜉蝣步行騎水牛樓上看打樓人從橋上過撞著破竈墮橋流水不流灘頭踢紙毬傅大士恁麼為人不能良賈深藏若虛君子可笑賊身已露被人覷破非是好手諸人還知他落處麼其或未然莫道此間山勢險前頭猶有最高峯因事示衆楚人失弓漢人拾得讓之有餘爭之不得若杜耳目於胎彀掩玄象於霄外而責宮商之異以辨玄素之殊驀拈拄杖一劃云向者裡透得過萬機頓赴而不撓其神千難對殊而不干其慮動若行雲止猶谷神其或未能鷸蚌相持俱落漁人之手示衆一法通萬法通鐵壁銀山無𦊱礙眉毛鼻孔已通同普賢騎六牙白象入你眼裡遊戲三昧是汝諸人還不知醒以手拍膝云看看依舊出大殿去也便起身示衆如來禪祖師禪大樹大皮𮖐小樹小皮纏祖師心地印搭在九郎田諸兄弟九郎田即不問且如何是心地印良久云狗子尾巴書卍字野狐窟宅梵王宮寓秦郵彌陀庵除夕示衆自到高沙住小庵柴門破落冷雲堂掃除舊壁神符彩更立新條振祖綱淑氣逼人老歲月時光催鳥報春芳到頭生死無繇敵白首空歡一世忙示衆一劃長二劃短虛空包不住大地載不起騎馬上須彌一日行千里震威一喝云看看走入諸人眉𥈤縫裡去也還在者裡打瞌睡喝一喝示衆一見便見一會便會石馬出籠紗露柱騎鱉背擲下拄杖云盞子撲落地碟子成七塊華山土地笑咍咍嘉州石佛膽驚碎示衆十五日已前達磨面壁覷不破十五日已後劉海釣蟾罕得其遇正當十五日突出夜叉身便現菩薩面千里聞其名不如親見面見不見眨上眉毛錯過伊山門走入伽藍殿擲下拄杖云薦示衆寒梅苞裂噴清香誘引狂蜂上下忙爭奈禪流不識意空教獵犬覓𦏰羊以拄杖卓云𦏰羊在者裡獵犬即今在什麼處一僧出衆作獵犬勢將師腳抱住師劈脊一棒云莫咬老僧僧便喝師良久云還有獵犬麼出來看既無山僧放出一隻咬殺羣羊去也以拄杖一齊趂散因雪獅子示衆六花搏聚全無雕琢之痕一色精明宛有奔騰之勢大雄踞地威猛驚人瓜牙輥弄明月皮毛披掛緑雲雖不哮吼中天早布聲名大野舉頭霄漢百獸聞風逃潛骨格超倫一氣能吞佛祖直饒哪吒到來那敢當頭覷著何謂橫身當宇宙一句定綱宗喝一喝示衆今時學道者不會淵源旨趣何也只因有幾種病自己不知海會今日一一說破有等工夫做到語言道斷寂滅場地不肯更進前一步撒手翻身只是墮在死水裡有等得些光影門頭便認著惺惺靈靈以為了當殊不知正是認賊為子是非之端生死之根有等有時冷冰冰有時熱閙閙所以心有間斷念不相關有得有失尚且話頭不能打成一片豈了得大事耶有等不肯真參實悟好覽堯典舜謨尋章摘句築得滿肚皮到處與人逞弄兩片驢唇忽然撞著明眼阿師一拶不知落處如死羊相似眼睛烏𠷈𠷈地真可憐憫有等在叢林中其道不能成先成膏肓病我慢山高駁貶尊宿揚己之德發人之過事事要順自意頭頭要趂己心稍有一言不投便要起單而去視叢林如驛舍訕法門似燈滅如斯學道天堂未就地獄先成大衆海會舉此參禪者數種病處若是有道高流决不落在其中自然逈出常流是非永忘習氣消殞寒暑不能遷饑餓不能動富貴不能移在稠人之中埋頭五年十年必成大器如獅子兒哮吼一聲驚羣動衆不比泛泛之流自起自倒却被明眼人傍觀一場笑具因事示衆有一人頭尖五嶽口濶四溟氣宇如王吞佛噉祖終日是非裡坐是非裡臥若透脫得逈出人一頭地若透脫不得布袋裡老鴉雖活如死明眼漢二六時中壁立萬仞不倚一物離文字相離言語相離心意識凡聖路絶若到者個田地無是無非無夢無想遠離顛倒究竟涅槃得大安樂畢竟如何是獨脫底人數聲清磬是非外一個閒人天地間示衆道從心生學由志向持律防非參禪向上凡學道之人有此四件事挾抱於懷時時正念日日精嚴學無剪爪之工安有遊玩之日那管東家杓柄長西家杓柄短自生卜度能所對待故有種種差別之殊每每起顛倒之見不能靜而絶慮也以拄杖一卓云向者裡擺脫得開全身放得下截斷生死根株掀翻是非窠臼平坦坦地孤巍巍地隨緣不變不變隨緣到此始知空界事浮生穿鑿沒相干示衆潦水澄清全彰大圓鏡象草鞋躍脫露出衲僧腳跟所謂腳跟底硬紏紏地乾剝剝地金刀剪不破彩筆畫難成諸聖不知名三賢莫能辨在天為乾在地為坤在水為坎在火為離在凡名凡在聖名聖雖然各居其位不落位次明眼衲僧不必叮囑是則是說時容易會時難多買硃砂畫月看欲識個中消息子一枝梅倚玉欄干示衆佛祖鼻孔中安置百千世界衲僧眉縫裡能藏百億須彌通上徹下截斷衆流捏聚放開隨機應用未審賓頭盧尊者有何神通妙用一日應供四天下駕慈航度衆生與人解粘去縛不涉見聞覺知是則雖是陝府鐵牛吞却嘉州大像意作麼生良久云無端無端示衆日面佛月面佛眼裡突出遼天鶻有相身中無相身豁達古今無二路諸兄弟既無二路因甚麼被明眼人問著不知去就目前如鐵壁相似且道過在於何皆因平昔不肯死心用工真參實究東邊浪蕩西邊打閧弗以本分為正務生死為正因却被世利所轉妄心所牽一場熱病臨身如何擺脫到頭悔之晚矣莫怪海會不道各自努力示衆若論此事譬如𡏖𡒁堆頭一顆明珠眼親手快者得之眼鈍手緩者祗好傍觀所以道䀗眼時百千日萬象不能逃影質明明祗在眼睛前眨上眉毛覷不及覷不及糊餅裡覓甚麼汁示衆今日鬼谷子賣卦有買者出來與汝判斷吉凶看一僧云和尚未啓口時作麼生判斷師云汝家父母雙亡心不痛泪僧云父母俱在師云請大衆為汝舉哀僧禮拜師云苦苦一僧云今日是學人生日師云你破家蕩産還知麼僧云知師云還我主人公來僧云向者裡禮拜和尚師打云放過即不可一僧云前三三與後三三請和尚斷看師云五鬼臨身鐵蛇繞腳僧云一串穿却師云禍患臨身難躲避僧云路從平處險人向靜中忙師云果然被他纏住腳跟了也乃云今日向十字街頭賣卦竝無一文錢入手不免捶破卦盤去也以拄杖一卓歸方丈示衆大道寂寥本無言說理事分明不循途轍雖在目前猶未親切要見本人就窠打劫透色透聲絶踪絶跡到此休歇場地萬法如如將畫大地為自己將自己作盡大地四大海水𭣣貯八萬四千毛孔裏華藏世界總不出衲僧一緉破草鞋所以一為無量無量為一頭頭妙用法法全真且道如何是全真處良久云乾屎橛示衆以拄杖地上打相云三世諸佛出不得者個歷代祖師出不得者個天下善知識出不得者個未審諸人出得者個也未試道看一僧將袖向圓相裡一拂師云即今在內在外僧無語師便打云若出得口吞佛祖眼蓋乾坤若出不得布袋盛老鴉雖活如死示衆無角泥牛穿海嶽蚯蚓抹過新羅國分付禪流具眼看急須薦取莫失却一機截斷路千差了然彈指超無學示衆擲下拄杖云鐵蛇橫古路一馬生三寅意旨如何有人道得恰好安國拄杖子分付衆無對良久云諸人道不得山僧𭣣起自用去也問侍者云你道得麼者無對師打云城門失火殃及池魚示衆萬法歸一拗曲作直石人驅耕日落不息催趲野婦連忙夜織織得一領青州布衫當作尋常破席攤向街頭賣與人無人酬價真可惜衆中還有作家者請出酬價看一僧云看破不值半文錢師云可惜許一僧云前三三後三三師打云賞你一棒示衆拈起拄杖云者一假事人人開口道著步步踏著本自圓成不缺𮈔匆若道著似虎威獰頭上戴角若踏著機疾如風遼天俊鶻赤灑灑乾嚗嚗非是千年沒底靴亦非今時破盞橐白牡丹紅芍藥一度春風一度開花開花落成蕭索諸行無常一切空即是如來大圓覺示衆山僧昨夜三文大光錢在黑暗天娶個功德女聞時富貴見後貧窮褲無襠裙無口頭上青灰三五斗屎橛拈來破紙包橫拖布袋花街走痛飲清源酒一杯醉倒長街大哮吼一假風流樂自然漢地不管秦不𭣣既是漢地不管秦又不𭣣即今在甚麼處安身諸人試道看維那出衆將坐具搭肩上云分明在目前師云認著依前猶不是師便歸方丈示衆有一人頭戴箬笠身負衣包有一人寸𮈔不掛跣足裸形且道此二人那個天然氣槩異目超宗若揀點得出倒臥荊棘林遊戲天魔界若檢點不出錦衣公子貴破衲道人間示衆熱熱熱紅爐熖裡冷如鐵寒寒寒大洋海底火燒山若透兩重關棙子總饒毒藥也閒閒示衆高揖釋迦不拜彌勒衲子尋常超宗越格不落凡聖機豈涉語言默若能打破兩重關𭣣下臨濟白拈賊衆中有單刀直入者麼請出相見一僧問如何是白拈賊師云切須藏鋒露刃僧便喝師打云賊贓已露了也還有道得者麼如無關羽來劫寨也以拄杖一齊打散示衆舉僧問雲門如何是諸佛出身處門云東山水上行圓悟和尚云或問天寧如何是諸佛出身處但云薰風自南來殿閣生微凉愍忠即不然或有人問如何是諸佛出身處但道古澗寒泉徹地湧須著眼看來源大衆還委悉麼若會得自己出身處便會得諸佛出身處若也不會等待當來問彌勒示衆山僧行腳二十年並未得個入頭甚生慚愧上天無路入地無門請衆中有下得辣手者將山僧打殺良久云有麼有麼如無山僧打殺闍𥠖去也以拄杖一齊打散出堂對達一維那云適才山僧做一上甚嶮巇幾乎入地獄如箭射達震威一喝師便打維那隨後進方丈云和尚為什麼不小心師云也是捨命陪君子示衆昨夜三更狂風起吹折門前一株松一生受用燒不盡富與時人自不同拈起拄杖一吹云自從靈山傳至此燈燈續熖到吾宗且道如何是吾宗喝一喝示衆山僧未行腳時是個可憐生及乎行腳後依舊是個可憐生及至得個休歇處亦是個可憐生者三個可憐生且道那個合受人天供養大衆試道看若道得恰好者山僧拄杖子兩手分付一僧云原來只是舊時人不改舊時行履處一僧云爍然不異昔年事顯露當陽稱獨尊一僧云百年三萬六千朝返覆原來是者漢一僧云國無二王家無二主一僧云羞慚遍大地不改舊時顏師云大衆下幾語頗恰爭奈今朝日辰不吉且待來日遂卓拄杖歸方丈示衆寒風砭骨眉毛廝如結霜凍銀河跟冷似鐵若是伶利作家覷破紅爐一點雪若也躊躇甕裡明明失却鱉以拄杖卓云切切火蛇𨁝跳上金闕築碎帝釋鼻孔發下南司判官八稜鐵棒痛打不徹遂卓柱杖云心頭悶悶如火熱示衆參禪人須猛烈當下相承猶是鈍鐵更問如何腦門著楔瞥不瞥含元殿裡問長安誰信壺中別有月踏著本地自風光全身放下便休歇且如何是休歇處達磨鬍子唇齒喝一喝示衆大凡參禪學道貴乎皮下有血猛烈性燥如斯氣槩蓋與尋常泛泛者不同孤逈逈地峭巍巍地詎肯和光濫俗混世同塵識情頓捨於世間身心棄置於方外不求富貴之樂豈愁淡薄之苦寒衣兼夏著紙被禦隆冬一瓢一衲雲水家風一笠一履行腳受用去來如野鶴起止似浮雲昔日山僧離閩參學時帶一雙布襪穿有十餘年千衲百補以後出世開堂猶戀戀弗忍棄之只愁己躬大事不明那有間工化檀信做件皮毛蓋體諸兄弟若要明己躬大事求出世因直須萬緣放下了不干懷每日抱住一個話頭不可作有無句語穿鑿不可作解會穿鑿不可作佛法穿鑿不可向情識上卜度單明向上一路抖擻精神勇猛提撕疑到無疑處追到無追處直須追到桃源路絶別見一天不見絲毫過患不見動靜二相到此田地更須緊把上頭關不容絲毫走作如生死冤家相敵向一念未生前直下坐斷徹底無依通身灑落慶快無疑方稱一員了事道人一任登山玩水自性逍遙歌館樓臺隨緣放曠到處作主遇緣即宗可以作大地醫王可以作人天軌範可以作險路津梁可以作幽冥慧炬如斯學道不負諸聖己靈不枉緬離桑梓從上乃佛乃祖大善知識無非是個性燥漢皮下有血氣者故尋師擇友求决生死炊㸑負舂搬柴運水親覲十年二十年總是單明此事若不苦中苦焉為人上人近來有般𣯧𣯧漢不思行學道參問知識只在家中學做兩句臭詩撞著瞎眼阿師聞他聲名自上他門戶不辨清白便將冬瓜印子印證呌他出頭為人貪人供養受人禮拜十指尖尖不沾滴水文質彬彬虛裝體勢問著佛法信口亂統人我貢高是非妬忌不存己德揭揚人過無常卒至業識忙忙有何了期故古德云未聽經文先坐講未曾行便開堂分付諸方參學者莫教地獄苦時長看此話與後人做生死牌豈不兢兢業業者乎如此出家埋沒己靈虛消信施馬能得出輪回珍重示衆山僧昔日行腳到天台拾得一道驅邪輔正靈課今日對衆舉揚諸人家裡或有魔魅作祟夜夢不祥者出來剖露與你决斷吉凶免生灾惑以拄杖卓云一二三四五甲乙丙丁午空劫已前事不離花甲子復卓拄杖云有凶報凶無凶報吉請出道看一僧云和尚屬艮某甲屬乾上三下三名為大畜爻象既成吉凶已判即不問未判一句請師道師云至尊元九五德相自天然良久云還有問卜者麼既然無𭣣起卦盤來日再卜所以有利無利不離行市卓拄杖起身示衆奮獅子全威拈倚天長劍不容纖毫擬議誰敢觸犯當頭若是上根者聞此話如虎插翅自有吞佛噉祖氣槩若劣根者聞此話若犬夾尾奔南走北逃去大衆此二種人若到愍忠門下如何相待到來總與三十棒不見道寧教天下人辜負我我不辜負天下人音釋鎧丁亥切音愷甲也爬蒲巴切音琶搔也鷸允律切音聿知天將雨鳥也橐他各切音拓囊也
