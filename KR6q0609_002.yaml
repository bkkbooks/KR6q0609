body:
  text: 嗣法門人方醒編北京皇城內萬善殿語録順治十五年師在延壽寺應禪期於九月十八日蒙聖駕臨寺延師住萬善殿十月初一日入內奉旨於十五日啓期結制是日御駕親臨命欽差官李昌祚同僧録司執香迎請上堂師至法座前云者師子座從上佛祖共登人天瞻仰今日山僧荷蒙聖恩命升此座敢借威光提持向上一路去也喝一喝遂升座拈香云此瓣香虛空包不住大地載不起拈來爇向爐中端為祝延今上皇帝萬歲萬安伏願垂衣致治拱手來朝此瓣香根盤亘古葉覆今時奉為昭聖慈壽恭簡安懿章慶皇太后伏願頓悟心花速證道果此瓣香坤儀萃淑德超倫奉為三宮皇后貴妃伏願紫微長照於深宮玉葉恆敷於上苑此瓣香棒頭取證永劫不爇向爐中端為現住雲間明發禪院百癡元老和尚以酬法乳之恩遂斂衣敷座云無影林中潛玉兔眉鋒裂破三玄門突出哪吒一隻手大家扶起破沙盆衆中還有共相證據者麼僧問堯風永扇舜日重輝萬善安禪請師祝讚師云邊邦寧靖歸王化萬姓謳歌樂太平進云萬善堂中增瑞氣一人有慶等乾坤師云也須知恩始得問海寶千般必求如意鎮海明珠如何取得師云不入驚人浪難逢稱意魚進云某甲不與麼道師云料汝伎倆有盡進云一念不生全體現六根才動被雲遮師云若與麼道早涉周遮了也進云龍得水時添意氣虎逢山勢長威獰師云也是箇倚墻靠壁漢問大開爐鞲烹佛煉祖如何是烹佛煉祖之作略師云拶出眼睛穿卻鼻孔進云恁麼則骨格天然就不假起規模師云也須勘過始得乃云爐鞲洪開聖凡路絶鉗錘密運鐵石心寒劈禪宗之骨髓裂教網之葛藤一句全提千差截斷皇宮兜率此界他方隨處建立法幢闡揚的旨如月普印於滄江似雷洪鳴於空谷直得百草頭上轉四諦法輪一毛孔中現百千樓閣堯風蕩蕩舜日熙熙四海清寧兆民樂業不是神通妙用亦非法爾如然畢竟承誰恩力竪起拂子云天高羣象正海濶百川朝上堂僧問聖德洪開選佛場巍然古佛放毫光單傳直指無回互洞徹玄宗振祖綱超羣一句即不問臨濟賓主請師分師云六耳不同謀進云獅子遊行無伴侶鳳凰棲處絶籓籬如何是賓中主師云猛然踏著來時路進云江城梅報千秋節岡石松號萬載春如何是主中賓師云入山特訪白雲人進云朝陽孕彩天光爽夕魄騰輝海印開如何是賓中賓師云窮途路上愁殺人進云手握吹毛全正令胸藏日月任橫行如何是主中主師隨聲便打僧一喝師又打問觀音菩薩從聞思修入三摩地未審與禪宗是同是別師云水急魚行澀山高鳥不棲進云離四句絶百非請師直指西來意師云蟭螟踏斷眉稜骨進云某甲不恁麼道師云汝試道看進云沒蹤迹處莫藏身師云如何是汝藏身處僧喝師云醜拙已露了也乃云凡行腳須具行腳眼參方要識參方句如行舟者識水之淺深御車者知地之高下遊山必須到頂參禪志圖了悟莫守寒巖困於途轍直下坐斷報化佛頭説甚威音那畔也無今也無古卓爾孤明也無聖也無凡凝然一體透聲透色應化去來無迹無蹤遍遊南北卷也置於毫端放也充乎法界平等如如性相不二斯是諸佛之慧命諸祖之法眼還會麼千年破漆桶特地意分明復舉唐莊宗皇帝問興化和尚朕在中原收得一寶只是無人酬價興化云借陛下寶看帝以兩手捧幞頭安膝上興化云君王之寶誰敢酬價師云莊宗作家君王興化明眼宗師酬價當時道風千古以正眼觀之可以刮盲人之翳膜作佛祖之龜鑑復喝一喝下座上堂僧問金剛經中有五眼如何是肉眼師云隔窗不見外進云如何是天眼師云絲毫無挂礙隨處任方圓進云如何是慧眼師云截斷生死根進云如何是法眼師云看破佛祖肝膽進云如何是佛眼師云作四生之慧炬僧佇思師云瞎乃云破雪梅花帶笑顏律回燮理鬬芳妍玄冥戢兆端倪露漏泄威音那畔邊諸人若會得始信世界未分早有佛性亘古靈明歷劫純淨在聖不資在凡不減三世諸佛以此成道度生諸大菩薩以此修證菩提聲聞緣覺以此斷惑證真歷代祖師以此悟道作人天梯航一切衆生以此發心求無上道所謂過去諸如來斯門以成就現在諸菩薩今各入圓明未來修學者當依如是説既依如是説今日萬善開方便門示真實相且如何是真實相是法住法位世間相常住上堂僧問達磨西來一字無全憑心地用工夫又道過去心不可得畢竟如何用工師云任你摸索不著進云如何是現在心不可得師云築碎汝鼻孔進云如何是未來心不可得師云豈容易與你道破進云既三心不可得即今大衆參箇甚麼師云疑殺天下人僧一喝師便棒問鼻端想現吽字法一切惡者能破壞且道破壞箇甚麼師云哪吒手裏黑漆鉢進云微妙金剛三摩地即得如應法成就且道成就箇甚麼師云金剛腳下三尺土進云謝和尚答話師便打乃舉起拄杖云縵天布網欲羅沖漢金鵬以拄杖作釣勢云四海垂鈎意圖揚波錦鯉所以知識唱導意不在言竪拂敲牀提持正令德山見僧便棒掀翻靈蛇舊宅臨濟見僧便喝震碎鬼窟魔山假使言前薦得猶是認影迷頭句下翻身早涉程途萬里更於參究大似丙丁求火直下承當秪恐不是玉是玉也大奇萬善恁麼道莫謂壓良為賤只解把住不解放行雖然如是三十年後此話大行臘八上堂僧問瞿曇未離兜率已降皇宮未出母胎度人已畢因何今夜又覩明星悟道師云但有路可上更高人也行進云秪如未悟已前是如何師云眼橫鼻直進云及乎悟後又如何師云無風起浪進云大小瞿曇向者裏一場敗闕師云過在甚麼處進云憐兒不覺醜師云錯會不少乃云今日臘月初八盡謂釋迦成道時節殊不知成佛已來於今十劫故此未離兜率已降皇宮未出母胎度人已畢既度人已畢又何須今夜覩明星而悟道諸大德若透得者重關棙子始知如來常在家舍不離途中常在途中不離家舍去來無以象動靜不以心不起本座遍坐道場法法真如塵塵寶所無一法不是遮那身無一物不是遮那境無邊香水海攝入毛孔中百億須彌盧總在腳跟下圓宗普應妙用該通為總陀羅尼號大自在佛正當今日慶讚一句作麼生道自有一雙窮相手撥轉如來正法輪上堂僧問把斷要津即不問六通意旨請師分師云我這裏一竅也無進云如何是天眼通師云矮子入場看傀儡倒騎驢子上高樓進云如何是天耳通師云若將耳聽終難會眼裏問聲方始知進云如何是他心通師云隔垣聽音響遐邇俱可聞進云如何是宿命通師云如人飲水冷暖自知進云如何是神境通師云王索仙陀婆一呼知三事進云如何是漏盡通師云龐公笟籬龍牙木杓進云把住放行皆在我收來拋去更繇誰師云也是美泥團漢乃云天寒地凍衲子毛孔卓豎暖室商量便落無計瞌睡所以雪竇道長松之下塊石枕頭者般漢正好喚起來頂𩕳三千腦後八百若是皮下有血者聊聞舉著通身汗流故山僧今日撥轉船頭與諸人別處相見去也驀豎拄杖云木上座適才遊遍恆河沙國土上至三十三天下至水輪空際一念回頭坐在諸人眉𥈤上揚聲大呌曰南贍部洲人發火帶纍東勝神洲人失城甚生怖畏幸遇文殊菩薩云汝等俱是癡衆生何必生大恐怖呌喚馳走但能息心妄想三毒業火自然斷滅便乃合掌云我等獲遇大士指入解脫之門甚生難遭之想從今已後永不退屈遂卓拄杖云木上座與汝作證明元旦上堂拈香云此一瓣香德超堯舜道邁義軒爇向爐中端為祝嚴今上皇帝聖躬萬歲萬安伏願聖恩廣大恆為萬乘之尊道眼圓明永作千秋之鑑此瓣香奉為昭聖慈壽恭簡安懿章慶皇太后伏願摩耶再世瑤天永錫遐齡龍女重生金軀常樂我淨拈香畢僧問佛祖家風舊人間歲月新千年桃核裏原是舊時仁如何是新年頭佛法師云穿婆衫子拜婆年進云新年佛法蒙師指祝聖一句作麼生師云金闕仙官呼萬歲寰中黔首慶升平進云某甲不恁麼道師云任汝卜度僧呈坐具云全憑者箇無私力仰祝皇圖億萬春師云也是重説偈言乃云歲庚新正初一百事隨心大吉兩班龍象森森祝聖壽同太極齊天一統山河四海兆民安逸佛法流布乾坤萬姓咸霑利益人天景仰樂修崇共證般若波羅密復舉僧問明教嵩新年頭還有佛法也無嵩云無僧云為甚麼新年頭無佛法嵩云張公喫酒李公醉僧云老老大大龍頭蛇尾嵩云明教今日失利師云萬善或有人問新年頭還有佛法也無但云有如何是新年頭佛法大蟲舌上打鞦韆無尾猢猻倒上樹元宵上堂僧問驅耕奪食即不問如何是奪人不奪境師云林中鳥語新野徑人蹤滅進云如何是奪境不奪人師云落花隨水去漁父拾將來進云如何是人境兩俱奪師云把斷要津不通凡聖進云如何是人境俱不奪師云白雲何處去明月落誰家進云料揀已蒙師指示上元佳節是如何師云家家門前火把子進云慧燈剔起乾坤朗天下人人樂太平師云得風流處且風流乃云法身無形能現衆象聖智常寂能應萬機即是當人妙明真心轉成四智如迅雷震於長空似杲日照於幽谷所謂大圓鏡智流出東方阿閦如來平等性智流出南方寶生如來妙觀察智流出西方無量壽如來成所作智流出北方成就如來即自一心流出燃燈古佛今夜放白毫相光照天照地有情無情均霑利益皆賴當今聖主無為之化所謂國政天心順官清民自安村歌社酒共享升平柳巷花街齊歌有道此際萬善如何施設安禪樂道無他事一盞清茶也醉人復舉代宗皇帝問忠國師百年後所須何物忠云與老僧作個無縫塔帝云請師塔樣忠默然良久云會麼帝云不會忠云吾有付法弟子耽源詔問之帝後詔問源云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識師云代宗帝明眼作家問著便知落處故請塔樣盡謂國師默然處呈出塔樣了也殊不知被代宗驀面一拶直得粉碎無處摸索縱饒耽源到來亦是將南作北鏤玉雕沙畢竟如何以拂子打圓相云一念不生處團圞樣轉新聖壽上堂拈香畢僧問仙鶴到金城籌添萬壽亭某甲特上來請師慶遐齡師云天長地久日月恆明進云桃熟三千曆芝香九萬春師云華封三祝瑞靄九垓進云一輪杲日無私照萬物咸霑大地春師云不勞重讚歎乃云紹隆聖位心契真宗不言而化天下歸崇菩薩降示神霄獨為萬邦真主尊中之尊聖中之聖道超日月德冠乾坤駕智海布津梁豎法幢為龜鑑作蒼生之慈父振佛法之頽綱體證金剛三昧頓超塵劫大千所謂過量大人具足菩薩萬行栴檀林裏修無上菩提選佛場中辨衲僧正眼畢竟得何三昧直登華藏玄門頓遊毗盧性海解制上堂僧問菩提本無樹不離法身中法身即不問解制請師通師云兔角杖挑五湖月芒鞋踏破萬山雲進云本來無法可説和尚今日因甚又惑亂人心師云卻被闍黎帶纍進云一滴曹溪流不盡法輪常轉度迷津師云話頭也不顧僧一喝師云錯乃云收起縵天網任他龍象奔騰劃破地牢關放出牯牛蹴踏是則是切莫犯人苗稼不見南泉道擬放溪東去未免飲國王水草擬放溪西去亦未免飲國王水草不如隨分納些些且道納些是個甚麼金剛圈栗棘蓬鐵蒺藜乾屎橛一一嚼得破一一透得明不妨掉臂而去雖然如是正當九旬功滿解制一句作麼生道針鋒影裏騎大鵬撞破虛空一輪月回海會寺謝恩上堂拈香畢師云佛祖機關衲僧巴鼻有時放開有時捏聚捏聚也佛祖髑髏粉碎放開也大悲手眼全彰衆中還有麼僧問祖印高提出九重乾坤是處演真宗帝道遐昌即不問回山祝聖請師通師云恩逾邱山重須彌芥子輕進云皇風浩蕩佛日增明如何是到家一句師云龍驤兼鳳舞瑞氣滿園林進云恁麼則萬里江山歸有道十方雲集賀師回師云輕輕躡足龍門過惹得清風動地來進云謝和尚答話師云切莫草草進云瞞他一點不得師云且莫詐明頭乃云法不孤起仗境方生水到渠成月來即印所謂聖人無二道真諦俗諦以圓融聖人無二心世出世間常安樂德配禹湯光騰泉石山僧每慚鄙拙無補法門幸遇聖君引入禁林肇開覺路深荷殊恩封號錫印佛法尤賴於興隆濟宗從斯而丕振正當謝恩一句作麼生道良久云恩深無可語懷抱自分明上堂僧問優波離尊者持戒第一迦葉尊者頭陀第一舍利弗尊者智慧第一恁麼則成三如何歸一師云但是宿生承願力當來定是超羣人進云某甲不與麼道師云一任鑽龜打瓦進云腰纏十萬貫騎鶴上楊州師云太富貴生進云五百人善知識話頭也不識師云今日山僧失利問昨日朝君即不問萬善同歸意若何師云是聖是凡同在此進云五鳳樓前聽玉漏途中一句又如何師云踏破澄潭月清光滿四維進云到家一句又作麼生師云放下兔角杖踢脫鐵草鞋進云人歸大國方知貴水到瀟湘一樣清師云龍門無異客雲外一間僧乃云佛法無多子海口莫能宣法性遍虛空摩醯鑑不出所以是法非思量分別之所能解超諸塵纍不落今時當體全空廓無邊際直使陽和運轉梅花破玉噴天香雪盡春回柳色搖金含露冷道人行處萬境悄然一句全提亡鋒結舌且如何道得轉身句剎竿頭上仰蓮心復舉宋仁宗皇帝見僧看經問云卿看甚麼經僧云護國仁王經帝云既是朕經為什麼在卿手裏其僧無對師云仁宗皇帝探竿在手到處驗人者僧只解看經未具看經眼在所謂貪看天上月失卻手中橈當時仁宗皇帝若問山僧但對云與陛下流通有此祗對可謂手眼分明頭正尾正以免後人檢點上堂僧問鼓音才震猊座高登人天普集即不問達磨面壁請師通師云瞌睡未了進云九年冷坐無人識五葉花開遍地香師云枝枝撑出珊瑚月進云自從四七分枝後宇宙洪開選佛場如何是選佛場師云龍象交參聖凡共集進云煆煉五湖衲子勘驗四海英靈如何是英靈子師云戴角擎頭穿海嶽龍睛鶻眼辨諸方進云雙手劈開生𣦸路翻身直上九重天師云一句隨他去千山走衲僧乃云春日融和性天廓朗山光明媚道體全彰剗草灌花皆見性敲鐘伐鼓總明心掃地焚香渾身無非樂土和南禮拜終日不離道場一一與諸人發向上機頭頭揭示入門路若從觀音門入者鴉鳴鵲噪竹韻松風若從普賢門入者風柯月渚煙嶂雲林若從文殊門入者荊棘林中下腳易月明簾外轉身難若從彌勒門入者手把豬頭口誦淨戒趂出淫房未還酒債總是菩薩入理之門也雖然今日諸人畢竟從那一門而入豎起拂子云識得者個一生參學事畢上堂靈雲桃花保福叢竹龍潭紙燈百丈笑哭者隊漢不是成家便破屋失卻尉斗拾得榾柮平地栽蒺䔧心中含三毒佛祖生冤家當頭誰敢觸驢腮馬頷得人憎戴角披毛入地獄喝一喝燕京順天府愍忠禪寺語録順治十六年九月二十日師在海會寺受詔入內苑萬善殿復奉旨住愍忠啓建禪期於十月初四日進院至山門云無量妙義百千法門諸人到者裏又從那一門而入以拄杖一卓云八字打開無障無礙正令既行佛祖不會喝一喝便入至佛殿以手指中佛云如何是佛一口針三尺線又指左邊佛云如何是佛棕櫚葉長夜義頭又指右邊佛云如何是佛糞掃堆頭添𡏖𡒁者三佛既山僧與諸人道破且道真佛即今在甚麼處所謂真佛不露影取捨不見形大蟲眉上唱歌曲自是聾人不解聽伽藍堂靈山囑付永作金湯相扶到底鐵心石腸祖師堂達磨九年面壁無可不可不遇神光一場懡㦬雖然如是且面壁意在於何鷺鷥灘上立意在深潭裏據室當軒按劒唬鬼唬神不下禪牀用心不臧愍忠即不然未跨門閫時好與三十棒何謂據此室行此令卓拄杖三下便坐結制上堂師至法座前云以法空為座燈籠笑咍咍法王登演處提持向上機大衆如何是向上機亞豎摩醯三隻眼箭鋒相拄莫能窺喝一喝遂升座拈香云此瓣香自從曠劫熏修到底靈根不昧拈來有據有繇散去為祥為瑞爇向爐中端為祝延今上皇帝萬歲萬安伏願龍圖現瑞鳳鳥來儀此瓣香金枝永茂玉葉長春爇向爐中奉為昭聖慈壽恭簡安懿章慶皇太后伏願壽等虛空心同日月此瓣香奉為三宮皇后貴妃伏願法筵龍象呼三祝玉闕金星照九重此瓣香奉為皇室宗枝王公駙馬侯伯勳資伏願永作巖廊柱石恆為佛法金湯此瓣香奉為滿朝文武諸位尊官伏願忠簡帝心恩霑黎庶此瓣香昔年飯裏咬破砂直至如今飽不飢爇向爐中供養百癡元老和尚以酬法乳遂攝衣敷座僧問趙州昔日少謙光不下禪牀接趙王爭似吾師多意氣披衣説法為升堂且道是同是別師云一般清意味料得少人知進云恁麼則但見皇風成一片不知何處有封疆師云不勞重説偈言問奉旨名藍揚祖道全提三印振綱宗凡聖交參即不問結制一句請師通師云把斷咽喉進云且道其中還有優劣也無師云人人鼻孔遼天進云恁麼則苦瓜連根苦甜瓜徹蒂甜師云上座自生分別進云龍歸大海波濤靜鳳到蒼梧氣象新師云不是汝安身處僧一喝師云猶作主宰在乃云今辰荷蒙大護法世界主請升此座全提慧劍掃清犴迹狐蹤大啓紅爐煆煉精金美玉直令個個頂門具眼人人腳底無私庶不愧龍天方稱聖意豈不綽綽然有餘裕哉且開堂祝聖一句又作麼生道但願堯天風雨順天下英才入彀中復舉僧問投子禪師如何是一大事因緣子云尹司空與我開堂師云投子恁麼答話善對來機看孔著楔愍忠今日或有人問如何是一大事因緣亦對他道皇上與我開堂若有個英靈漢道和尚恁麼答話大似矮子看戲隨人上下是則是要見投子則易要見山僧則難音釋燮俗燮字劃霍國切音畫剖也驤息良切音湘馬低昂騰躍也彀居候切音姤矢持滿也
